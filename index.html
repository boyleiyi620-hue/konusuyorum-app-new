        }
        function startMemoryGame(pid) {
            memoryFlipped = [];
            memoryMatched = 0;
            const grid = document.getElementById('memory-grid');
            if (!grid) return;
            const images = ['&#128001;', '&#128002;', '&#128003;', '&#128004;', '&#128005;', '&#128006;', '&#128007;', '&#128008;'];
            const cards = [...images, ...images].sort(() => Math.random() - 0.5);
            grid.innerHTML = cards.map((img, idx) => `
                <div class="memory-card" id="card-${idx}" onclick="window.flipMemoryCard(${idx})">
                    <span style="display:none">${img}</span>
                </div>
            `).join('');
        }
        window.flipMemoryCard = (idx) => {
            const card = document.getElementById('card-' + idx);
            if (!card || card.classList.contains('flipped') || card.classList.contains('matched') || memoryFlipped.length >= 2) return;
            card.classList.add('flipped');
            card.innerHTML = card.querySelector('span').innerText;
            memoryFlipped.push(idx);
            if (memoryFlipped.length === 2) {
                const [idx1, idx2] = memoryFlipped;
                const card1 = document.getElementById('card-' + idx1);
                const card2 = document.getElementById('card-' + idx2);
                if (card1.innerText === card2.innerText) {
                    card1.classList.add('matched');
                    card2.classList.add('matched');
                    memoryMatched++;
                    document.getElementById('mem-matched').innerText = memoryMatched;
                    if (memoryMatched === 8) {
                        speak('Tebrikler! Oyunu bitirdin!');
                        confetti({ particleCount: 200, spread: 100 });
                    }
                    memoryFlipped = [];
                } else {
                    setTimeout(() => {
                        card1.classList.remove('flipped');
                        card2.classList.remove('flipped');
                        card1.innerHTML = '';
                        card2.innerHTML = '';
                        memoryFlipped = [];
                    }, 1000);
                }
            }
        };

        // ===== SES PARKURU OYUNU =====
        let parkourGame = null;
        function renderVoiceParkour(person) {
            const pid = person && person.id ? person.id : '';
            const highScore = person && person.id ? (person.voiceParkourHighScore || 0) : 0;
            app.innerHTML = getHeader('Ses Parkuru', '#/') + `
                <div class="container">
                    <div class="score-board">
                        <span>Skor: <span id="parkour-score">0</span></span>
                        <span>Rekor: ${highScore}</span>
                    </div>
                    <div class="parkour-container">
                        <canvas id="parkour-canvas" class="parkour-canvas"></canvas>
                        <div class="mic-indicator">
                            Ses: <div class="mic-bar"><div class="mic-fill" id="mic-fill"></div></div>
                        </div>
                        <div class="parkour-overlay" id="parkour-overlay">
                            <h2>&#127908; Ses Parkuru</h2>
                            <p>Ses cikarak zipla!<br>Platformlarda kal, düsme!</p>
                            <button class="next-btn" onclick="window.startParkour('${pid}')">Basla</button>
                        </div>
                    </div>
                    <p style="text-align:center;margin-top:10px;font-weight:700">Sesini kullan! Ne kadar ses cikarirsan o kadar yüksek ziplarsin!</p>
                </div>`;
        }
        window.startParkour = async (pid) => {
            const overlay = document.getElementById('parkour-overlay');
            if (overlay) overlay.style.display = 'none';
            try {
                micStream = await navigator.mediaDevices.getUserMedia({ audio: true });
                micAudioContext = new (window.AudioContext || window.webkitAudioContext)();
                micAnalyser = micAudioContext.createAnalyser();
                micAnalyser.fftSize = 256;
                const source = micAudioContext.createMediaStreamSource(micStream);
                source.connect(micAnalyser);
                runParkourGame(pid);
            } catch(e) {
                alert('Mikrofon erisimi gerekli! Lütfen izin verin.');
                if (overlay) overlay.style.display = 'flex';
            }
        };
        function runParkourGame(pid) {
            const canvas = document.getElementById('parkour-canvas');
            if (!canvas) return;
            const ctx = canvas.getContext('2d');
            canvas.width = canvas.offsetWidth;
            canvas.height = canvas.offsetHeight;
            
            // Oyun durumu
            let player = { x: 80, y: canvas.height / 2, w: 36, h: 36, vy: 0, grounded: false };
            let camera = { x: 0 };
            let platforms = [];
            let obstacles = [];
            let coins = [];
            let particles = [];
            let score = 0;
            let gameOver = false;
            let frame = 0;
            const gravity = 0.45;
            let worldGenX = 0;
            let nextPlatformY = canvas.height / 2;
            
            // İlk platform (başlangıç)
            platforms.push({ x: 0, y: canvas.height / 2 + 40, w: 200, h: 20, type: 'grass' });
            worldGenX = 200;
            
            function generateWorld() {
                // Kamera ilerledikçe yeni platformlar ve engeller üret
                while (worldGenX < camera.x + canvas.width + 800) {
                    const gap = 80 + Math.random() * 120; // Platformlar arası boşluk
                    const pw = 100 + Math.random() * 180; // Platform genişliği
                    
                    // Y yüksekliğini sınırlı aralıkta değiştir (oyun alanı içinde kalması için)
                    const minY = 80;
                    const maxY = canvas.height - 100;
                    nextPlatformY = Math.max(minY, Math.min(maxY, nextPlatformY + (Math.random() - 0.5) * 120));
                    
                    const px = worldGenX + gap;
                    platforms.push({ x: px, y: nextPlatformY, w: pw, h: 20, type: Math.random() > 0.7 ? 'moving' : 'grass' });
                    
                    // Platform hareketli ise yön ata
                    if (platforms[platforms.length - 1].type === 'moving') {
                        platforms[platforms.length - 1].dir = Math.random() > 0.5 ? 1 : -1;
                        platforms[platforms.length - 1].speed = 0.5 + Math.random() * 1;
                        platforms[platforms.length - 1].origY = nextPlatformY;
                    }
                    
                    // Engel ekle (bazı platformlara)
                    if (Math.random() > 0.5 && px > 400) {
                        const obsType = Math.random() > 0.6 ? 'spike' : 'cactus';
                        obstacles.push({ 
                            x: px + pw / 2, 
                            y: nextPlatformY - (obsType === 'spike' ? 25 : 30), 
                            w: obsType === 'spike' ? 20 : 25, 
                            h: obsType === 'spike' ? 25 : 30, 
                            type: obsType 
                        });
                    }
                    
                    // Coin ekle
                    if (Math.random() > 0.3) {
                        coins.push({ 
                            x: px + pw / 2, 
                            y: nextPlatformY - 50 - Math.random() * 40, 
                            r: 10, 
                            collected: false,
                            bobOffset: Math.random() * Math.PI * 2
                        });
                    }
                    
                    worldGenX = px + pw;
                    
                    // Bazen üst üste 2 coin daha (seri)
                    if (Math.random() > 0.6) {
                        for (let ci = 1; ci <= 2; ci++) {
                            coins.push({ 
                                x: px + pw / 2 + ci * 30, 
                                y: nextPlatformY - 50, 
                                r: 10, 
                                collected: false,
                                bobOffset: Math.random() * Math.PI * 2
                            });
                        }
                    }
                }
                
                // Geride kalanları temizle
                platforms = platforms.filter(p => p.x + p.w > camera.x - 100);
                obstacles = obstacles.filter(o => o.x + o.w > camera.x - 100);
                coins = coins.filter(c => c.x > camera.x - 100);
            }
            
            function update() {
                if (gameOver) return;
                frame++;
                
                // Ses analizi
                let micLevel = 0;
                if (micAnalyser) {
                    const dataArray = new Uint8Array(micAnalyser.frequencyBinCount);
                    micAnalyser.getByteFrequencyData(dataArray);
                    micLevel = dataArray.reduce((a, b) => a + b, 0) / dataArray.length;
                    const micFill = document.getElementById('mic-fill');
                    if (micFill) micFill.style.width = Math.min(100, micLevel * 1.5) + '%';
                    
                    // Ses ile zıplama - sınırlı yükseklik
                    if (micLevel > 15) {
                        // Maksimum zıplama yüksekliği: -12 (daha düşük)
                        const jumpForce = Math.min(-12, -8 - (micLevel / 30));
                        player.vy = jumpForce;
                        player.grounded = false;
                        // Zıplama partikülü
                        for (let i = 0; i < 3; i++) {
                            particles.push({
                                x: player.x + player.w / 2,
                                y: player.y + player.h,
                                vx: (Math.random() - 0.5) * 3,
                                vy: Math.random() * 2,
                                life: 20,
                                color: '#FFD700'
                            });
                        }
                    }
                }
                
                // Fizik
                player.vy += gravity;
                player.y += player.vy;
                
                // Platform çarpışma
                player.grounded = false;
                for (const p of platforms) {
                    // Hareketli platform
                    if (p.type === 'moving') {
                        p.y += p.dir * p.speed;
                        if (Math.abs(p.y - p.origY) > 40) p.dir *= -1;
                    }
                    
                    if (player.vy >= 0 && 
                        player.x + player.w > p.x && 
                        player.x < p.x + p.w &&
                        player.y + player.h >= p.y &&
                        player.y + player.h <= p.y + p.h + player.vy + 2) {
                        player.y = p.y - player.h;
                        player.vy = 0;
                        player.grounded = true;
                        // Hareketli platformla birlikte hareket et
                        if (p.type === 'moving') {
                            player.y += p.dir * p.speed;
                        }
                    }
                }
                
                // Ekran dışına düşme
                if (player.y > canvas.height + 50) {
                    gameOver = true;
                }
                if (player.x < camera.x) {
                    gameOver = true; // Sola kayma engeli
                }
                
                // Otomatik sağa kayma (Zamanla hızlanan)
                player.x += 2.5 + (score / 2000);
                
                // Engel çarpışma
                for (const o of obstacles) {
                    if (player.x + player.w > o.x && 
                        player.x < o.x + o.w && 
                        player.y + player.h > o.y && 
                        player.y < o.y + o.h) {
                        gameOver = true;
                    }
                }
                
                // Coin toplama
                for (const c of coins) {
                    if (!c.collected) {
                        const dx = (player.x + player.w / 2) - c.x;
                        const dy = (player.y + player.h / 2) - c.y;
                        const dist = Math.sqrt(dx * dx + dy * dy);
                        if (dist < c.r + player.w / 2) {
                            c.collected = true;
                            score += 50;
                            // Coin partikülü
                            for (let i = 0; i < 6; i++) {
                                particles.push({
                                    x: c.x, y: c.y,
                                    vx: (Math.random() - 0.5) * 5,
                                    vy: (Math.random() - 0.5) * 5,
                                    life: 25,
                                    color: '#FFD700'
                                });
                            }
                        }
                    }
                }
                
                // Partiküller
                particles = particles.filter(p => {
                    p.x += p.vx;
                    p.y += p.vy;
                    p.life--;
                    return p.life > 0;
                });
                
                // Kamera takip
                camera.x = player.x - canvas.width * 0.3;
                
                // Dünya üret
                generateWorld();
                
                // Skor
                score += 0.5;
                const scoreEl = document.getElementById('parkour-score');
                if (scoreEl) scoreEl.innerText = Math.floor(score);
                
                // Çizim
                draw();
                
                if (!gameOver) {
                    micRafId = requestAnimationFrame(update);
                    gameLoops.push(micRafId);
                } else {
                    endGame();
                }
            }
            
            function draw() {
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                
                // Gökyüzü gradyanı
                const skyGrad = ctx.createLinearGradient(0, 0, 0, canvas.height);
                skyGrad.addColorStop(0, '#4FC3F7');
                skyGrad.addColorStop(1, '#B3E5FC');
                ctx.fillStyle = skyGrad;
                ctx.fillRect(0, 0, canvas.width, canvas.height);
                
                // Arka plan bulutları (parallax)
                ctx.fillStyle = 'rgba(255,255,255,0.4)';
                const cloudOffset = (camera.x * 0.3) % 300;
                for (let i = 0; i < 5; i++) {
                    const cx = i * 250 - cloudOffset;
                    const cy = 40 + (i % 3) * 30;
                    ctx.beginPath();
                    ctx.arc(cx + 30, cy, 20, 0, Math.PI * 2);
                    ctx.arc(cx + 60, cy - 10, 25, 0, Math.PI * 2);
                    ctx.arc(cx + 90, cy, 20, 0, Math.PI * 2);
                    ctx.fill();
                }
                
                // Platformlar
                for (const p of platforms) {
                    const sx = p.x - camera.x;
                    if (sx + p.w < -50 || sx > canvas.width + 50) continue;
                    
                    if (p.type === 'grass') {
                        // Bulut Platform (Çocuklara uygun)
                        ctx.fillStyle = 'white';
                        ctx.beginPath();
                        ctx.arc(sx + 20, p.y + 10, 20, 0, Math.PI * 2);
                        ctx.arc(sx + p.w - 20, p.y + 10, 20, 0, Math.PI * 2);
                        ctx.rect(sx + 20, p.y - 10, p.w - 40, 40);
                        ctx.fill();
                        ctx.fillStyle = '#E1F5FE';
                        ctx.fillRect(sx + 20, p.y + 15, p.w - 40, 5);
                    } else if (p.type === 'moving') {
                        // Şeker Platform
                        ctx.fillStyle = '#F06292';
                        ctx.fillRect(sx, p.y, p.w, p.h);
                        ctx.fillStyle = 'white';
                        for(let ix=0; ix<p.w; ix+=20) ctx.fillRect(sx+ix, p.y, 10, p.h);
                    }
                }
                
                // Engeller
                for (const o of obstacles) {
                    const sx = o.x - camera.x;
                    if (sx + o.w < -50 || sx > canvas.width + 50) continue;
                    
                    if (o.type === 'spike') {
                        ctx.fillStyle = '#E53935';
                        ctx.beginPath();
                        ctx.moveTo(sx, o.y + o.h);
                        ctx.lineTo(sx + o.w / 2, o.y);
                        ctx.lineTo(sx + o.w, o.y + o.h);
                        ctx.closePath();
                        ctx.fill();
                    } else {
                        ctx.font = '28px serif';
                        ctx.fillText('🌵', sx - 5, o.y + o.h);
                    }
                }
                
                // Coinler
                for (const c of coins) {
                    if (c.collected) continue;
                    const sx = c.x - camera.x;
                    if (sx < -50 || sx > canvas.width + 50) continue;
                    
                    const bobY = Math.sin(frame * 0.08 + c.bobOffset) * 5;
                    ctx.fillStyle = '#FFD700';
                    ctx.beginPath();
                    ctx.arc(sx, c.y + bobY, c.r, 0, Math.PI * 2);
                    ctx.fill();
                    ctx.strokeStyle = '#FF8F00';
                    ctx.lineWidth = 2;
                    ctx.stroke();
                    // Parıltı
                    ctx.fillStyle = '#FFF8E1';
                    ctx.beginPath();
                    ctx.arc(sx - 3, c.y + bobY - 3, 3, 0, Math.PI * 2);
                    ctx.fill();
                }
                
                // Partiküller
                for (const p of particles) {
                    const sx = p.x - camera.x;
                    ctx.fillStyle = p.color;
                    ctx.globalAlpha = p.life / 25;
                    ctx.fillRect(sx - 2, p.y - 2, 4, 4);
                }
                ctx.globalAlpha = 1;
                
                // Oyuncu (Karakter seçimi veya rastgele)
                const characters = ['🐱', '🚀', '🎈', '🐸', '🦄'];
                const charIdx = Math.floor((score / 500) % characters.length);
                ctx.font = '36px serif';
                ctx.fillText(characters[charIdx], player.x - camera.x, player.y + 30);
                
                // Zemin çizgisi (sonsuz his)
                ctx.fillStyle = 'rgba(129,199,132,0.3)';
                ctx.fillRect(0, canvas.height - 5, canvas.width, 5);
            }
            
            function endGame() {
                speak('Oyun bitti! Skorun ' + Math.floor(score));
                
                // Game over ekranı
                ctx.fillStyle = 'rgba(0,0,0,0.6)';
                ctx.fillRect(0, 0, canvas.width, canvas.height);
                ctx.fillStyle = 'white';
                ctx.font = 'bold 32px sans-serif';
                ctx.textAlign = 'center';
                ctx.fillText('Oyun Bitti!', canvas.width / 2, canvas.height / 2 - 40);
                ctx.font = '22px sans-serif';
                ctx.fillText('Skor: ' + Math.floor(score), canvas.width / 2, canvas.height / 2 + 5);
                ctx.fillStyle = '#FFD700';
                ctx.fillText('⭐', canvas.width / 2, canvas.height / 2 + 40);
                ctx.textAlign = 'left';
                
                // Skor kaydet
                if (pid) {
                    peopleDB.get(pid).then(p => {
                        if (!p) return;
                        const finalScore = Math.floor(score);
                        if (finalScore > (p.voiceParkourHighScore || 0)) {
                            p.voiceParkourHighScore = finalScore;
                            peopleDB.save(p);
                        }
                    }).catch(e => console.error('Parkour save error:', e));
                }
                
                setTimeout(() => {
                    const ov = document.getElementById('parkour-overlay');
                    if (ov) { 
                        ov.style.display = 'flex'; 
                        ov.querySelector('h2').innerHTML = '&#127908; Tekrar Dene?'; 
                    }
                }, 2500);
            }
            
            update();
        }

        // ===== FOTOGRAF YAPBOZU =====
        let puzzleState = { pieces: [], size: 3, image: null, personId: null, totalPieces: 0 };
        
        function renderPuzzle(person) {
            puzzleState = { pieces: [], size: 3, image: null, personId: person && person.id ? person.id : null, totalPieces: 0 };
            app.innerHTML = getHeader('Fotograf Yapbozu', '#/') + `
                <div class="container">
                    <div class="puzzle-container">
                        <div class="puzzle-upload" onclick="document.getElementById('puzzle-file').click()">
                            <div style="font-size:3rem;margin-bottom:10px">&#128247;</div>
                            <div style="font-weight:800">Fotograf Yükle</div>
                            <div style="font-size:0.9rem;color:#666;margin-top:5px">Yapboz olmak icin bir fotograf sec</div>
                            <input type="file" id="puzzle-file" accept="image/*" onchange="window.loadPuzzleImage(event)">
                        </div>
                        <div class="form-group" style="max-width:200px;margin:0 auto 20px">
                            <label>Zorluk</label>
                            <select id="puzzle-size" onchange="puzzleState.size=parseInt(this.value)">
                                <option value="2">Kolay (2x2)</option>
                                <option value="3" selected>Orta (3x3)</option>
                                <option value="4">Zor (4x4)</option>
                            </select>
                        </div>
                        <div id="puzzle-grid" class="puzzle-grid" style="display:none"></div>
                        <button class="btn-save" id="puzzle-check" style="display:none;margin-top:20px" onclick="window.checkPuzzle()">Kontrol Et</button>
                        <div id="puzzle-msg" style="margin-top:15px;font-weight:800;font-size:1.2rem;text-align:center"></div>
                    </div>
                </div>`;
        }
        window.loadPuzzleImage = (e) => {
            const file = e.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = (ev) => {
                puzzleState.image = ev.target.result;
                createPuzzle();
            };
            reader.readAsDataURL(file);
        };
        function createPuzzle() {
            const grid = document.getElementById('puzzle-grid');
            const checkBtn = document.getElementById('puzzle-check');
            const size = puzzleState.size;
            const pieceCount = size * size;
            puzzleState.totalPieces = pieceCount;
            grid.style.display = 'grid';
            grid.style.gridTemplateColumns = `repeat(${size}, 100px)`;
            checkBtn.style.display = 'block';
            document.getElementById('puzzle-msg').innerText = '';
            
            // Her parçanın hangi konumda olduğunu takip et
            // pieces[i] = parçanın şu an bulunduğu slot
            const pieces = [];
            for (let i = 0; i < pieceCount; i++) {
                pieces.push(i); // Başlangıçta parça i, slot i'de
            }
            // Karıştır - Fisher-Yates shuffle
            for (let i = pieces.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [pieces[i], pieces[j]] = [pieces[j], pieces[i]];
            }
            puzzleState.pieces = pieces;
            renderPuzzleGrid();
        }
        function renderPuzzleGrid() {
            const grid = document.getElementById('puzzle-grid');
            if (!grid) return;
            const size = puzzleState.size;
            const img = puzzleState.image;
            const pieceSize = 100;

            grid.innerHTML = '';

            puzzleState.pieces.forEach((pieceId, slotIdx) => {
                const correctRow = Math.floor(pieceId / size);
                const correctCol = pieceId % size;

                const piece = document.createElement('div');
                piece.className = 'puzzle-piece';
                piece.style.width = pieceSize + 'px';
                piece.style.height = pieceSize + 'px';
                piece.style.backgroundImage = `url(${img})`;
                piece.style.backgroundSize = `${pieceSize * size}px ${pieceSize * size}px`;
                piece.style.backgroundPosition = `${-correctCol * pieceSize}px ${-correctRow * pieceSize}px`;
                piece.style.touchAction = 'none';
                piece.style.userSelect = 'none';
                piece.dataset.slot = slotIdx;
                piece.dataset.piece = pieceId;

                // Pointer events - hem mouse hem touch
                piece.addEventListener('pointerdown', handlePuzzlePointerDown);

                grid.appendChild(piece);
            });
        }

        // Pointer-based drag & drop system
        let puzzleDragState = null;

        function handlePuzzlePointerDown(e) {
            e.preventDefault();
            const piece = e.target.closest('.puzzle-piece');
            if (!piece) return;

            const rect = piece.getBoundingClientRect();
            const pointerId = e.pointerId;

            // Ghost element oluştur
            const ghost = piece.cloneNode(true);
            ghost.style.position = 'fixed';
            ghost.style.left = rect.left + 'px';
            ghost.style.top = rect.top + 'px';
            ghost.style.width = rect.width + 'px';
            ghost.style.height = rect.height + 'px';
            ghost.style.zIndex = '9999';
            ghost.style.opacity = '0.9';
            ghost.style.pointerEvents = 'none';
            ghost.style.boxShadow = '0 8px 25px rgba(0,0,0,0.3)';
            ghost.style.transform = 'scale(1.05)';
            ghost.style.borderRadius = '8px';
            ghost.id = 'puzzle-ghost';
            document.body.appendChild(ghost);

            // Orijinal parçayı yarı saydam yap
            piece.style.opacity = '0.3';
            piece.style.transform = 'scale(0.95)';

            puzzleDragState = {
                srcSlot: parseInt(piece.dataset.slot),
                srcPiece: piece,
                ghost: ghost,
                offsetX: e.clientX - rect.left,
                offsetY: e.clientY - rect.top,
                pointerId: pointerId
            };

            piece.setPointerCapture(pointerId);
            piece.addEventListener('pointermove', handlePuzzlePointerMove);
            piece.addEventListener('pointerup', handlePuzzlePointerUp);
            piece.addEventListener('pointercancel', handlePuzzlePointerUp);
        }

        function handlePuzzlePointerMove(e) {
            if (!puzzleDragState) return;
            e.preventDefault();

            const ghost = puzzleDragState.ghost;
            ghost.style.left = (e.clientX - puzzleDragState.offsetX) + 'px';
            ghost.style.top = (e.clientY - puzzleDragState.offsetY) + 'px';

            // Hangi parçanın üzerinde olduğunu belirlemek için highlight
            ghost.style.display = 'none';
            const target = document.elementFromPoint(e.clientX, e.clientY);
            ghost.style.display = '';

            document.querySelectorAll('.puzzle-piece').forEach(p => {
                p.style.borderColor = 'white';
                p.style.transform = p === puzzleDragState.srcPiece ? 'scale(0.95)' : 'scale(1)';
            });

            if (target) {
                const dropTarget = target.closest('.puzzle-piece');
                if (dropTarget && dropTarget !== puzzleDragState.srcPiece) {
                    dropTarget.style.borderColor = '#54A0FF';
                    dropTarget.style.transform = 'scale(1.05)';
                }
            }
        }

        function handlePuzzlePointerUp(e) {
            if (!puzzleDragState) return;
            e.preventDefault();

            const srcSlot = puzzleDragState.srcSlot;
            const srcPiece = puzzleDragState.srcPiece;
            const ghost = puzzleDragState.ghost;

            // Ghost'u kaldır
            ghost.remove();

            // Orijinal parçayı normale döndür
            srcPiece.style.opacity = '1';
            srcPiece.style.transform = 'scale(1)';

            // Hedef parçayı bul
            const target = document.elementFromPoint(e.clientX, e.clientY);
            if (target) {
                const dropTarget = target.closest('.puzzle-piece');
                if (dropTarget) {
                    const dstSlot = parseInt(dropTarget.dataset.slot);
                    if (srcSlot !== dstSlot) {
                        swapPuzzleSlots(srcSlot, dstSlot);
                    }
                }
            }

            // Tüm highlight'ları temizle
            document.querySelectorAll('.puzzle-piece').forEach(p => {
                p.style.borderColor = 'white';
                p.style.transform = 'scale(1)';
            });

            // Event listener'ları temizle
            srcPiece.removeEventListener('pointermove', handlePuzzlePointerMove);
            srcPiece.removeEventListener('pointerup', handlePuzzlePointerUp);
            srcPiece.removeEventListener('pointercancel', handlePuzzlePointerUp);
            try { srcPiece.releasePointerCapture(puzzleDragState.pointerId); } catch(err) {}

            puzzleDragState = null;
        }
        
        function swapPuzzleSlots(slotA, slotB) {
            // pieces[slotA] ve pieces[slotB]'yi takas et
            [puzzleState.pieces[slotA], puzzleState.pieces[slotB]] = [puzzleState.pieces[slotB], puzzleState.pieces[slotA]];
            renderPuzzleGrid();
        }
        
        window.checkPuzzle = async () => {
            // Doğru çözüm: her slotta (slot index) o slotta olması gereken parça (slot index) olmalı
            // Yani pieces[i] === i olmalı
            const isCorrect = puzzleState.pieces.every((pieceId, slotIdx) => pieceId === slotIdx);
            const msg = document.getElementById('puzzle-msg');
            if (isCorrect) {
                msg.innerHTML = '<span style="color:#1DD1A1">Tebrikler! Yapboz tamamlandi!</span>';
                speak('Tebrikler! Yapboz tamamlandi!');
                confetti({ particleCount: 200, spread: 100 });
                if (puzzleState.person
