<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#FFB300">
    <title>Konuşuyorum & Öğreniyorum 🌈</title>

    <link rel="manifest" href="manifest.json">
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;500;600;700&family=Baloo+2:wght@600;700;800&family=Indie+Flower&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

    <style id="theme-styles">
        :root {
            --primary: #FFB300; --secondary: #00D2D3; --accent: #FF6B6B;
            --blue: #54A0FF; --green: #1DD1A1; --bg: #FFF9E6;
            --text: #4834D4; --white: #FFFFFF;
            --aquarium-bg: #0077be;
        }

        /* TEMA TEMELLERİ */
        body { min-height: 100vh; overflow-x: hidden; user-select: none; transition: all 0.3s; }
        body.theme-modern { background-color: var(--bg); color: var(--text); }
        body.theme-classic { background-color: #fdf2f8; color: #831843; }
        body.theme-space { background-color: #0f172a; color: #f8fafc; }
        body.theme-notebook { background-color: #fefce8; color: #1e293b; background-image: linear-gradient(#e5e7eb 1px, transparent 1px); background-size: 100% 30px; }
        body.theme-aquarium { background-color: var(--aquarium-bg); color: #e0f2f1; }

        /* ARKA PLAN ANİMASYONLARI */
        .bg-animations { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; pointer-events: none; overflow: hidden; }
        .anim-item { position: absolute; transition: transform 0.2s; }
        .clickable-item { pointer-events: auto; cursor: pointer; z-index: 50; }
        .clickable-item:active { transform: scale(1.5); }

        /* UZAY - GERÇEKÇİ */
        .theme-space { background: radial-gradient(ellipse at 20% 50%, rgba(30,60,120,0.4) 0%, transparent 50%), radial-gradient(ellipse at 80% 20%, rgba(80,40,120,0.3) 0%, transparent 40%), radial-gradient(ellipse at 50% 80%, rgba(20,80,100,0.2) 0%, transparent 50%), #0a0e1a; }
        .theme-space .rocket { font-size: 4rem; animation: roam 40s infinite ease-in-out; filter: drop-shadow(0 0 8px rgba(255,150,50,0.6)); }
        .theme-space .planet { font-size: 8rem; animation: slowSpin 80s infinite linear; opacity: 0.35; filter: drop-shadow(0 0 15px rgba(100,150,255,0.3)); }
        .theme-space .nebula { position: absolute; border-radius: 50%; filter: blur(60px); opacity: 0.15; animation: nebulaPulse 12s infinite ease-in-out; }
        .theme-space .star { background: white; border-radius: 50%; animation: twinkle var(--twinkle-dur, 3s) infinite ease-in-out; box-shadow: 0 0 3px rgba(255,255,255,0.8); }
        .theme-space .star-bright { background: radial-gradient(circle, #fff 0%, rgba(200,220,255,0.6) 40%, transparent 70%); border-radius: 50%; animation: twinkleBright var(--twinkle-dur, 4s) infinite ease-in-out; }
        .theme-space .shooting-star {
            position: absolute;
            width: 80px; height: 1.5px;
            background: linear-gradient(90deg, rgba(255,255,255,0.95) 0%, rgba(200,220,255,0.6) 30%, transparent 100%);
            border-radius: 1px;
            box-shadow: 0 0 6px 2px rgba(200,220,255,0.4);
            animation: shootStar var(--shoot-dur, 3s) var(--shoot-delay, 0s) infinite cubic-bezier(0.2, 0, 0.8, 1);
            opacity: 0;
        }
        .theme-space .shooting-star::before {
            content: '';
            position: absolute; left: 0; top: -1px;
            width: 4px; height: 4px;
            background: white;
            border-radius: 50%;
            box-shadow: 0 0 8px 3px rgba(255,255,255,0.9), 0 0 15px 5px rgba(150,200,255,0.5);
        }

        /* GÖKKUŞAĞI - GELİŞTİRİLMİŞ */
        .theme-modern { background: radial-gradient(circle at 10% 20%, rgba(255,200,220,0.5) 0%, transparent 40%), radial-gradient(circle at 90% 80%, rgba(180,220,255,0.5) 0%, transparent 40%), radial-gradient(circle at 50% 50%, rgba(255,240,180,0.4) 0%, transparent 50%), linear-gradient(135deg, #fff5e1 0%, #ffe4f1 50%, #e1f0ff 100%); background-attachment: fixed; }
        .theme-modern .cloud { font-size: 5rem; opacity: 0.25; animation: floatCloud 60s infinite linear; filter: drop-shadow(0 3px 6px rgba(0,0,0,0.05)); }
        .theme-modern .cloud-small { font-size: 3rem; opacity: 0.15; animation: floatCloud 80s infinite linear; }
        .theme-modern .balloon { font-size: 3.5rem; opacity: 0.5; animation: balloonFloat 25s infinite ease-in-out; filter: drop-shadow(0 4px 8px rgba(0,0,0,0.1)); }
        .theme-modern .sun { font-size: 9rem; top: 3%; right: 3%; opacity: 0.18; animation: sunPulse 8s infinite ease-in-out; filter: drop-shadow(0 0 30px rgba(255,200,0,0.3)); }
        .theme-modern .rainbow { position: absolute; top: 5%; left: 50%; transform: translateX(-50%); font-size: 7rem; opacity: 0.12; animation: rainbowFade 10s infinite ease-in-out; }

        /* KLASİK - GELİŞTİRİLMİŞ */
        .theme-classic { background: radial-gradient(circle at 30% 70%, rgba(255,182,193,0.3) 0%, transparent 40%), radial-gradient(circle at 70% 30%, rgba(255,218,230,0.3) 0%, transparent 40%), #fdf2f8; background-attachment: fixed; }
        .theme-classic .heart { font-size: 3rem; opacity: 0.2; animation: heartFloat 18s infinite ease-in-out; filter: drop-shadow(0 2px 4px rgba(200,50,80,0.15)); }
        .theme-classic .heart-small { font-size: 1.5rem; opacity: 0.15; animation: heartFloat 25s infinite ease-in-out; }
        .theme-classic .flower { font-size: 4rem; opacity: 0.2; animation: flowerSway 8s infinite ease-in-out; filter: drop-shadow(0 2px 4px rgba(200,100,150,0.1)); }
        .theme-classic .butterfly { font-size: 2.5rem; opacity: 0.35; animation: butterflyFly 20s infinite ease-in-out; }
        .theme-classic .petal { font-size: 2rem; opacity: 0.15; animation: petalFall 15s infinite linear; }

        /* NOT DEFTERİ - GELİŞTİRİLMİŞ */
        .theme-notebook * { font-family: 'Indie Flower', cursive !important; }
        .theme-notebook { background-color: #fffef5; background-image: linear-gradient(rgba(200,200,220,0.3) 1px, transparent 1px), linear-gradient(90deg, rgba(255,100,100,0.15) 1px, transparent 1px); background-size: 100% 28px, 60px 100%; background-position: 0 0, 40px 0; }
        .theme-notebook .pencil { font-size: 4rem; opacity: 0.25; animation: pencilWrite 12s infinite ease-in-out; }
        .theme-notebook .paperclip { font-size: 3.5rem; opacity: 0.2; animation: clipWobble 6s infinite ease-in-out; }
        .theme-notebook .eraser { font-size: 2.5rem; opacity: 0.2; animation: roam 35s infinite ease-in-out; }
        .theme-notebook .doodle { font-size: 2rem; opacity: 0.15; animation: doodlePop 4s infinite ease-in-out; }

        /* AKVARYUM - YENİ */
        .theme-aquarium { background: linear-gradient(180deg, #4fc3f7 0%, #01579b 100%); background-attachment: fixed; }
        .theme-aquarium .bubble { background: rgba(255,255,255,0.3); border-radius: 50%; border: 1px solid rgba(255,255,255,0.5); animation: bubbleUp var(--dur) infinite ease-in; position: absolute; }
        .theme-aquarium .fish { font-size: 3rem; animation: fishSwim var(--dur) infinite ease-in-out; position: absolute; opacity: 0.7; }
        .theme-aquarium .seaweed { font-size: 4rem; animation: sway 6s infinite ease-in-out; position: absolute; bottom: -10px; opacity: 0.6; }
        @keyframes bubbleUp {
            0% { transform: translateY(110vh) translateX(0); opacity: 0; }
            20% { opacity: 0.6; }
            100% { transform: translateY(-10vh) translateX(var(--tx)); opacity: 0; }
        }
        @keyframes fishSwim {
            0% { transform: translate(-20vw, var(--y)) scaleX(1); }
            45% { transform: translate(110vw, var(--y)) scaleX(1); }
            50% { transform: translate(110vw, var(--y)) scaleX(-1); }
            95% { transform: translate(-20vw, var(--y)) scaleX(-1); }
            100% { transform: translate(-20vw, var(--y)) scaleX(1); }
        }
        @keyframes sway {
            0%, 100% { transform: rotate(-5deg); }
            50% { transform: rotate(5deg); }
        }

        /* OYUN SIRASINDA ARKA PLAN GİZLE */
        .bg-hidden { display: none !important; }

        /* OYUN İÇİN ÖZEL ANİMASYONLAR */
        @keyframes popIn {
            0% { transform: scale(0) translate(0, 0); opacity: 0; }
            20% { opacity: 1; }
            100% { transform: scale(1) translate(var(--tx), var(--ty)); opacity: 0.5; }
        }
        .pop-obj { 
            position: fixed; font-size: 4rem; z-index: 1000; 
            animation: popIn var(--dur) linear forwards; 
            pointer-events: auto; cursor: pointer;
        }

        /* ANİMASYON TANIMLARI */
        @keyframes shootStar {
            0% { transform: translateX(0) rotate(-35deg); opacity: 0; }
            5% { opacity: 1; }
            60% { opacity: 0.6; }
            100% { transform: translateX(calc(100vw + 200px)) rotate(-35deg); opacity: 0; }
        }
        @keyframes nebulaPulse {
            0%, 100% { opacity: 0.12; transform: scale(1); }
            50% { opacity: 0.2; transform: scale(1.1); }
        }
        @keyframes twinkleBright {
            0%, 100% { opacity: 0.3; transform: scale(0.8); }
            50% { opacity: 1; transform: scale(1.2); }
        }
        @keyframes roam {
            0% { transform: translate(-20vw, 120vh) rotate(0deg); }
            33% { transform: translate(50vw, 30vh) rotate(20deg); }
            66% { transform: translate(90vw, 10vh) rotate(-20deg); }
            100% { transform: translate(120vw, 70vh) rotate(15deg); }
        }
        @keyframes slowSpin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
        @keyframes twinkle { 0%, 100% { opacity: 0.15; transform: scale(0.9); } 50% { opacity: 1; transform: scale(1.1); } }
        @keyframes floatHorizontal { from { left: -30%; } to { left: 130%; } }
        @keyframes floatUp { from { bottom: -20%; } to { bottom: 120%; } }
        @keyframes floatCloud {
            0% { transform: translateX(-100%) translateY(0); }
            50% { transform: translateX(50vw) translateY(-8px); }
            100% { transform: translateX(110vw) translateY(0); }
        }
        @keyframes balloonFloat {
            0% { transform: translateY(110vh) rotate(-5deg); }
            50% { transform: translateY(30vh) rotate(5deg); }
            100% { transform: translateY(-20vh) rotate(-3deg); }
        }
        @keyframes sunPulse {
            0%, 100% { transform: scale(1); opacity: 0.18; }
            50% { transform: scale(1.05); opacity: 0.25; }
        }
        @keyframes rainbowFade {
            0%, 100% { opacity: 0.08; }
            50% { opacity: 0.15; }
        }
        @keyframes heartFloat {
            0% { transform: translateY(100vh) rotate(0deg) scale(0.8); opacity: 0; }
            10% { opacity: 0.2; }
            50% { transform: translateY(40vh) rotate(15deg) scale(1); }
            90% { opacity: 0.2; }
            100% { transform: translateY(-20vh) rotate(-10deg) scale(0.9); opacity: 0; }
        }
        @keyframes flowerSway {
            0%, 100% { transform: rotate(-5deg) scale(1); }
            50% { transform: rotate(5deg) scale(1.05); }
        }
        @keyframes butterflyFly {
            0% { transform: translate(-10vw, 80vh) rotate(0deg); }
            25% { transform: translate(30vw, 40vh) rotate(10deg); }
            50% { transform: translate(60vw, 20vh) rotate(-5deg); }
            75% { transform: translate(80vw, 50vh) rotate(8deg); }
            100% { transform: translate(110vw, 30vh) rotate(-3deg); }
        }
        @keyframes petalFall {
            0% { transform: translateY(-10vh) translateX(0) rotate(0deg); opacity: 0; }
            10% { opacity: 0.15; }
            100% { transform: translateY(110vh) translateX(30px) rotate(360deg); opacity: 0; }
        }
        @keyframes pencilWrite {
            0%, 100% { transform: translate(0, 0) rotate(-15deg); }
            25% { transform: translate(20px, 5px) rotate(-10deg); }
            50% { transform: translate(40px, -3px) rotate(-20deg); }
            75% { transform: translate(10px, 8px) rotate(-12deg); }
        }
        @keyframes clipWobble {
            0%, 100% { transform: rotate(0deg); }
            25% { transform: rotate(8deg); }
            75% { transform: rotate(-8deg); }
        }
        @keyframes doodlePop {
            0%, 100% { transform: scale(1); opacity: 0.15; }
            50% { transform: scale(1.15); opacity: 0.25; }
        }

        /* İDEAL BOYUTTA GİRİŞ ALANLARI */
        .form-group input, .form-group select, .form-group textarea {
            font-size: 1.5rem !important;
            padding: 22px 25px !important;
            border-radius: 25px !important;
            border: 4px solid #DDD !important;
            width: 100% !important;
            margin-bottom: 20px !important;
            background: white !important;
            color: #333 !important;
            display: block !important;
            box-shadow: inset 0 3px 6px rgba(0,0,0,0.05) !important;
            transition: border-color 0.3s, box-shadow 0.3s;
        }
        .form-group input:focus, .form-group textarea:focus {
            border-color: var(--primary) !important;
            outline: none;
            box-shadow: 0 0 15px rgba(255,179,0,0.2) !important;
        }
        .form-group label {
            font-size: 1.2rem !important;
            font-weight: 800 !important;
            margin-bottom: 10px !important;
            display: block !important;
            color: var(--primary);
        }
        .form-card { background: white; padding: 30px; border-radius: 30px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); border: 4px solid #f0f0f0; }

        /* UZAY TEMASI GİRİŞ ALANI DÜZELTME */
        .theme-space .form-group input, .theme-space .form-group select, .theme-space .form-group textarea {
            background: #1e293b !important;
            color: #f8fafc !important;
            border-color: #38bdf8 !important;
        }
        .theme-space .form-group label { color: #f8fafc !important; }

        /* UZAY TEMASI KART DÜZELTME */
        .theme-space .card { background: #1e293b !important; border-color: #38bdf8 !important; color: #f8fafc !important; }
        .theme-space .card-title { color: #f8fafc !important; }
        .theme-space .card-img { background: #0f172a !important; }

        /* OYUN MENÜSÜ STİLLERİ */
        .game-menu-container { display: flex; flex-direction: column; gap: 15px; padding: 20px; align-items: center; }
        .game-menu-btn { width: 100%; max-width: 300px; padding: 20px; border-radius: 20px; border: none; font-size: 1.3rem; font-weight: 800; color: white; cursor: pointer; box-shadow: 0 6px 0 rgba(0,0,0,0.1); transition: transform 0.1s; display: flex; align-items: center; justify-content: center; gap: 10px; }
        .game-menu-btn:active { transform: translateY(4px); box-shadow: none; }
        .game-sub-menu { display: none; flex-direction: column; gap: 10px; width: 100%; align-items: center; margin-top: 5px; }
        .game-sub-menu.active { display: flex; }
        .game-sub-btn { width: 90%; max-width: 270px; padding: 15px; border-radius: 15px; border: none; font-size: 1.1rem; font-weight: 700; color: white; cursor: pointer; box-shadow: 0 4px 0 rgba(0,0,0,0.1); }

        /* EŞLEŞTİRME OYUNLARI CSS */
        .match-container { display: flex; flex-direction: column; align-items: center; gap: 30px; padding: 20px; min-height: 60vh; justify-content: center; }
        .match-target { font-size: 8rem; transition: all 0.5s; }
        .match-target.floating { animation: floatUpMatch 3s forwards; }
        .match-options { display: flex; gap: 20px; justify-content: center; width: 100%; }
        .match-opt { width: 80px; height: 80px; border-radius: 20px; border: 4px solid white; cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 3rem; box-shadow: 0 6px 0 rgba(0,0,0,0.2); }
        .match-opt:active { transform: translateY(4px); box-shadow: none; }
        @keyframes floatUpMatch {
            0% { transform: translateY(0) scale(1); opacity: 1; }
            100% { transform: translateY(-100vh) scale(1.5); opacity: 0; }
        }
        .farm-bg { background: #8bc34a; border-radius: 30px; padding: 20px; border: 10px solid #795548; position: relative; overflow: hidden; background-image: radial-gradient(#ffffff 15%, transparent 16%), radial-gradient(#ffffff 15%, transparent 16%); background-size: 60px 60px; background-position: 0 0, 30px 30px; }
        .farm-scenery { position: relative; height: 400px; background: linear-gradient(to bottom, #87CEEB 0%, #87CEEB 60%, #4CAF50 60%, #4CAF50 100%); border-radius: 20px; overflow: hidden; border: 8px solid #795548; box-shadow: inset 0 0 50px rgba(0,0,0,0.2); }
        .farm-sun { position: absolute; top: 20px; right: 40px; font-size: 4rem; animation: sunPulse 4s infinite ease-in-out; }
        .farm-cloud { position: absolute; font-size: 3rem; opacity: 0.8; animation: floatCloud 20s infinite linear; }
        
        #animal-sprite { 
            position: absolute; 
            bottom: 40px; 
            left: -150px; 
            font-size: 8rem; 
            transition: left 2s cubic-bezier(0.34, 1.56, 0.64, 1); 
            filter: drop-shadow(0 10px 15px rgba(0,0,0,0.2));
            z-index: 10;
        }
        #animal-sprite.center { left: calc(50% - 4rem); }
        #animal-sprite.exit { left: 110%; }
        
        .animal-speech-bubble {
            position: absolute;
            bottom: 180px;
            left: 50%;
            transform: translateX(-50%) scale(0);
            background: white;
            padding: 15px 25px;
            border-radius: 30px;
            font-size: 1.5rem;
            font-weight: 800;
            box-shadow: 0 10px 0 rgba(0,0,0,0.1);
            transition: transform 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            z-index: 20;
        }
        .animal-speech-bubble.active { transform: translateX(-50%) scale(1); }
        .animal-speech-bubble::after {
            content: '';
            position: absolute;
            bottom: -15px;
            left: 50%;
            transform: translateX(-50%);
            border-left: 15px solid transparent;
            border-right: 15px solid transparent;
            border-top: 15px solid white;
        }

        /* ANA EKRAN OYUNLARI CSS */
        .voice-game-container { position: relative; height: 350px; background: linear-gradient(to bottom, #87CEEB 0%, #E0F7FA 100%); border-radius: 30px; overflow: hidden; border: 6px solid #54A0FF; }
        #voice-char { position: absolute; bottom: 60px; left: 20px; font-size: 5rem; transition: all 0.1s; z-index: 5; filter: drop-shadow(0 5px 10px rgba(0,0,0,0.1)); }
        #voice-char.jumping { transform: translateY(-40px) rotate(10deg); }
        .parkour-ground { position: absolute; bottom: 0; width: 200%; height: 60px; background: #8BC34A; display: flex; animation: groundScroll 10s linear infinite; }
        @keyframes groundScroll { from { left: 0; } to { left: -100%; } }
        .parkour-tree { position: absolute; bottom: 60px; font-size: 4rem; animation: treeScroll 5s linear infinite; }
        @keyframes treeScroll { from { right: -100px; } to { right: 110%; } }
        .puzzle-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 5px; background: #CCC; padding: 5px; border-radius: 10px; }
        .puzzle-piece { aspect-ratio: 1; background-size: 300% 300%; border: 1px solid white; cursor: pointer; }
        
        /* GENEL STİLLER */
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; font-family: 'Fredoka', sans-serif; }
        .header { padding: 15px 20px; display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 100; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .header h1 { font-family: 'Baloo 2', cursive; font-size: 1.4rem; color: white; font-weight: 800; }
        .nav-buttons { display: flex; gap: 8px; }
        .btn-round { border: none; width: 42px; height: 42px; font-size: 1.3rem; cursor: pointer; display: flex; align-items: center; justify-content: center; box-shadow: 0 4px 0 rgba(0,0,0,0.1); border-radius: 12px; }
        .btn-round:active { transform: translateY(4px); box-shadow: none; }
        .container { padding: 15px; max-width: 900px; margin: 0 auto; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 15px; }
        .card { background: white; padding: 15px 10px; text-align: center; cursor: pointer; position: relative; transition: transform 0.2s; border-radius: 25px; border: 5px solid #F0F2F5; }
        .card:active { transform: scale(0.95); }
        .card-img { width: 85px; height: 85px; margin: 0 auto 10px; border-radius: 20px; background: #F8F9FA; display: flex; align-items: center; justify-content: center; font-size: 3rem; object-fit: cover; }
        .card-title { font-weight: 800; font-size: 1.1rem; font-family: 'Baloo 2', cursive; }
        .action-btns { position: absolute; top: 8px; right: 8px; display: flex; flex-direction: column; gap: 5px; }
        .btn-mini { width: 26px; height: 26px; border-radius: 8px; border: none; cursor: pointer; display: flex; align-items: center; justify-content: center; color: white; font-size: 0.8rem; }
        .btn-del { background: #FF6B6B; } .btn-edit { background: #54A0FF; }

        .theme-selector { position: absolute; top: 70px; left: 15px; background: white; border-radius: 20px; padding: 12px; box-shadow: 0 5px 20px rgba(0,0,0,0.2); display: none; z-index: 200; border: 4px solid #FFB300; }
        .theme-option { padding: 10px 15px; cursor: pointer; font-weight: 800; border-radius: 12px; margin-bottom: 6px; display: flex; align-items: center; gap: 12px; color: #4834D4; font-size: 1.1rem; }
        .theme-option:hover { background: #f0f0f0; }

        .score-board { background: rgba(255,255,255,0.9); padding: 10px 20px; border-radius: 20px; margin-bottom: 15px; display: flex; justify-content: space-around; border: 3px solid var(--primary); font-weight: 800; }
        .theme-space .score-board { background: rgba(30, 41, 59, 0.9); color: white; border-color: #38bdf8; }

        /* MEMORY GAME STYLES */
        .memory-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; margin-top: 15px; }
        .memory-card { height: 100px; background: var(--primary); border-radius: 15px; cursor: pointer; position: relative; transform-style: preserve-3d; transition: transform 0.5s; border: 4px solid white; }
        .memory-card.flipped { transform: rotateY(180deg); }
        .memory-card.matched { visibility: hidden; opacity: 0; }
        .card-front, .card-back { position: absolute; width: 100%; height: 100%; backface-visibility: hidden; border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 2rem; }
        .card-back { background: #fff; transform: rotateY(180deg); }
        .card-back img { width: 100%; height: 100%; object-fit: cover; border-radius: 10px; }

        .quiz-container { background: white; border-radius: 35px; padding: 25px; text-align: center; border: 8px solid #FFB300; }
        .quiz-question { font-family: 'Baloo 2', cursive; font-size: 1.8rem; margin-bottom: 20px; font-weight: 800; }
        .quiz-img { width: 100%; max-width: 280px; height: 180px; border-radius: 25px; object-fit: cover; margin-bottom: 20px; }
        .options-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 20px; }
        .option-btn { background: #F8F9FA; border: 4px solid #EEE; padding: 15px; border-radius: 20px; cursor: pointer; display: flex; flex-direction: column; align-items: center; gap: 10px; box-shadow: 0 6px 0 #DDD; }
        .option-text { font-size: 1.2rem; font-weight: 800; }
        .next-btn { background: #54A0FF; color: white; border: none; padding: 15px 40px; border-radius: 20px; font-size: 1.3rem; font-weight: 800; cursor: pointer; box-shadow: 0 6px 0 #2E86DE; }
        .form-card { background: white; padding: 20px; border-radius: 25px; border: 5px solid #54A0FF; }
        .theme-space .form-card { background: #1e293b; border-color: #38bdf8; }
        .btn-save { width: 100%; padding: 15px; border-radius: 20px; border: none; background: #1DD1A1; color: white; font-weight: 800; font-size: 1.2rem; cursor: pointer; margin-top: 10px; box-shadow: 0 6px 0 #10AC84; }

        @media (max-width: 480px) { .grid { grid-template-columns: repeat(2, 1fr); } .options-grid { grid-template-columns: 1fr; } .memory-grid { grid-template-columns: repeat(3, 1fr); } }
    </style>
</head>
<body class="theme-modern">
    <div class="bg-animations" id="bg-elements"></div>

    <div id="theme-menu" class="theme-selector">
        <div class="theme-option" onclick="setTheme('modern')">🌈 Gökkuşağı</div>
        <div class="theme-option" onclick="setTheme('classic')">🌸 Klasik</div>
        <div class="theme-option" onclick="setTheme('space')">🚀 Uzay</div>
                <div class="theme-option" onclick="setTheme('notebook')">📝 Not Defteri</div>
                <div class="theme-option" onclick="setTheme('aquarium')">🌊 Akvaryum</div>
            </div>
    <div id="app"></div>

    <script>
        let db;
        const DB_NAME = 'KonusuyorumFinalDB_V5';
        const DB_VERSION = 1;

        let currentTheme = localStorage.getItem('app-theme') || 'modern';
        document.body.className = 'theme-' + currentTheme;

        function toggleThemeMenu() {
            const menu = document.getElementById('theme-menu');
            menu.style.display = menu.style.display === 'block' ? 'none' : 'block';
        }

        function setTheme(theme) {
            currentTheme = theme;
            document.body.className = 'theme-' + theme;
            localStorage.setItem('app-theme', theme);
            document.getElementById('theme-menu').style.display = 'none';
            updateBackground();
            render();
        }

        let popGameActive = false;
        let popScore = 0;
        let currentPersonId = null;
        let spawnRate = 2000;
        let spawnTimer = null;

        function updateBackground() {
            const container = document.getElementById('bg-elements');
            container.innerHTML = '';
            
            if (currentTheme === 'space') {
                // Nebula efektleri
                container.innerHTML += `<div class="nebula anim-item" style="top:10%;left:15%;width:300px;height:300px;background:radial-gradient(circle,rgba(100,50,200,0.4),transparent);animation-delay:0s"></div>`;
                container.innerHTML += `<div class="nebula anim-item" style="top:60%;right:10%;width:250px;height:250px;background:radial-gradient(circle,rgba(50,100,200,0.3),transparent);animation-delay:6s"></div>`;
                // Yıldızlar - farklı boyut ve parlaklık
                for(let i=0; i<60; i++) {
                    const size = 0.5 + Math.random() * 2.5;
                    const bright = Math.random() > 0.85;
                    const cls = bright ? 'star-bright' : 'star';
                    const dur = 2 + Math.random() * 4;
                    container.innerHTML += `<div class="${cls} anim-item" style="top:${Math.random()*100}%;left:${Math.random()*100}%;width:${size}px;height:${size}px;--twinkle-dur:${dur}s;animation-delay:${Math.random()*5}s"></div>`;
                }
                // Kayan yıldızlar - kuyruklu, gerçekçi
                for(let i=0; i<5; i++) {
                    const dur = 2.5 + Math.random() * 3;
                    const delay = Math.random() * 15 + i * 5;
                    container.innerHTML += `<div class="shooting-star anim-item" style="top:${Math.random()*50}%;left:-80px;--shoot-dur:${dur}s;--shoot-delay:${delay}s"></div>`;
                }
                container.innerHTML += `<div class="rocket anim-item">🚀</div>`;
                container.innerHTML += `<div class="planet anim-item" style="top:12%;right:12%">🌍</div>`;
                container.innerHTML += `<div class="planet anim-item" style="bottom:18%;left:8%;animation-duration:80s">🪐</div>`;
            } else if (currentTheme === 'modern') {
                container.innerHTML += `<div class="rainbow anim-item">🌈</div>`;
                container.innerHTML += `<div class="sun anim-item">☀️</div>`;
                for(let i=0; i<5; i++) container.innerHTML += `<div class="cloud anim-item" style="top:${8+i*18}%;animation-delay:${i*8}s;animation-duration:${50+Math.random()*30}s">☁️</div>`;
                for(let i=0; i<3; i++) container.innerHTML += `<div class="cloud-small anim-item" style="top:${15+i*25}%;animation-delay:${i*12+5}s;animation-duration:${70+Math.random()*20}s">☁️</div>`;
                const balloonEmojis = ['🎈','🎈','🟡','🔴','🟢','🔵','🟣','🎈'];
                for(let i=0; i<10; i++) container.innerHTML += `<div class="balloon anim-item" style="animation-delay:${i*4+Math.random()*3}s;left:${5+Math.random()*85}%;animation-duration:${20+Math.random()*15}s">${balloonEmojis[i%balloonEmojis.length]}</div>`;
            } else if (currentTheme === 'classic') {
                const hearts = ['❤️','💕','💗','🩷'];
                for(let i=0; i<12; i++) container.innerHTML += `<div class="heart anim-item" style="left:${Math.random()*90}%;animation-delay:${i*2.5+Math.random()*2}s;animation-duration:${16+Math.random()*8}s">${hearts[i%hearts.length]}</div>`;
                for(let i=0; i<5; i++) container.innerHTML += `<div class="heart-small anim-item" style="left:${Math.random()*90}%;animation-delay:${i*4}s;animation-duration:${22+Math.random()*8}s">💗</div>`;
                const flowers = ['🌸','🌺','🌷','🌼'];
                for(let i=0; i<6; i++) container.innerHTML += `<div class="flower anim-item" style="top:${Math.random()*80}%;left:${Math.random()*80}%;animation-delay:${i*2}s">${flowers[i%flowers.length]}</div>`;
                for(let i=0; i<3; i++) container.innerHTML += `<div class="butterfly anim-item" style="animation-delay:${i*7}s;animation-duration:${18+i*4}s">🦋</div>`;
                for(let i=0; i<8; i++) container.innerHTML += `<div class="petal anim-item" style="left:${Math.random()*100}%;animation-delay:${i*2.5}s;animation-duration:${12+Math.random()*6}s">🌸</div>`;
            } else if (currentTheme === 'notebook') {
                container.innerHTML += `<div class="pencil anim-item" style="top:20%;left:10%">✏️</div>`;
                container.innerHTML += `<div class="pencil anim-item" style="top:60%;left:70%;animation-delay:6s">🖊️</div>`;
                for(let i=0; i<4; i++) container.innerHTML += `<div class="paperclip anim-item" style="top:${10+i*22}%;right:${3+i*8}%;animation-delay:${i*1.5}s">📎</div>`;
                container.innerHTML += `<div class="eraser anim-item" style="bottom:15%;left:25%">🧽</div>`;
                const doodles = ['⭐','✨','💡','📌','🎵'];
                for(let i=0; i<5; i++) container.innerHTML += `<div class="doodle anim-item" style="top:${15+Math.random()*70}%;left:${10+Math.random()*80}%;animation-delay:${i*1.2}s">${doodles[i]}</div>`;
            } else if (currentTheme === 'aquarium') {
                for(let i=0; i<15; i++) {
                    const size = 10 + Math.random() * 20;
                    const dur = 4 + Math.random() * 6;
                    container.innerHTML += `<div class="bubble anim-item" style="left:${Math.random()*100}%;width:${size}px;height:${size}px;--dur:${dur}s;--tx:${(Math.random()-0.5)*100}px;animation-delay:${Math.random()*5}s"></div>`;
                }
                const fishes = ['🐟','🐠','🐡','🦈'];
                for(let i=0; i<6; i++) {
                    const dur = 15 + Math.random() * 20;
                    container.innerHTML += `<div class="fish anim-item" style="--y:${10+Math.random()*80}%;--dur:${dur}s;animation-delay:${Math.random()*10}s">${fishes[i%fishes.length]}</div>`;
                }
                for(let i=0; i<8; i++) {
                    container.innerHTML += `<div class="seaweed anim-item" style="left:${i*12+Math.random()*5}%">🌿</div>`;
                }
            }
        }

        function initDB() {
            return new Promise((resolve, reject) => {
                const request = indexedDB.open(DB_NAME, DB_VERSION);
                request.onupgradeneeded = (e) => {
                    const db = e.target.result;
                    if (!db.objectStoreNames.contains('people')) db.createObjectStore('people', { keyPath: 'id' });
                };
                request.onsuccess = (e) => { db = e.target.result; resolve(); };
                request.onerror = (e) => reject(e);
            });
        }

        const peopleDB = {
            getAll: () => new Promise(r => {
                const tx = db.transaction('people', 'readonly');
                const req = tx.objectStore('people').getAll();
                req.onsuccess = () => r(req.result || []);
            }),
            get: (id) => new Promise(r => {
                const tx = db.transaction('people', 'readonly');
                const req = tx.objectStore('people').get(id);
                req.onsuccess = () => r(req.result);
            }),
            save: (data) => new Promise(r => {
                const tx = db.transaction('people', 'readwrite');
                tx.objectStore('people').put(data);
                tx.oncomplete = () => r();
            }),
            delete: (id) => new Promise(r => {
                const tx = db.transaction('people', 'readwrite');
                tx.objectStore('people').delete(id);
                tx.oncomplete = () => r();
            })
        };

        const generateId = () => Math.random().toString(36).substr(2, 9);
        const navigate = (hash) => { window.location.hash = hash; };
        
        function speak(text) {
            if (!window.speechSynthesis) return;
            window.speechSynthesis.cancel();
            const msg = new SpeechSynthesisUtterance(text);
            msg.lang = 'tr-TR';
            msg.rate = 0.85;
            msg.pitch = 1.2;
            window.speechSynthesis.speak(msg);
        }

        const app = document.getElementById('app');

        async function render() {
            const hash = window.location.hash || '#/';
            app.innerHTML = '<div style="text-align:center;padding:100px;font-size:3rem">✨</div>';
            popGameActive = false;
            if (spawnTimer) clearTimeout(spawnTimer);
            // Arka plan animasyonlarını tekrar göster
            document.getElementById('bg-elements').classList.remove('bg-hidden');

            try {
                if (hash === '#/') {
                    const people = await peopleDB.getAll();
                    renderHome(people);
                } else if (hash.startsWith('#/person/')) {
                    currentPersonId = hash.split('/')[2];
                    const person = await peopleDB.get(currentPersonId);
                    renderPerson(person);
                } else if (hash.startsWith('#/category/')) {
                    const parts = hash.split('/');
                    const person = await peopleDB.get(parts[2]);
                    const category = person.categories.find(c => c.id === parts[3]);
                    renderCategory(person, category);
                } else if (hash.startsWith('#/quiz-list/')) {
                    const person = await peopleDB.get(hash.split('/')[2]);
                    renderQuizCategories(person);
                } else if (hash.startsWith('#/quiz-cat-detail/')) {
                    const parts = hash.split('/');
                    const person = await peopleDB.get(parts[2]);
                    renderQuizList(person, decodeURIComponent(parts[3]));
                } else if (hash.startsWith('#/quiz-play/')) {
                    const parts = hash.split('/');
                    const person = await peopleDB.get(parts[2]);
                    const index = person.quizzes.findIndex(q => q.id === parts[3]);
                    renderQuizPlay(person, index);
                } else if (hash === '#/add-person') {
                    renderPersonForm();
                } else if (hash.startsWith('#/edit-person/')) {
                    const person = await peopleDB.get(hash.split('/')[2]);
                    renderPersonForm(person);
                } else if (hash.startsWith('#/add-category/')) {
                    renderCategoryForm(hash.split('/')[2]);
                } else if (hash.startsWith('#/edit-category/')) {
                    const parts = hash.split('/');
                    const person = await peopleDB.get(parts[2]);
                    const cat = person.categories.find(c => c.id === parts[3]);
                    renderCategoryForm(person.id, cat);
                } else if (hash.startsWith('#/add-item/')) {
                    const parts = hash.split('/');
                    renderItemForm(parts[2], parts[3]);
                } else if (hash.startsWith('#/edit-item/')) {
                    const parts = hash.split('/');
                    const person = await peopleDB.get(parts[2]);
                    const cat = person.categories.find(c => c.id === parts[3]);
                    const item = cat.items.find(i => i.id === parts[4]);
                    renderItemForm(person.id, cat.id, item);
                } else if (hash.startsWith('#/add-quiz/')) {
                    const parts = hash.split('/');
                    renderQuizForm(parts[2], decodeURIComponent(parts[3] || 'Genel'));
                } else if (hash.startsWith('#/pop-game/')) {
                    const person = await peopleDB.get(hash.split('/')[2]);
                    renderPopGame(person);
                } else if (hash.startsWith('#/memory-game/')) {
                    const person = await peopleDB.get(hash.split('/')[2]);
                    renderMemoryGame(person);
                } else if (hash.startsWith('#/memory-setup/')) {
                    const person = await peopleDB.get(hash.split('/')[2]);
                    renderMemorySetup(person);
                } else if (hash.startsWith('#/game-menu/')) {
                    const person = await peopleDB.get(hash.split('/')[2]);
                    renderGameMenu(person);
                } else if (hash.startsWith('#/color-game/')) {
                    const person = await peopleDB.get(hash.split('/')[2]);
                    renderColorGame(person);
                } else if (hash.startsWith('#/animal-game/')) {
                    const person = await peopleDB.get(hash.split('/')[2]);
                    renderAnimalGame(person);
                } else if (hash.startsWith('#/shape-game/')) {
                    const person = await peopleDB.get(hash.split('/')[2]);
                    renderShapeGame(person);
                } else if (hash === '#/voice-parkour') {
                    renderVoiceParkour();
                } else if (hash === '#/puzzle-game') {
                    renderPuzzleGame();
                } else if (hash === '#/voice-imitate') {
                    renderVoiceImitate();
                }
            } catch (err) {
                console.error(err);
                app.innerHTML = '<p style="padding:20px">Hata! Lütfen yenile 🛠️</p>';
            }
        }

        function getHeader(title, backHash = null, extraBtn = null) {
            const themeIcons = { modern: '🌈', classic: '🌸', space: '🚀', notebook: '📝', aquarium: '🌊' };
            const colors = { modern: '#FFB300', classic: '#ec4899', space: '#1e293b', notebook: '#334155', aquarium: '#0288d1' };
            
            // Eğer oyun alanındaysak ve backHash yoksa ana sayfaya dön
            const backAction = backHash ? `navigate('${backHash}')` : `window.history.back()`;
            
            return `
                <div class="header" style="background:${colors[currentTheme]}">
                    ${(backHash || window.location.hash !== '#/') ? `<button class="btn-round" onclick="${backAction}">⬅️</button>` : `<button class="btn-round" onclick="toggleThemeMenu()">${themeIcons[currentTheme]}</button>`}
                    <h1>${title}</h1>
                    <div class="nav-buttons">${extraBtn || ''}</div>
                </div>
            `;
        }

        function renderHome(people) {
            app.innerHTML = getHeader('Konuşuyorum', null, `
                <button class="btn-round" style="background:#FF6B6B;color:white" onclick="navigate('#/voice-parkour')">🏃</button>
                <button class="btn-round" style="background:#54A0FF;color:white" onclick="navigate('#/puzzle-game')">🧩</button>
                <button class="btn-round" style="background:#1DD1A1;color:white" onclick="navigate('#/voice-imitate')">🐮</button>
                <button class="btn-round btn-secondary" onclick="navigate('#/add-person')">＋</button>
            `) + `
                <div class="container">
                    ${people.length === 0 ? `
                        <div style="text-align:center; padding:50px; background:rgba(255,255,255,0.7); border-radius:30px; border:4px dashed #FFB300; margin-top:20px;">
                            <p style="font-size:2rem; margin-bottom:10px;">👋 Merhaba!</p>
                            <p style="font-size:1.2rem; color:#4834D4; font-weight:700;">Henüz kimse kayıtlı değil.</p>
                            <p style="color:#666; margin-top:10px;">Sağ üstteki + butonuna basarak ilk kişiyi ekleyebilirsin.</p>
                        </div>
                    ` : ''}
                    <div class="grid">${people.map(p => `
                    <div class="card person" onclick="navigate('#/person/${p.id}')">
                        <div class="action-btns">
                            <button class="btn-mini btn-del" onclick="event.stopPropagation(); deletePerson('${p.id}')">✕</button>
                            <button class="btn-mini btn-edit" onclick="event.stopPropagation(); navigate('#/edit-person/${p.id}')">✎</button>
                        </div>
                        <div class="card-img">${p.avatar ? `<img src="${p.avatar}" style="width:100%;height:100%;border-radius:12px;object-fit:cover">` : '👤'}</div>
                        <div class="card-title">${p.name}</div>
                    </div>`).join('')}</div></div>`;
        }

        function renderPersonForm(editData = null) {
            app.innerHTML = getHeader(editData ? 'Düzenle' : 'Yeni Kişi', '#/') + `
                <div class="container"><div class="form-card"><form onsubmit="handleSavePerson(event, ${editData ? `'${editData.id}'` : 'null'})">
                    <div class="form-group"><label>İsim</label><input type="text" id="pName" required value="${editData ? editData.name : ''}"></div>
                    <div class="form-group"><label>Fotoğraf</label><input type="file" id="pImg" accept="image/*"></div>
                    <button type="submit" class="btn-save">Kaydet ✨</button></form></div></div>`;
        }

        async function handleSavePerson(e, id) {
            e.preventDefault();
            const name = document.getElementById('pName').value;
            const file = document.getElementById('pImg').files[0];
            let person = id ? await peopleDB.get(id) : { id: generateId(), name, avatar: null, categories: [], quizzes: [], popHighScore: 0, memoryImages: [] };
            person.name = name;
            if (file) {
                const reader = new FileReader();
                reader.onload = async (ev) => { person.avatar = ev.target.result; await peopleDB.save(person); navigate('#/'); };
                reader.readAsDataURL(file);
            } else { await peopleDB.save(person); navigate('#/'); }
        }

        function renderPerson(person) {
            app.innerHTML = getHeader(person.name, '#/', `
                <button class="btn-round" style="background:#54A0FF;color:white" onclick="navigate('#/quiz-list/${person.id}')">🎮</button>
                <button class="btn-round" style="background:#FF9F43;color:white" onclick="navigate('#/game-menu/${person.id}')">🎯</button>
                <button class="btn-round btn-secondary" onclick="navigate('#/add-category/${person.id}')">＋</button>
            `) + `
                <div class="container">
                    ${(person.categories || []).length === 0 ? `
                        <div style="text-align:center; padding:40px; background:rgba(255,255,255,0.5); border-radius:30px; border:3px dashed #CCC; margin-top:20px;">
                            <p style="font-size:1.5rem; color:#666; font-weight:700;">Henüz kategori yok 📁</p>
                            <p style="color:#888;">Sağ üstteki + butonuna basarak ilk kategorini oluşturabilirsin!</p>
                        </div>
                    ` : `
                        <div class="grid">${(person.categories || []).map(c => `
                            <div class="card category" onclick="navigate('#/category/${person.id}/${c.id}')">
                                <div class="action-btns">
                                    <button class="btn-mini btn-del" onclick="event.stopPropagation(); deleteCategory('${person.id}', '${c.id}')">✕</button>
                                    <button class="btn-mini btn-edit" onclick="event.stopPropagation(); navigate('#/edit-category/${person.id}/${c.id}')">✎</button>
                                </div>
                                <div class="card-img">📁</div><div class="card-title">${c.name}</div>
                            </div>`).join('')}</div>
                    `}
                </div>`;
        }

        function renderGameMenu(person) {
            app.innerHTML = getHeader('Oyunlar', '#/person/' + person.id) + `
                <div class="container">
                    <div class="game-menu-container">
                        <button class="game-menu-btn" style="background:#54A0FF" onclick="navigate('#/quiz-list/${person.id}')">🎮 Quizler & Soru Ekle</button>
                        <button class="game-menu-btn" style="background:#FF9F43" onclick="navigate('#/pop-game/${person.id}')">🎈 Patlatma Oyunu</button>
                        <button class="game-menu-btn" style="background:#1DD1A1" onclick="navigate('#/memory-game/${person.id}')">🧩 Hafıza Oyunu</button>
                        <button class="game-menu-btn" style="background:#FF6B6B" onclick="toggleSubMenu('extra-games')">➕ Diğer Oyunlar</button>
                        <div id="extra-games" class="game-sub-menu">
                            <button class="game-sub-btn" style="background:#FF6B6B" onclick="navigate('#/color-game/${person.id}')">🎨 Renk Bulmaca</button>
                            <button class="game-sub-btn" style="background:#4834D4" onclick="navigate('#/animal-game/${person.id}')">🦁 Hayvanı Bul</button>
                            <button class="game-sub-btn" style="background:#2ecc71" onclick="navigate('#/shape-game/${person.id}')">📐 Şekil Bulmaca</button>
                        </div>
                    </div>
                </div>`;
        }

        function toggleSubMenu(id) {
            const menu = document.getElementById(id);
            menu.classList.toggle('active');
        }

        // COLOR MATCHING GAME
        let currentColor = null;
        function renderColorGame(person) {
            const colors = [
                { name: 'Mavi', hex: '#54A0FF', emoji: '🔵' },
                { name: 'Kırmızı', hex: '#FF6B6B', emoji: '🔴' },
                { name: 'Sarı', hex: '#FFB300', emoji: '🟡' },
                { name: 'Yeşil', hex: '#1DD1A1', emoji: '🟢' }
            ];
            currentColor = colors[Math.floor(Math.random() * colors.length)];
            const options = [...colors].sort(() => Math.random() - 0.5);

            app.innerHTML = getHeader('Renk Bulmaca', '#/game-menu/' + person.id) + `
                <div class="container">
                    <div class="match-container" style="background:rgba(255,255,255,0.3); border-radius:40px; padding:40px; border:4px dashed var(--primary);">
                        <p style="font-weight:800; font-size:1.5rem; color:var(--text); margin-bottom:20px;">${currentColor.name} rengini bul!</p>
                        <div id="target-balloon" class="match-target" style="color:${currentColor.hex}; font-size:10rem; animation: floatUpMatch 4s infinite alternate ease-in-out;">🎈</div>
                        <div class="match-options" style="margin-top:40px;">
                            ${options.map(opt => `
                                <div class="match-opt" style="background:${opt.hex}; width:100px; height:100px; font-size:4rem; transition:transform 0.2s;" onclick="checkColorMatch(this, '${opt.name}', '${person.id}')">${opt.emoji}</div>
                            `).join('')}
                        </div>
                    </div>
                </div>`;

        async function startVoiceGame() {
            const btn = document.getElementById('start-parkour-btn');
            btn.disabled = true;
            btn.innerText = "Mikrofon Açık!";
            
            try {
                voiceStream = await navigator.mediaDevices.getUserMedia({ audio: true });
                const audioContext = new (window.AudioContext || window.webkitAudioContext)();
                const analyser = audioContext.createAnalyser();
                const microphone = audioContext.createMediaStreamSource(voiceStream);
                microphone.connect(analyser);
                analyser.fftSize = 256;
                const bufferLength = analyser.frequencyBinCount;
                const dataArray = new Uint8Array(bufferLength);

                const char = document.getElementById('voice-char');
                const levelBar = document.getElementById('mic-level-bar');
                let posX = 20;

                function update() {
                    if (window.location.hash !== '#/voice-parkour') {
                        if(voiceStream) voiceStream.getTracks().forEach(t => t.stop());
                        return;
                    }
                    
                    analyser.getByteFrequencyData(dataArray);
                    let sum = 0;
                    for(let i=0; i<bufferLength; i++) sum += dataArray[i];
                    let average = sum / bufferLength;

                    // Görsel seviye barı
                    if(levelBar) levelBar.style.width = Math.min(100, average * 2) + '%';

                    if (average > 15) { // Hassasiyet eşiği
                        char.classList.add('jumping');
                        posX += (average / 5);
                        if (posX > window.innerWidth - 80) {
                            posX = 20;
                            confetti({ particleCount: 100, origin: { x: 0.8 } });
                            speak("Harika gidiyorsun!");
                        }
                        char.style.left = posX + 'px';
                    } else {
                        char.classList.remove('jumping');
                    }
                    requestAnimationFrame(update);
                }
                update();
            } catch (err) { 
                alert("Mikrofon izni verilmedi veya desteklenmiyor!"); 
                btn.disabled = false;
                btn.innerText = "Tekrar Dene";
            }
        }

        }

        function renderQuizCategories(person) {
            const cats = person.quizCategories || [];
            
            app.innerHTML = getHeader('Soru Kategorileri', '#/person/' + person.id, `<button class="btn-round btn-secondary" onclick="renderAddQuizCategory('${person.id}')">＋ Yeni Kategori</button>`) + `
                <div class="container">
                    ${cats.length === 0 ? `
                        <div style="text-align:center; padding:50px; background:rgba(255,255,255,0.7); border-radius:30px; border:4px dashed #54A0FF; margin-top:20px;">
                            <p style="font-size:1.5rem; color:#666; font-weight:700;">Henüz kategori yok 📚</p>
                            <p style="color:#888; margin-top:10px;">Yeni bir kategori ekleyerek başlayabilirsin!</p>
                        </div>
                    ` : `
                        <div class="grid">
                            ${cats.map(c => `
                                <div class="card category" onclick="navigate('#/quiz-cat-detail/${person.id}/${encodeURIComponent(c)}')">
                                    <div class="action-btns">
                                        <button class="btn-mini btn-del" onclick="event.stopPropagation(); deleteQuizCategory('${person.id}', '${c.replace(/'/g, "\\'")}')">✕</button>
                                        <button class="btn-mini btn-edit" onclick="event.stopPropagation(); renderEditQuizCategory('${person.id}', '${c.replace(/'/g, "\\'")}')">✎</button>
                                    </div>
                                    <div class="card-img">📚</div>
                                    <div class="card-title">${c}</div>
                                </div>
                            `).join('')}
                        </div>
                    `}
                </div>`;
        }

        async function deleteQuizCategory(pid, catName) {
            if(confirm(`"${catName}" kategorisini ve içindeki tüm soruları silmek istediğine emin misin?`)) {
                const person = await peopleDB.get(pid);
                person.quizCategories = (person.quizCategories || []).filter(c => c !== catName);
                person.quizzes = (person.quizzes || []).filter(q => q.category !== catName);
                await peopleDB.save(person);
                render();
            }
        }

        function renderAddQuizCategory(pid) {
            app.innerHTML = getHeader('Yeni Kategori', '#/quiz-list/' + pid) + `
                <div class="container">
                    <div class="form-card">
                        <div class="form-group">
                            <label>Kategori Adı</label>
                            <input type="text" id="newQuizCatName" placeholder="Örn: Renkler, Hayvanlar..." required>
                        </div>
                        <button class="btn-save" onclick="handleAddQuizCategory('${pid}')">Kategoriyi Oluştur ✨</button>
                    </div>
                </div>`;
        }

        function renderEditQuizCategory(pid, oldName) {
            app.innerHTML = getHeader('Kategoriyi Düzenle', '#/quiz-list/' + pid) + `
                <div class="container">
                    <div class="form-card">
                        <div class="form-group">
                            <label>Yeni Kategori Adı</label>
                            <input type="text" id="editQuizCatName" value="${oldName}" required>
                        </div>
                        <button class="btn-save" onclick="handleUpdateQuizCategory('${pid}', '${oldName.replace(/'/g, "\\'")}')">Güncelle ✎</button>
                    </div>
                </div>`;
        }

        async function handleUpdateQuizCategory(pid, oldName) {
            const btn = document.querySelector('.btn-save');
            const newName = document.getElementById('editQuizCatName').value.trim();
            if(!newName || newName === oldName) { navigate('#/quiz-list/' + pid); return; }
            
            btn.disabled = true;
            btn.innerText = "Güncelleniyor...";
            
            try {
                const person = await peopleDB.get(pid);
                person.quizCategories = (person.quizCategories || []).map(c => c === oldName ? newName : c);
                person.quizzes = (person.quizzes || []).map(q => {
                    if(q.category === oldName) q.category = newName;
                    return q;
                });
                await peopleDB.save(person);
                speak("Kategori güncellendi!");
                setTimeout(() => navigate('#/quiz-list/' + pid), 200);
            } catch (err) {
                console.error(err);
                btn.disabled = false;
                btn.innerText = "Güncelle ✎";
            }
        }

        async function handleAddQuizCategory(pid) {
            const btn = document.querySelector('.btn-save');
            const nameInput = document.getElementById('newQuizCatName');
            const name = nameInput.value.trim();
            
            if(!name) { alert("Lütfen bir kategori adı girin!"); return; }
            
            btn.disabled = true;
            btn.innerText = "Kaydediliyor...";
            
            try {
                const person = await peopleDB.get(pid);
                if(!person.quizCategories) person.quizCategories = [];
                
                if(!person.quizCategories.includes(name)) {
                    person.quizCategories.push(name);
                    await peopleDB.save(person);
                }
                
                speak("Kategori oluşturuldu!");
                setTimeout(() => navigate('#/quiz-list/' + pid), 200);
            } catch (err) {
                console.error(err);
                alert("Hata oluştu!");
                btn.disabled = false;
                btn.innerText = "Kategoriyi Oluştur ✨";
            }
        }

        function renderQuizList(person, categoryName) {
            const filteredQuizzes = (person.quizzes || []).filter(q => q.category === categoryName);

            app.innerHTML = getHeader(categoryName, '#/quiz-list/' + person.id, `<button class="btn-round btn-secondary" onclick="navigate('#/add-quiz/${person.id}/${encodeURIComponent(categoryName)}')">＋ Soru Ekle</button>`) + `
                <div class="container">
                    ${filteredQuizzes.length === 0 ? `
                        <div style="text-align:center; padding:40px; background:rgba(255,255,255,0.5); border-radius:30px; border:3px dashed #CCC; margin-top:20px;">
                            <p style="font-size:1.5rem; color:#666; font-weight:700;">Henüz bu kategoride soru yok 🎮</p>
                            <p style="color:#888;">Sağ üstteki + butonuna basarak ilk soruyu ekleyebilirsin.</p>
                        </div>
                    ` : ''}
                    <div class="grid">${filteredQuizzes.map(q => `
                        <div class="card quiz" onclick="navigate('#/quiz-play/${person.id}/${q.id}')" style="border:3px solid #eee;">
                            <div class="action-btns">
                                <button class="btn-mini btn-del" onclick="event.stopPropagation(); deleteQuiz('${person.id}', '${q.id}')">✕</button>
                            </div>
                            <div class="card-img">${q.image ? `<img src="${q.image}" style="width:100%;height:100%;border-radius:12px;object-fit:cover">` : '❓'}</div>
                            <div class="card-title">${q.question}</div>
                        </div>`).join('')}</div>
                </div>`;
        }

        function renderQuizPlay(person, index) {
            const quiz = person.quizzes[index];
            if (!quiz) { navigate('#/quiz-list/' + person.id); return; }
            const backHash = '#/quiz-cat-detail/' + person.id + '/' + encodeURIComponent(quiz.category);
            
            app.innerHTML = getHeader('Soru ' + (index + 1), backHash) + `
                <div class="container">
                    <div class="quiz-container">
                        <div style="display:flex; align-items:center; justify-content:center; gap:10px; margin-bottom:15px;">
                            <div class="quiz-question" style="margin-bottom:0;">${quiz.question}</div>
                            <button class="btn-round" style="background:var(--blue); color:white; width:45px; height:45px; font-size:1.2rem;" onclick="speak('${quiz.question.replace(/'/g, "\\'")}')">🔊</button>
                        </div>
                        
                        ${quiz.image ? `<img src="${quiz.image}" class="quiz-img" style="max-width:100%; border-radius:20px; margin-bottom:20px; border:4px solid #eee;">` : ''}
                        
                        <div class="options-grid">
                            ${quiz.options.map((opt, i) => `
                                <div style="position:relative;">
                                    <button class="option-btn" onclick="checkAnswer(this, ${i === quiz.correct})" style="padding-right:50px; width:100%;">
                                        ${opt.img ? `<img src="${opt.img}" class="option-img" style="max-width:70px; margin-bottom:5px;">` : ''}
                                        <span class="option-text">${opt.text}</span>
                                    </button>
                                    <button class="btn-round" 
                                            style="position:absolute; right:5px; top:50%; transform:translateY(-50%); background:#FFF; border:2px solid var(--blue); color:var(--blue); width:35px; height:35px; font-size:1rem; z-index:10;" 
                                            onclick="event.stopPropagation(); speak('${opt.text.replace(/'/g, "\\'")}')">🔊</button>
                                </div>
                            `).join('')}
                        </div>
                        
                        <button class="next-btn" style="margin-top:30px; background:var(--primary);" onclick="navigate('#/quiz-play/${person.id}/${person.quizzes[index+1]?.id || person.quizzes[0].id}')">Sıradaki Soru ➡️</button>
                    </div>
                </div>`;
        }

        window.checkAnswer = (btn, isCorrect) => {
            if (isCorrect) { btn.classList.add('correct'); confetti({ particleCount: 150, spread: 70, origin: { y: 0.6 } }); speak("Harika! Doğru!"); } 
            else { btn.classList.add('wrong'); speak("Tekrar dene!"); setTimeout(() => btn.classList.remove('wrong'), 500); }
        };

        function renderQuizForm(pid, categoryName = 'Genel') {
            app.innerHTML = getHeader('Yeni Soru', '#/quiz-cat-detail/' + pid + '/' + encodeURIComponent(categoryName)) + `
                <div class="container">
                    <div class="form-card">
                        <form id="quiz-form">
                            <div class="form-group">
                                <label>Kategori</label>
                                <input type="text" id="qCat" value="${categoryName}" readonly style="background:#f0f0f0; cursor:not-allowed;">
                            </div>
                            <div class="form-group">
                                <label>Soru Metni</label>
                                <textarea id="qText" required placeholder="Örn: Bu hangi renk? Buraya uzun bir soru da yazabilirsin..."></textarea>
                            </div>
                            <div class="form-group">
                                <label>Soru Görseli (İsteğe Bağlı)</label>
                                <input type="file" id="qImg" accept="image/*">
                            </div>
                            <hr style="margin:20px 0; border:1px solid #eee;">
                            <label style="font-weight:800; display:block; margin-bottom:10px; color:var(--primary);">Seçenekler</label>
                            ${[0,1,2,3].map(i => `
                                <div style="background:#F8F9FA; padding:15px; border-radius:20px; margin-bottom:15px; border:2px solid #EEE; position:relative;">
                                    <label style="font-size:0.9rem; color:#666;">Seçenek ${i+1}</label>
                                    <input type="text" id="optT${i}" required placeholder="Cevap metni" style="margin-bottom:10px;">
                                    <input type="file" id="optI${i}" accept="image/*">
                                </div>`).join('')}
                            <div class="form-group">
                                <label>Doğru Cevap Hangisi?</label>
                                <select id="correctIdx" style="background:#FFF9E6; border:2px solid var(--primary); font-weight:700;">
                                    <option value="0">1. Seçenek</option>
                                    <option value="1">2. Seçenek</option>
                                    <option value="2">3. Seçenek</option>
                                    <option value="3">4. Seçenek</option>
                                </select>
                            </div>
                            <button type="button" onclick="handleSaveQuizAction('${pid}')" class="btn-save" style="background:var(--green); margin-top:20px;">Soruyu Kaydet 🎮</button>
                        </form>
                    </div>
                </div>`;
        }

        async function handleSaveQuizAction(pid) {
            const btn = event.target;
            btn.disabled = true;
            btn.innerText = "Kaydediliyor...";
            
            try {
                const person = await peopleDB.get(pid);
                const quiz = { 
                    id: generateId(), 
                    category: document.getElementById('qCat').value || 'Genel',
                    question: document.getElementById('qText').value, 
                    image: null, 
                    options: [], 
                    correct: parseInt(document.getElementById('correctIdx').value) 
                };

                const readFile = (file) => new Promise(r => { 
                    if(!file) r(null); 
                    const rd = new FileReader(); 
                    rd.onload = (ev) => r(ev.target.result); 
                    rd.readAsDataURL(file); 
                });

                quiz.image = await readFile(document.getElementById('qImg').files[0]);
                
                for(let i=0; i<4; i++) { 
                    const text = document.getElementById('optT'+i).value;
                    const img = await readFile(document.getElementById('optI'+i).files[0]);
                    quiz.options.push({ text, img }); 
                }

                if(!person.quizzes) person.quizzes = [];
                person.quizzes.push(quiz);
                await peopleDB.save(person);
                speak("Soru başarıyla eklendi!");
                navigate('#/quiz-cat-detail/' + pid + '/' + encodeURIComponent(quiz.category));
            } catch (err) {
                console.error(err);
                alert("Hata oluştu!");
                btn.disabled = false;
                btn.innerText = "Soruyu Kaydet 🎮";
            }
        }



        window.deletePerson = async (id) => { if(confirm('Bu kişiyi silmek istediğine emin misin?')) { await peopleDB.delete(id); render(); } };
        window.deleteCategory = async (pid, cid) => { if(confirm('Bu kategoriyi silmek istediğine emin misin?')) { const p = await peopleDB.get(pid); p.categories = p.categories.filter(c => c.id !== cid); await peopleDB.save(p); render(); } };
        window.deleteItem = async (pid, cid, iid) => { if(confirm('Bu kelimeyi silmek istediğine emin misin?')) { const p = await peopleDB.get(pid); const c = p.categories.find(cat => cat.id === cid); c.items = c.items.filter(i => i.id !== iid); await peopleDB.save(p); render(); } };
        window.deleteQuiz = async (pid, qid) => { if(confirm('Bu soruyu silmek istediğine emin misin?')) { const p = await peopleDB.get(pid); p.quizzes = p.quizzes.filter(q => q.id !== qid); await peopleDB.save(p); render(); } };

        window.addEventListener('hashchange', render);
        initDB().then(() => { updateBackground(); render(); });
    </script>
</body>
</html>
