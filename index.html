<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#FFB300">
    <title>Konuşuyorum & Öğreniyorum 🌈</title>

    <link rel="manifest" href="manifest.json">
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;500;600;700&family=Baloo+2:wght@600;700;800&family=Indie+Flower&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

    <style id="theme-styles">
        :root {
            --primary: #FFB300; --secondary: #00D2D3; --accent: #FF6B6B;
            --blue: #54A0FF; --green: #1DD1A1; --bg: #FFF9E6;
            --text: #4834D4; --white: #FFFFFF;
        }

        /* TEMA TEMELLERİ */
        body { min-height: 100vh; overflow-x: hidden; user-select: none; transition: all 0.3s; }
        body.theme-modern { background-color: var(--bg); color: var(--text); }
        body.theme-classic { background-color: #fdf2f8; color: #831843; }
        body.theme-space { background-color: #0f172a; color: #f8fafc; }
        body.theme-notebook { background-color: #fefce8; color: #1e293b; background-image: linear-gradient(#e5e7eb 1px, transparent 1px); background-size: 100% 30px; }

        /* ARKA PLAN ANİMASYONLARI */
        .bg-animations { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; pointer-events: none; overflow: hidden; }
        .anim-item { position: absolute; }

        /* UZAY - GERÇEKÇİ */
        .theme-space .rocket { font-size: 5rem; animation: roam 35s infinite ease-in-out; }
        .theme-space .planet { font-size: 9rem; animation: slowSpin 60s infinite linear; opacity: 0.4; }
        .theme-space .star { background: white; border-radius: 50%; animation: twinkle 3s infinite; }
        .theme-space .shooting-star { 
            width: 250px; height: 1px; 
            background: linear-gradient(90deg, rgba(255,255,255,0.9), transparent); 
            animation: shootRealistic 15s infinite linear; opacity: 0;
        }

        /* GÖKKUŞAĞI */
        .theme-modern .cloud { font-size: 6rem; opacity: 0.3; animation: floatHorizontal 50s infinite linear; }
        .theme-modern .balloon { font-size: 4rem; opacity: 0.6; animation: roam 40s infinite ease-in-out; }
        .theme-modern .sun { font-size: 10rem; top: 5%; right: 5%; opacity: 0.2; animation: slowSpin 90s infinite linear; }

        /* KLASİK */
        .theme-classic .heart { font-size: 4rem; opacity: 0.3; animation: floatUp 20s infinite linear; }
        .theme-classic .flower { font-size: 5rem; opacity: 0.3; animation: slowSpin 45s infinite linear; }
        .theme-classic .butterfly { font-size: 3rem; opacity: 0.4; animation: roam 25s infinite ease-in-out; }

        /* NOT DEFTERİ */
        .theme-notebook * { font-family: 'Indie Flower', cursive !important; }
        .theme-notebook .pencil { font-size: 5rem; opacity: 0.3; animation: roam 30s infinite ease-in-out; }
        .theme-notebook .paperclip { font-size: 4rem; opacity: 0.3; animation: slowSpin 50s infinite linear; }

        /* ANİMASYON TANIMLARI */
        @keyframes shootRealistic {
            0% { transform: translate(-100px, -100px) rotate(-30deg); opacity: 0; }
            2% { opacity: 1; }
            10% { transform: translate(120vw, 70vh) rotate(-30deg); opacity: 0; }
            100% { opacity: 0; }
        }
        @keyframes roam {
            0% { transform: translate(-20vw, 120vh) rotate(0deg); }
            33% { transform: translate(50vw, 30vh) rotate(20deg); }
            66% { transform: translate(90vw, 10vh) rotate(-20deg); }
            100% { transform: translate(120vw, 70vh) rotate(15deg); }
        }
        @keyframes slowSpin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
        @keyframes twinkle { 0%, 100% { opacity: 0.2; } 50% { opacity: 1; } }
        @keyframes floatHorizontal { from { left: -30%; } to { left: 130%; } }
        @keyframes floatUp { from { bottom: -20%; } to { bottom: 120%; } }

        /* İDEAL BOYUTTA GİRİŞ ALANLARI */
        .form-group input, .form-group select, .form-group textarea {
            font-size: 1.1rem !important;
            padding: 10px 15px !important;
            border-radius: 12px !important;
            border: 2px solid #DDD !important;
            width: 100% !important;
            margin-bottom: 12px !important;
            background: white !important;
            color: #333 !important;
            display: block !important;
        }
        .form-group label {
            font-size: 1rem !important;
            font-weight: 700 !important;
            margin-bottom: 6px !important;
            display: block !important;
            color: inherit;
        }

        /* UZAY TEMASI GİRİŞ ALANI DÜZELTME */
        .theme-space .form-group input, .theme-space .form-group select, .theme-space .form-group textarea {
            background: #1e293b !important;
            color: #f8fafc !important;
            border-color: #38bdf8 !important;
        }
        .theme-space .form-group label { color: #f8fafc !important; }

        /* UZAY TEMASI KART DÜZELTME */
        .theme-space .card { background: #1e293b !important; border-color: #38bdf8 !important; color: #f8fafc !important; }
        .theme-space .card-title { color: #f8fafc !important; }
        .theme-space .card-img { background: #0f172a !important; }

        /* GENEL STİLLER */
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; font-family: 'Fredoka', sans-serif; }
        .header { padding: 15px 20px; display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 100; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .header h1 { font-family: 'Baloo 2', cursive; font-size: 1.4rem; color: white; font-weight: 800; }
        .nav-buttons { display: flex; gap: 8px; }
        .btn-round { border: none; width: 42px; height: 42px; font-size: 1.3rem; cursor: pointer; display: flex; align-items: center; justify-content: center; box-shadow: 0 4px 0 rgba(0,0,0,0.1); border-radius: 12px; }
        .btn-round:active { transform: translateY(4px); box-shadow: none; }
        .container { padding: 15px; max-width: 900px; margin: 0 auto; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 15px; }
        .card { background: white; padding: 15px 10px; text-align: center; cursor: pointer; position: relative; transition: transform 0.2s; border-radius: 25px; border: 5px solid #F0F2F5; }
        .card:active { transform: scale(0.95); }
        .card-img { width: 85px; height: 85px; margin: 0 auto 10px; border-radius: 20px; background: #F8F9FA; display: flex; align-items: center; justify-content: center; font-size: 3rem; object-fit: cover; }
        .card-title { font-weight: 800; font-size: 1.1rem; font-family: 'Baloo 2', cursive; }
        .action-btns { position: absolute; top: 8px; right: 8px; display: flex; flex-direction: column; gap: 5px; }
        .btn-mini { width: 26px; height: 26px; border-radius: 8px; border: none; cursor: pointer; display: flex; align-items: center; justify-content: center; color: white; font-size: 0.8rem; }
        .btn-del { background: #FF6B6B; } .btn-edit { background: #54A0FF; }

        .theme-selector { position: absolute; top: 70px; left: 15px; background: white; border-radius: 20px; padding: 12px; box-shadow: 0 5px 20px rgba(0,0,0,0.2); display: none; z-index: 200; border: 4px solid #FFB300; }
        .theme-option { padding: 10px 15px; cursor: pointer; font-weight: 800; border-radius: 12px; margin-bottom: 6px; display: flex; align-items: center; gap: 12px; color: #4834D4; font-size: 1.1rem; }
        .theme-option:hover { background: #f0f0f0; }

        .quiz-container { background: white; border-radius: 35px; padding: 25px; text-align: center; border: 8px solid #FFB300; }
        .quiz-question { font-family: 'Baloo 2', cursive; font-size: 1.8rem; margin-bottom: 20px; font-weight: 800; }
        .quiz-img { width: 100%; max-width: 280px; height: 180px; border-radius: 25px; object-fit: cover; margin-bottom: 20px; }
        .options-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 20px; }
        .option-btn { background: #F8F9FA; border: 4px solid #EEE; padding: 15px; border-radius: 20px; cursor: pointer; display: flex; flex-direction: column; align-items: center; gap: 10px; box-shadow: 0 6px 0 #DDD; }
        .option-text { font-size: 1.2rem; font-weight: 800; }
        .next-btn { background: #54A0FF; color: white; border: none; padding: 15px 40px; border-radius: 20px; font-size: 1.3rem; font-weight: 800; cursor: pointer; box-shadow: 0 6px 0 #2E86DE; }
        .form-card { background: white; padding: 20px; border-radius: 25px; border: 5px solid #54A0FF; }
        .theme-space .form-card { background: #1e293b; border-color: #38bdf8; }
        .btn-save { width: 100%; padding: 15px; border-radius: 20px; border: none; background: #1DD1A1; color: white; font-weight: 800; font-size: 1.2rem; cursor: pointer; margin-top: 10px; box-shadow: 0 6px 0 #10AC84; }

        @media (max-width: 480px) { .grid { grid-template-columns: repeat(2, 1fr); } .options-grid { grid-template-columns: 1fr; } }
    </style>
</head>
<body class="theme-modern">
    <div class="bg-animations" id="bg-elements"></div>

    <div id="theme-menu" class="theme-selector">
        <div class="theme-option" onclick="setTheme('modern')">🌈 Gökkuşağı</div>
        <div class="theme-option" onclick="setTheme('classic')">🌸 Klasik</div>
        <div class="theme-option" onclick="setTheme('space')">🚀 Uzay</div>
        <div class="theme-option" onclick="setTheme('notebook')">📝 Not Defteri</div>
    </div>
    <div id="app"></div>

    <script>
        let db;
        const DB_NAME = 'KonusuyorumFinalDB_V5';
        const DB_VERSION = 1;

        let currentTheme = localStorage.getItem('app-theme') || 'modern';
        document.body.className = 'theme-' + currentTheme;

        function toggleThemeMenu() {
            const menu = document.getElementById('theme-menu');
            menu.style.display = menu.style.display === 'block' ? 'none' : 'block';
        }

        function setTheme(theme) {
            currentTheme = theme;
            document.body.className = 'theme-' + theme;
            localStorage.setItem('app-theme', theme);
            document.getElementById('theme-menu').style.display = 'none';
            updateBackground();
            render();
        }

        function updateBackground() {
            const container = document.getElementById('bg-elements');
            container.innerHTML = '';
            
            if (currentTheme === 'space') {
                for(let i=0; i<35; i++) container.innerHTML += `<div class="star anim-item" style="top:${Math.random()*100}%;left:${Math.random()*100}%;width:${1+Math.random()*3}px;height:${1+Math.random()*3}px;animation-delay:${Math.random()*3}s"></div>`;
                for(let i=0; i<8; i++) container.innerHTML += `<div class="shooting-star anim-item" style="top:${Math.random()*60}%;left:${Math.random()*40}%;animation-delay:${i*4}s"></div>`;
                container.innerHTML += `<div class="rocket anim-item">🚀</div>`;
                container.innerHTML += `<div class="planet anim-item" style="top:15%;right:15%">🌍</div>`;
                container.innerHTML += `<div class="planet anim-item" style="bottom:20%;left:10%;animation-duration:60s">🪐</div>`;
            } else if (currentTheme === 'modern') {
                container.innerHTML += `<div class="sun anim-item">☀️</div>`;
                for(let i=0; i<6; i++) container.innerHTML += `<div class="cloud anim-item" style="top:${10+i*15}%;animation-delay:${i*6}s;animation-duration:${40+Math.random()*30}s">☁️</div>`;
                for(let i=0; i<12; i++) container.innerHTML += `<div class="balloon anim-item" style="animation-delay:${i*5}s;left:${Math.random()*90}%">🎈</div>`;
            } else if (currentTheme === 'classic') {
                for(let i=0; i<15; i++) container.innerHTML += `<div class="heart anim-item" style="left:${Math.random()*90}%;animation-delay:${i*3}s">❤️</div>`;
                for(let i=0; i<8; i++) container.innerHTML += `<div class="flower anim-item" style="top:${Math.random()*80}%;left:${Math.random()*80}%;animation-delay:${i*4}s">🌸</div>`;
                container.innerHTML += `<div class="butterfly anim-item">🦋</div>`;
            } else if (currentTheme === 'notebook') {
                container.innerHTML += `<div class="pencil anim-item">✏️</div>`;
                for(let i=0; i<3; i++) container.innerHTML += `<div class="paperclip anim-item" style="top:10+i*30}%;right:${5+i*10}%;animation-delay:${i*2}s">📎</div>`;
                container.innerHTML += `<div class="paperclip anim-item" style="bottom:10%;left:20%">📌</div>`;
            }
        }

        function initDB() {
            return new Promise((resolve, reject) => {
                const request = indexedDB.open(DB_NAME, DB_VERSION);
                request.onupgradeneeded = (e) => {
                    const db = e.target.result;
                    if (!db.objectStoreNames.contains('people')) db.createObjectStore('people', { keyPath: 'id' });
                };
                request.onsuccess = (e) => { db = e.target.result; resolve(); };
                request.onerror = (e) => reject(e);
            });
        }

        const peopleDB = {
            getAll: () => new Promise(r => {
                const tx = db.transaction('people', 'readonly');
                const req = tx.objectStore('people').getAll();
                req.onsuccess = () => r(req.result || []);
            }),
            get: (id) => new Promise(r => {
                const tx = db.transaction('people', 'readonly');
                const req = tx.objectStore('people').get(id);
                req.onsuccess = () => r(req.result);
            }),
            save: (data) => new Promise(r => {
                const tx = db.transaction('people', 'readwrite');
                tx.objectStore('people').put(data);
                tx.oncomplete = () => r();
            }),
            delete: (id) => new Promise(r => {
                const tx = db.transaction('people', 'readwrite');
                tx.objectStore('people').delete(id);
                tx.oncomplete = () => r();
            })
        };

        const generateId = () => Math.random().toString(36).substr(2, 9);
        const navigate = (hash) => { window.location.hash = hash; };
        
        function speak(text) {
            if (!window.speechSynthesis) return;
            window.speechSynthesis.cancel();
            const msg = new SpeechSynthesisUtterance(text);
            msg.lang = 'tr-TR';
            msg.rate = 0.85;
            msg.pitch = 1.2;
            window.speechSynthesis.speak(msg);
        }

        const app = document.getElementById('app');

        async function render() {
            const hash = window.location.hash || '#/';
            app.innerHTML = '<div style="text-align:center;padding:100px;font-size:3rem">✨</div>';

            try {
                if (hash === '#/') {
                    const people = await peopleDB.getAll();
                    renderHome(people);
                } else if (hash.startsWith('#/person/')) {
                    const person = await peopleDB.get(hash.split('/')[2]);
                    renderPerson(person);
                } else if (hash.startsWith('#/category/')) {
                    const parts = hash.split('/');
                    const person = await peopleDB.get(parts[2]);
                    const category = person.categories.find(c => c.id === parts[3]);
                    renderCategory(person, category);
                } else if (hash.startsWith('#/quiz-list/')) {
                    const person = await peopleDB.get(hash.split('/')[2]);
                    renderQuizList(person);
                } else if (hash.startsWith('#/quiz-play/')) {
                    const parts = hash.split('/');
                    const person = await peopleDB.get(parts[2]);
                    const index = person.quizzes.findIndex(q => q.id === parts[3]);
                    renderQuizPlay(person, index);
                } else if (hash === '#/add-person') {
                    renderPersonForm();
                } else if (hash.startsWith('#/edit-person/')) {
                    const person = await peopleDB.get(hash.split('/')[2]);
                    renderPersonForm(person);
                } else if (hash.startsWith('#/add-category/')) {
                    renderCategoryForm(hash.split('/')[2]);
                } else if (hash.startsWith('#/edit-category/')) {
                    const parts = hash.split('/');
                    const person = await peopleDB.get(parts[2]);
                    const cat = person.categories.find(c => c.id === parts[3]);
                    renderCategoryForm(person.id, cat);
                } else if (hash.startsWith('#/add-item/')) {
                    const parts = hash.split('/');
                    renderItemForm(parts[2], parts[3]);
                } else if (hash.startsWith('#/edit-item/')) {
                    const parts = hash.split('/');
                    const person = await peopleDB.get(parts[2]);
                    const cat = person.categories.find(c => c.id === parts[3]);
                    const item = cat.items.find(i => i.id === parts[4]);
                    renderItemForm(person.id, cat.id, item);
                } else if (hash.startsWith('#/add-quiz/')) {
                    renderQuizForm(hash.split('/')[2]);
                }
            } catch (err) {
                app.innerHTML = '<p style="padding:20px">Hata! Lütfen yenile 🛠️</p>';
            }
        }

        function getHeader(title, backHash = null, extraBtn = null) {
            const themeIcons = { modern: '🌈', classic: '🌸', space: '🚀', notebook: '📝' };
            const colors = { modern: '#FFB300', classic: '#ec4899', space: '#1e293b', notebook: '#334155' };
            return `
                <div class="header" style="background:${colors[currentTheme]}">
                    ${backHash ? `<button class="btn-round" onclick="navigate('${backHash}')">⬅️</button>` : `<button class="btn-round" onclick="toggleThemeMenu()">${themeIcons[currentTheme]}</button>`}
                    <h1>${title}</h1>
                    <div class="nav-buttons">${extraBtn || ''}</div>
                </div>
            `;
        }

        function renderHome(people) {
            app.innerHTML = getHeader('Konuşuyorum', null, `<button class="btn-round btn-secondary" onclick="navigate('#/add-person')">＋</button>`) + `
                <div class="container"><div class="grid">${people.map(p => `
                    <div class="card person" onclick="navigate('#/person/${p.id}')">
                        <div class="action-btns">
                            <button class="btn-mini btn-del" onclick="event.stopPropagation(); deletePerson('${p.id}')">✕</button>
                            <button class="btn-mini btn-edit" onclick="event.stopPropagation(); navigate('#/edit-person/${p.id}')">✎</button>
                        </div>
                        <div class="card-img">${p.avatar ? `<img src="${p.avatar}" style="width:100%;height:100%;border-radius:12px;object-fit:cover">` : '👤'}</div>
                        <div class="card-title">${p.name}</div>
                    </div>`).join('')}</div></div>`;
        }

        function renderPersonForm(editData = null) {
            app.innerHTML = getHeader(editData ? 'Düzenle' : 'Yeni Kişi', '#/') + `
                <div class="container"><div class="form-card"><form onsubmit="handleSavePerson(event, ${editData ? `'${editData.id}'` : 'null'})">
                    <div class="form-group"><label>İsim</label><input type="text" id="pName" required value="${editData ? editData.name : ''}"></div>
                    <div class="form-group"><label>Fotoğraf</label><input type="file" id="pImg" accept="image/*"></div>
                    <button type="submit" class="btn-save">Kaydet ✨</button></form></div></div>`;
        }

        async function handleSavePerson(e, id) {
            e.preventDefault();
            const name = document.getElementById('pName').value;
            const file = document.getElementById('pImg').files[0];
            let person = id ? await peopleDB.get(id) : { id: generateId(), name, avatar: null, categories: [], quizzes: [] };
            person.name = name;
            if (file) {
                const reader = new FileReader();
                reader.onload = async (ev) => { person.avatar = ev.target.result; await peopleDB.save(person); navigate('#/'); };
                reader.readAsDataURL(file);
            } else { await peopleDB.save(person); navigate('#/'); }
        }

        function renderPerson(person) {
            app.innerHTML = getHeader(person.name, '#/', `
                <button class="btn-round" style="background:#FF9F43;color:white" onclick="navigate('#/quiz-list/${person.id}')">🎮</button>
                <button class="btn-round btn-secondary" onclick="navigate('#/add-category/${person.id}')">＋</button>
            `) + `
                <div class="container"><div class="grid">${(person.categories || []).map(c => `
                    <div class="card category" onclick="navigate('#/category/${person.id}/${c.id}')">
                        <div class="action-btns">
                            <button class="btn-mini btn-del" onclick="event.stopPropagation(); deleteCategory('${person.id}', '${c.id}')">✕</button>
                            <button class="btn-mini btn-edit" onclick="event.stopPropagation(); navigate('#/edit-category/${person.id}/${c.id}')">✎</button>
                        </div>
                        <div class="card-img">📁</div><div class="card-title">${c.name}</div>
                    </div>`).join('')}</div></div>`;
        }

        function renderCategoryForm(pid, editData = null) {
            app.innerHTML = getHeader(editData ? 'Düzenle' : 'Yeni Kategori', '#/person/' + pid) + `
                <div class="container"><div class="form-card"><form onsubmit="handleSaveCategory(event, '${pid}', ${editData ? `'${editData.id}'` : 'null'})">
                    <div class="form-group"><label>Kategori Adı</label><input type="text" id="cName" required value="${editData ? editData.name : ''}"></div>
                    <button type="submit" class="btn-save">Kaydet ✨</button></form></div></div>`;
        }

        async function handleSaveCategory(e, pid, cid) {
            e.preventDefault();
            const name = document.getElementById('cName').value;
            const person = await peopleDB.get(pid);
            if (cid) { person.categories.find(c => c.id === cid).name = name; } 
            else { person.categories.push({ id: generateId(), name, items: [] }); }
            await peopleDB.save(person);
            navigate('#/person/' + pid);
        }

        function renderCategory(person, category) {
            app.innerHTML = getHeader(category.name, '#/person/' + person.id, `<button class="btn-round btn-secondary" onclick="navigate('#/add-item/${person.id}/${category.id}')">＋</button>`) + `
                <div class="container"><div class="grid">${(category.items || []).map(i => `
                    <div class="card item" onclick="speak('${i.text}')">
                        <div class="action-btns">
                            <button class="btn-mini btn-del" onclick="event.stopPropagation(); deleteItem('${person.id}', '${category.id}', '${i.id}')">✕</button>
                            <button class="btn-mini btn-edit" onclick="event.stopPropagation(); navigate('#/edit-item/${person.id}/${category.id}/${i.id}')">✎</button>
                        </div>
                        <div class="card-img">${i.image ? `<img src="${i.image}" style="width:100%;height:100%;border-radius:12px;object-fit:cover">` : '💬'}</div>
                        <div class="card-title">${i.text}</div>
                    </div>`).join('')}</div></div>`;
        }

        function renderItemForm(pid, cid, editData = null) {
            app.innerHTML = getHeader(editData ? 'Düzenle' : 'Yeni Kelime', '#/category/' + pid + '/' + cid) + `
                <div class="container"><div class="form-card"><form onsubmit="handleSaveItem(event, '${pid}', '${cid}', ${editData ? `'${editData.id}'` : 'null'})">
                    <div class="form-group"><label>Kelime</label><input type="text" id="iText" required value="${editData ? editData.text : ''}"></div>
                    <div class="form-group"><label>Fotoğraf</label><input type="file" id="iImg" accept="image/*"></div>
                    <button type="submit" class="btn-save">Kaydet ✨</button></form></div></div>`;
        }

        async function handleSaveItem(e, pid, cid, iid) {
            e.preventDefault();
            const text = document.getElementById('iText').value;
            const file = document.getElementById('iImg').files[0];
            const person = await peopleDB.get(pid);
            const cat = person.categories.find(c => c.id === cid);
            let item = iid ? cat.items.find(i => i.id === iid) : { id: generateId(), text, image: null };
            item.text = text;
            if (file) {
                const reader = new FileReader();
                reader.onload = async (ev) => { item.image = ev.target.result; if(!iid) cat.items.push(item); await peopleDB.save(person); navigate('#/category/'+pid+'/'+cid); };
                reader.readAsDataURL(file);
            } else { if(!iid) cat.items.push(item); await peopleDB.save(person); navigate('#/category/'+pid+'/'+cid); }
        }

        function renderQuizList(person) {
            app.innerHTML = getHeader(person.name + ' Oyunları', '#/person/' + person.id, `<button class="btn-round btn-secondary" onclick="navigate('#/add-quiz/${person.id}')">＋</button>`) + `
                <div class="container"><div class="grid">${(person.quizzes || []).map(q => `
                    <div class="card quiz" onclick="navigate('#/quiz-play/${person.id}/${q.id}')">
                        <button class="btn-mini btn-del" style="position:absolute;top:5px;right:5px" onclick="event.stopPropagation(); deleteQuiz('${person.id}', '${q.id}')">✕</button>
                        <div class="card-img">${q.image ? `<img src="${q.image}" style="width:100%;height:100%;border-radius:12px;object-fit:cover">` : '❓'}</div>
                        <div class="card-title">${q.question}</div>
                    </div>`).join('')}</div></div>`;
        }

        function renderQuizPlay(person, index) {
            const quiz = person.quizzes[index];
            if (!quiz) { navigate('#/quiz-list/' + person.id); return; }
            app.innerHTML = getHeader('Soru ' + (index + 1), '#/quiz-list/' + person.id) + `
                <div class="container"><div class="quiz-container">
                    ${quiz.image ? `<img src="${quiz.image}" class="quiz-img">` : ''}
                    <div class="quiz-question">${quiz.question}</div>
                    <div class="options-grid">${quiz.options.map((opt, i) => `
                        <button class="option-btn" onclick="checkAnswer(this, ${i === quiz.correct})">
                            ${opt.img ? `<img src="${opt.img}" class="option-img">` : ''}
                            <span class="option-text">${opt.text}</span>
                        </button>`).join('')}</div>
                    <button class="next-btn" onclick="navigate('#/quiz-play/${person.id}/${person.quizzes[index+1]?.id || person.quizzes[0].id}')">Sıradaki ➡️</button>
                </div></div>`;
        }

        window.checkAnswer = (btn, isCorrect) => {
            if (isCorrect) { btn.classList.add('correct'); confetti({ particleCount: 150, spread: 70, origin: { y: 0.6 } }); speak("Harika! Doğru!"); } 
            else { btn.classList.add('wrong'); speak("Tekrar dene!"); setTimeout(() => btn.classList.remove('wrong'), 500); }
        };

        function renderQuizForm(pid) {
            app.innerHTML = getHeader('Yeni Soru', '#/quiz-list/' + pid) + `
                <div class="container"><div class="form-card"><form onsubmit="handleSaveQuiz(event, '${pid}')">
                    <div class="form-group"><label>Soru</label><input type="text" id="qText" required></div>
                    <div class="form-group"><label>Soru Fotoğrafı</label><input type="file" id="qImg" accept="image/*"></div>
                    ${[0,1,2,3].map(i => `
                        <div style="background:#F8F9FA;padding:12px;border-radius:15px;margin-bottom:12px;border:2px solid #EEE">
                            <label>Seçenek ${i+1}</label>
                            <input type="text" id="optT${i}" required placeholder="Metin">
                            <input type="file" id="optI${i}" accept="image/*" style="margin-top:8px">
                        </div>`).join('')}
                    <div class="form-group"><label>Doğru Cevap</label><select id="correctIdx"><option value="0">1</option><option value="1">2</option><option value="2">3</option><option value="3">4</option></select></div>
                    <button type="submit" class="btn-save">Kaydet 🎮</button></form></div></div>`;
        }

        async function handleSaveQuiz(e, pid) {
            e.preventDefault();
            const person = await peopleDB.get(pid);
            const quiz = { id: generateId(), question: document.getElementById('qText').value, image: null, options: [], correct: parseInt(document.getElementById('correctIdx').value) };
            const readFile = (file) => new Promise(r => { if(!file) r(null); const rd = new FileReader(); rd.onload = (ev) => r(ev.target.result); rd.readAsDataURL(file); });
            quiz.image = await readFile(document.getElementById('qImg').files[0]);
            for(let i=0; i<4; i++) { quiz.options.push({ text: document.getElementById('optT'+i).value, img: await readFile(document.getElementById('optI'+i).files[0]) }); }
            if(!person.quizzes) person.quizzes = [];
            person.quizzes.push(quiz);
            await peopleDB.save(person);
            navigate('#/quiz-list/' + pid);
        }

        window.deletePerson = async (id) => { if(confirm('Silinsin mi?')) { await peopleDB.delete(id); render(); } };
        window.deleteQuiz = async (pid, qid) => { if(confirm('Soru silinsin mi?')) { const p = await peopleDB.get(pid); p.quizzes = p.quizzes.filter(q => q.id !== qid); await peopleDB.save(p); render(); } };
        window.deleteCategory = async (pid, cid) => { if(confirm('Silinsin mi?')) { const p = await peopleDB.get(pid); p.categories = p.categories.filter(c => c.id !== cid); await peopleDB.save(p); render(); } };
        window.deleteItem = async (pid, cid, iid) => { if(confirm('Silinsin mi?')) { const p = await peopleDB.get(pid); const c = p.categories.find(cat => cat.id === cid); c.items = c.items.filter(i => i.id !== iid); await peopleDB.save(p); render(); } };

        window.addEventListener('hashchange', render);
        window.addEventListener('load', async () => { await initDB(); updateBackground(); render(); });
    </script>
</body>
</html>
