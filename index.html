                            <p>Ses cikarak zipla!<br>Platformlarda kal, düsme!</p>
                            <button class="next-btn" onclick="window.startParkour('${pid}')">Basla</button>
                        </div>
                    </div>
                    <p style="text-align:center;margin-top:10px;font-weight:700">Sesini kullan! Ne kadar ses cikarirsan o kadar yüksek ziplarsin!</p>
                </div>`;
        }
        window.startParkour = async (pid) => {
            const overlay = document.getElementById('parkour-overlay');
            if (overlay) overlay.style.display = 'none';
            try {
                micStream = await navigator.mediaDevices.getUserMedia({ audio: true });
                micAudioContext = new (window.AudioContext || window.webkitAudioContext)();
                micAnalyser = micAudioContext.createAnalyser();
                micAnalyser.fftSize = 256;
                const source = micAudioContext.createMediaStreamSource(micStream);
                source.connect(micAnalyser);
                runParkourGame(pid);
            } catch(e) {
                alert('Mikrofon erisimi gerekli! Lütfen izin verin.');
                if (overlay) overlay.style.display = 'flex';
            }
        };
        function runParkourGame(pid) {
            const canvas = document.getElementById('parkour-canvas');
            if (!canvas) return;
            const ctx = canvas.getContext('2d');
            canvas.width = canvas.offsetWidth;
            canvas.height = canvas.offsetHeight;
            
            // Oyun durumu
            let player = { x: 80, y: canvas.height / 2, w: 36, h: 36, vy: 0, grounded: false };
            let camera = { x: 0 };
            let platforms = [];
            let obstacles = [];
            let coins = [];
            let particles = [];
            let score = 0;
            let gameOver = false;
            let frame = 0;
            const gravity = 0.45;
            let worldGenX = 0;
            let nextPlatformY = canvas.height / 2;
            
            // İlk platform (başlangıç)
            platforms.push({ x: 0, y: canvas.height / 2 + 40, w: 200, h: 20, type: 'grass' });
            worldGenX = 200;
            
            function generateWorld() {
                // Kamera ilerledikçe yeni platformlar ve engeller üret
                while (worldGenX < camera.x + canvas.width + 800) {
                    const gap = 80 + Math.random() * 120; // Platformlar arası boşluk
                    const pw = 100 + Math.random() * 180; // Platform genişliği
                    
                    // Y yüksekliğini sınırlı aralıkta değiştir (oyun alanı içinde kalması için)
                    const minY = 80;
                    const maxY = canvas.height - 100;
                    nextPlatformY = Math.max(minY, Math.min(maxY, nextPlatformY + (Math.random() - 0.5) * 120));
                    
                    const px = worldGenX + gap;
                    platforms.push({ x: px, y: nextPlatformY, w: pw, h: 20, type: Math.random() > 0.7 ? 'moving' : 'grass' });
                    
                    // Platform hareketli ise yön ata
                    if (platforms[platforms.length - 1].type === 'moving') {
                        platforms[platforms.length - 1].dir = Math.random() > 0.5 ? 1 : -1;
                        platforms[platforms.length - 1].speed = 0.5 + Math.random() * 1;
                        platforms[platforms.length - 1].origY = nextPlatformY;
                    }
                    
                    // Engel ekle (bazı platformlara)
                    if (Math.random() > 0.5 && px > 400) {
                        const obsType = Math.random() > 0.6 ? 'spike' : 'cactus';
                        obstacles.push({ 
                            x: px + pw / 2, 
                            y: nextPlatformY - (obsType === 'spike' ? 25 : 30), 
                            w: obsType === 'spike' ? 20 : 25, 
                            h: obsType === 'spike' ? 25 : 30, 
                            type: obsType 
                        });
                    }
                    
                    // Coin ekle
                    if (Math.random() > 0.3) {
                        coins.push({ 
                            x: px + pw / 2, 
                            y: nextPlatformY - 50 - Math.random() * 40, 
                            r: 10, 
                            collected: false,
                            bobOffset: Math.random() * Math.PI * 2
                        });
                    }
                    
                    worldGenX = px + pw;
                    
                    // Bazen üst üste 2 coin daha (seri)
                    if (Math.random() > 0.6) {
                        for (let ci = 1; ci <= 2; ci++) {
                            coins.push({ 
                                x: px + pw / 2 + ci * 30, 
                                y: nextPlatformY - 50, 
                                r: 10, 
                                collected: false,
                                bobOffset: Math.random() * Math.PI * 2
                            });
                        }
                    }
                }
                
                // Geride kalanları temizle
                platforms = platforms.filter(p => p.x + p.w > camera.x - 100);
                obstacles = obstacles.filter(o => o.x + o.w > camera.x - 100);
                coins = coins.filter(c => c.x > camera.x - 100);
            }
            
            function update() {
                if (gameOver) return;
                frame++;
                
                // Ses analizi
                let micLevel = 0;
                if (micAnalyser) {
                    const dataArray = new Uint8Array(micAnalyser.frequencyBinCount);
                    micAnalyser.getByteFrequencyData(dataArray);
                    micLevel = dataArray.reduce((a, b) => a + b, 0) / dataArray.length;
                    const micFill = document.getElementById('mic-fill');
                    if (micFill) micFill.style.width = Math.min(100, micLevel * 1.5) + '%';
                    
                    // Ses ile zıplama - daha hassas
                    if (micLevel > 15) {
                        player.vy = -8 - (micLevel / 15);
                        player.grounded = false;
                        // Zıplama partikülü
                        for (let i = 0; i < 3; i++) {
                            particles.push({
                                x: player.x + player.w / 2,
                                y: player.y + player.h,
                                vx: (Math.random() - 0.5) * 3,
                                vy: Math.random() * 2,
                                life: 20,
                                color: '#FFD700'
                            });
                        }
                    }
                }
                
                // Fizik
                player.vy += gravity;
                player.y += player.vy;
                
                // Platform çarpışma
                player.grounded = false;
                for (const p of platforms) {
                    // Hareketli platform
                    if (p.type === 'moving') {
                        p.y += p.dir * p.speed;
                        if (Math.abs(p.y - p.origY) > 40) p.dir *= -1;
                    }
                    
                    if (player.vy >= 0 && 
                        player.x + player.w > p.x && 
                        player.x < p.x + p.w &&
                        player.y + player.h >= p.y &&
                        player.y + player.h <= p.y + p.h + player.vy + 2) {
                        player.y = p.y - player.h;
                        player.vy = 0;
                        player.grounded = true;
                        // Hareketli platformla birlikte hareket et
                        if (p.type === 'moving') {
                            player.y += p.dir * p.speed;
                        }
                    }
                }
                
                // Ekran dışına düşme
                if (player.y > canvas.height + 50) {
                    gameOver = true;
                }
                if (player.x < camera.x) {
                    gameOver = true; // Sola kayma engeli
                }
                
                // Otomatik sağa kayma (Zamanla hızlanan)
                player.x += 2.5 + (score / 2000);
                
                // Engel çarpışma
                for (const o of obstacles) {
                    if (player.x + player.w > o.x && 
                        player.x < o.x + o.w && 
                        player.y + player.h > o.y && 
                        player.y < o.y + o.h) {
                        gameOver = true;
                    }
                }
                
                // Coin toplama
                for (const c of coins) {
                    if (!c.collected) {
                        const dx = (player.x + player.w / 2) - c.x;
                        const dy = (player.y + player.h / 2) - c.y;
                        const dist = Math.sqrt(dx * dx + dy * dy);
                        if (dist < c.r + player.w / 2) {
                            c.collected = true;
                            score += 50;
                            // Coin partikülü
                            for (let i = 0; i < 6; i++) {
                                particles.push({
                                    x: c.x, y: c.y,
                                    vx: (Math.random() - 0.5) * 5,
                                    vy: (Math.random() - 0.5) * 5,
                                    life: 25,
                                    color: '#FFD700'
                                });
                            }
                        }
                    }
                }
                
                // Partiküller
                particles = particles.filter(p => {
                    p.x += p.vx;
                    p.y += p.vy;
                    p.life--;
                    return p.life > 0;
                });
                
                // Kamera takip
                camera.x = player.x - canvas.width * 0.3;
                
                // Dünya üret
                generateWorld();
                
                // Skor
                score += 0.5;
                const scoreEl = document.getElementById('parkour-score');
                if (scoreEl) scoreEl.innerText = Math.floor(score);
                
                // Çizim
                draw();
                
                if (!gameOver) {
                    micRafId = requestAnimationFrame(update);
                    gameLoops.push(micRafId);
                } else {
                    endGame();
                }
            }
            
            function draw() {
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                
                // Gökyüzü gradyanı
                const skyGrad = ctx.createLinearGradient(0, 0, 0, canvas.height);
                skyGrad.addColorStop(0, '#4FC3F7');
                skyGrad.addColorStop(1, '#B3E5FC');
                ctx.fillStyle = skyGrad;
                ctx.fillRect(0, 0, canvas.width, canvas.height);
                
                // Arka plan bulutları (parallax)
                ctx.fillStyle = 'rgba(255,255,255,0.4)';
                const cloudOffset = (camera.x * 0.3) % 300;
                for (let i = 0; i < 5; i++) {
                    const cx = i * 250 - cloudOffset;
                    const cy = 40 + (i % 3) * 30;
                    ctx.beginPath();
                    ctx.arc(cx + 30, cy, 20, 0, Math.PI * 2);
                    ctx.arc(cx + 60, cy - 10, 25, 0, Math.PI * 2);
                    ctx.arc(cx + 90, cy, 20, 0, Math.PI * 2);
                    ctx.fill();
                }
                
                // Platformlar
                for (const p of platforms) {
                    const sx = p.x - camera.x;
                    if (sx + p.w < -50 || sx > canvas.width + 50) continue;
                    
                    if (p.type === 'grass') {
                        // Bulut Platform (Çocuklara uygun)
                        ctx.fillStyle = 'white';
                        ctx.beginPath();
                        ctx.arc(sx + 20, p.y + 10, 20, 0, Math.PI * 2);
                        ctx.arc(sx + p.w - 20, p.y + 10, 20, 0, Math.PI * 2);
                        ctx.rect(sx + 20, p.y - 10, p.w - 40, 40);
                        ctx.fill();
                        ctx.fillStyle = '#E1F5FE';
                        ctx.fillRect(sx + 20, p.y + 15, p.w - 40, 5);
                    } else if (p.type === 'moving') {
                        // Şeker Platform
                        ctx.fillStyle = '#F06292';
                        ctx.fillRect(sx, p.y, p.w, p.h);
                        ctx.fillStyle = 'white';
                        for(let ix=0; ix<p.w; ix+=20) ctx.fillRect(sx+ix, p.y, 10, p.h);
                    }
                }
                
                // Engeller
                for (const o of obstacles) {
                    const sx = o.x - camera.x;
                    if (sx + o.w < -50 || sx > canvas.width + 50) continue;
                    
                    if (o.type === 'spike') {
                        ctx.fillStyle = '#E53935';
                        ctx.beginPath();
                        ctx.moveTo(sx, o.y + o.h);
                        ctx.lineTo(sx + o.w / 2, o.y);
                        ctx.lineTo(sx + o.w, o.y + o.h);
                        ctx.closePath();
                        ctx.fill();
                    } else {
                        ctx.font = '28px serif';
                        ctx.fillText('🌵', sx - 5, o.y + o.h);
                    }
                }
                
                // Coinler
                for (const c of coins) {
                    if (c.collected) continue;
                    const sx = c.x - camera.x;
                    if (sx < -50 || sx > canvas.width + 50) continue;
                    
                    const bobY = Math.sin(frame * 0.08 + c.bobOffset) * 5;
                    ctx.fillStyle = '#FFD700';
                    ctx.beginPath();
                    ctx.arc(sx, c.y + bobY, c.r, 0, Math.PI * 2);
                    ctx.fill();
                    ctx.strokeStyle = '#FF8F00';
                    ctx.lineWidth = 2;
                    ctx.stroke();
                    // Parıltı
                    ctx.fillStyle = '#FFF8E1';
                    ctx.beginPath();
                    ctx.arc(sx - 3, c.y + bobY - 3, 3, 0, Math.PI * 2);
                    ctx.fill();
                }
                
                // Partiküller
                for (const p of particles) {
                    const sx = p.x - camera.x;
                    ctx.fillStyle = p.color;
                    ctx.globalAlpha = p.life / 25;
                    ctx.fillRect(sx - 2, p.y - 2, 4, 4);
                }
                ctx.globalAlpha = 1;
                
                // Oyuncu (Karakter seçimi veya rastgele)
                const characters = ['🐱', '🚀', '🎈', '🐸', '🦄'];
                const charIdx = Math.floor((score / 500) % characters.length);
                ctx.font = '36px serif';
                ctx.fillText(characters[charIdx], player.x - camera.x, player.y + 30);
                
                // Zemin çizgisi (sonsuz his)
                ctx.fillStyle = 'rgba(129,199,132,0.3)';
                ctx.fillRect(0, canvas.height - 5, canvas.width, 5);
            }
            
            function endGame() {
                speak('Oyun bitti! Skorun ' + Math.floor(score));
                
                // Game over ekranı
                ctx.fillStyle = 'rgba(0,0,0,0.6)';
                ctx.fillRect(0, 0, canvas.width, canvas.height);
                ctx.fillStyle = 'white';
                ctx.font = 'bold 32px sans-serif';
                ctx.textAlign = 'center';
                ctx.fillText('Oyun Bitti!', canvas.width / 2, canvas.height / 2 - 40);
                ctx.font = '22px sans-serif';
                ctx.fillText('Skor: ' + Math.floor(score), canvas.width / 2, canvas.height / 2 + 5);
                ctx.fillStyle = '#FFD700';
                ctx.fillText('⭐', canvas.width / 2, canvas.height / 2 + 40);
                ctx.textAlign = 'left';
                
                // Skor kaydet
                if (pid) {
                    peopleDB.get(pid).then(p => {
                        if (!p) return;
                        const finalScore = Math.floor(score);
                        if (finalScore > (p.voiceParkourHighScore || 0)) {
                            p.voiceParkourHighScore = finalScore;
                            peopleDB.save(p);
                        }
                    }).catch(e => console.error('Parkour save error:', e));
                }
                
                setTimeout(() => {
                    const ov = document.getElementById('parkour-overlay');
                    if (ov) { 
                        ov.style.display = 'flex'; 
                        ov.querySelector('h2').innerHTML = '&#127908; Tekrar Dene?'; 
                    }
                }, 2500);
            }
            
            update();
        }

        // ===== FOTOGRAF YAPBOZU - DUZELTILDI =====
        let puzzleState = { pieces: [], size: 3, image: null, personId: null, totalPieces: 0 };
        
        function renderPuzzle(person) {
            puzzleState = { pieces: [], size: 3, image: null, personId: person && person.id ? person.id : null, totalPieces: 0 };
            app.innerHTML = getHeader('Fotograf Yapbozu', '#/') + `
                <div class="container">
                    <div class="puzzle-container">
                        <div class="puzzle-upload" onclick="document.getElementById('puzzle-file').click()">
                            <div style="font-size:3rem;margin-bottom:10px">&#128247;</div>
                            <div style="font-weight:800">Fotograf Yükle</div>
                            <div style="font-size:0.9rem;color:#666;margin-top:5px">Yapboz olmak icin bir fotograf sec</div>
                            <input type="file" id="puzzle-file" accept="image/*" onchange="window.loadPuzzleImage(event)">
                        </div>
                        <div class="form-group" style="max-width:200px;margin:0 auto 20px">
                            <label>Zorluk</label>
                            <select id="puzzle-size" onchange="puzzleState.size=parseInt(this.value)">
                                <option value="2">Kolay (2x2)</option>
                                <option value="3" selected>Orta (3x3)</option>
                                <option value="4">Zor (4x4)</option>
                            </select>
                        </div>
                        <div id="puzzle-grid" class="puzzle-grid" style="display:none"></div>
                        <button class="btn-save" id="puzzle-check" style="display:none;margin-top:20px" onclick="window.checkPuzzle()">Kontrol Et</button>
                        <div id="puzzle-msg" style="margin-top:15px;font-weight:800;font-size:1.2rem;text-align:center"></div>
                    </div>
                </div>`;
        }
        window.loadPuzzleImage = (e) => {
            const file = e.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = (ev) => {
                puzzleState.image = ev.target.result;
                createPuzzle();
            };
            reader.readAsDataURL(file);
        };
        function createPuzzle() {
            const grid = document.getElementById('puzzle-grid');
            const checkBtn = document.getElementById('puzzle-check');
            const size = puzzleState.size;
            const pieceCount = size * size;
            puzzleState.totalPieces = pieceCount;
            grid.style.display = 'grid';
            grid.style.gridTemplateColumns = `repeat(${size}, 100px)`;
            checkBtn.style.display = 'block';
            document.getElementById('puzzle-msg').innerText = '';
            
            // Her parçanın hangi konumda olduğunu takip et
            // pieces[i] = parçanın şu an bulunduğu slot
            const pieces = [];
            for (let i = 0; i < pieceCount; i++) {
                pieces.push(i); // Başlangıçta parça i, slot i'de
            }
            // Karıştır - Fisher-Yates shuffle
            for (let i = pieces.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [pieces[i], pieces[j]] = [pieces[j], pieces[i]];
            }
            puzzleState.pieces = pieces;
            renderPuzzleGrid();
        }
        function renderPuzzleGrid() {
            const grid = document.getElementById('puzzle-grid');
            if (!grid) return;
            const size = puzzleState.size;
            const img = puzzleState.image;
            const pieceSize = 100;

            grid.innerHTML = '';

            puzzleState.pieces.forEach((pieceId, slotIdx) => {
                const correctRow = Math.floor(pieceId / size);
                const correctCol = pieceId % size;

                const piece = document.createElement('div');
                piece.className = 'puzzle-piece';
                piece.style.width = pieceSize + 'px';
                piece.style.height = pieceSize + 'px';
                piece.style.backgroundImage = `url(${img})`;
                piece.style.backgroundSize = `${pieceSize * size}px ${pieceSize * size}px`;
                piece.style.backgroundPosition = `${-correctCol * pieceSize}px ${-correctRow * pieceSize}px`;
                piece.style.touchAction = 'none';
                piece.style.userSelect = 'none';
                piece.dataset.slot = slotIdx;
                piece.dataset.piece = pieceId;

                // Pointer events - hem mouse hem touch
                piece.addEventListener('pointerdown', handlePuzzlePointerDown);

                grid.appendChild(piece);
            });
        }

        // Pointer-based drag & drop system
        let puzzleDragState = null;

        function handlePuzzlePointerDown(e) {
            e.preventDefault();
            const piece = e.target.closest('.puzzle-piece');
            if (!piece) return;

            const rect = piece.getBoundingClientRect();
            const pointerId = e.pointerId;

            // Ghost element oluştur
            const ghost = piece.cloneNode(true);
            ghost.style.position = 'fixed';
            ghost.style.left = rect.left + 'px';
            ghost.style.top = rect.top + 'px';
            ghost.style.width = rect.width + 'px';
            ghost.style.height = rect.height + 'px';
            ghost.style.zIndex = '9999';
            ghost.style.opacity = '0.9';
            ghost.style.pointerEvents = 'none';
            ghost.style.boxShadow = '0 8px 25px rgba(0,0,0,0.3)';
            ghost.style.transform = 'scale(1.05)';
            ghost.style.borderRadius = '8px';
            ghost.id = 'puzzle-ghost';
            document.body.appendChild(ghost);

            // Orijinal parçayı yarı saydam yap
            piece.style.opacity = '0.3';
            piece.style.transform = 'scale(0.95)';

            puzzleDragState = {
                srcSlot: parseInt(piece.dataset.slot),
                srcPiece: piece,
                ghost: ghost,
                offsetX: e.clientX - rect.left,
                offsetY: e.clientY - rect.top,
                pointerId: pointerId
            };

            piece.setPointerCapture(pointerId);
            piece.addEventListener('pointermove', handlePuzzlePointerMove);
            piece.addEventListener('pointerup', handlePuzzlePointerUp);
            piece.addEventListener('pointercancel', handlePuzzlePointerUp);
        }

        function handlePuzzlePointerMove(e) {
            if (!puzzleDragState) return;
            e.preventDefault();

            const ghost = puzzleDragState.ghost;
            ghost.style.left = (e.clientX - puzzleDragState.offsetX) + 'px';
            ghost.style.top = (e.clientY - puzzleDragState.offsetY) + 'px';

            // Hangi parçanın üzerinde olduğunu belirlemek için highlight
            ghost.style.display = 'none';
            const target = document.elementFromPoint(e.clientX, e.clientY);
            ghost.style.display = '';

            document.querySelectorAll('.puzzle-piece').forEach(p => {
                p.style.borderColor = 'white';
                p.style.transform = p === puzzleDragState.srcPiece ? 'scale(0.95)' : 'scale(1)';
            });

            if (target) {
                const dropTarget = target.closest('.puzzle-piece');
                if (dropTarget && dropTarget !== puzzleDragState.srcPiece) {
                    dropTarget.style.borderColor = '#54A0FF';
                    dropTarget.style.transform = 'scale(1.05)';
                }
            }
        }

        function handlePuzzlePointerUp(e) {
            if (!puzzleDragState) return;
            e.preventDefault();

            const srcSlot = puzzleDragState.srcSlot;
            const srcPiece = puzzleDragState.srcPiece;
            const ghost = puzzleDragState.ghost;

            // Ghost'u kaldır
            ghost.remove();

            // Orijinal parçayı normale döndür
            srcPiece.style.opacity = '1';
            srcPiece.style.transform = 'scale(1)';

            // Hedef parçayı bul
            const target = document.elementFromPoint(e.clientX, e.clientY);
            if (target) {
                const dropTarget = target.closest('.puzzle-piece');
                if (dropTarget) {
                    const dstSlot = parseInt(dropTarget.dataset.slot);
                    if (srcSlot !== dstSlot) {
                        swapPuzzleSlots(srcSlot, dstSlot);
                    }
                }
            }

            // Tüm highlight'ları temizle
            document.querySelectorAll('.puzzle-piece').forEach(p => {
                p.style.borderColor = 'white';
                p.style.transform = 'scale(1)';
            });

            // Event listener'ları temizle
            srcPiece.removeEventListener('pointermove', handlePuzzlePointerMove);
            srcPiece.removeEventListener('pointerup', handlePuzzlePointerUp);
            srcPiece.removeEventListener('pointercancel', handlePuzzlePointerUp);
            try { srcPiece.releasePointerCapture(puzzleDragState.pointerId); } catch(err) {}

            puzzleDragState = null;
        }
        
        function swapPuzzleSlots(slotA, slotB) {
            // pieces[slotA] ve pieces[slotB]'yi takas et
            [puzzleState.pieces[slotA], puzzleState.pieces[slotB]] = [puzzleState.pieces[slotB], puzzleState.pieces[slotA]];
            renderPuzzleGrid();
        }
        
        window.checkPuzzle = async () => {
            // Doğru çözüm: her slotta (slot index) o slotta olması gereken parça (slot index) olmalı
            // Yani pieces[i] === i olmalı
            const isCorrect = puzzleState.pieces.every((pieceId, slotIdx) => pieceId === slotIdx);
            const msg = document.getElementById('puzzle-msg');
            if (isCorrect) {
                msg.innerHTML = '<span style="color:#1DD1A1">Tebrikler! Yapboz tamamlandi!</span>';
                speak('Tebrikler! Yapboz tamamlandi!');
                confetti({ particleCount: 200, spread: 100 });
                if (puzzleState.personId) {
                    try {
                        const p = await peopleDB.get(puzzleState.personId);
                        if (p) {
                            p.puzzleCompleted = (p.puzzleCompleted || 0) + 1;
                            await peopleDB.save(p);
                        }
                    } catch(e) { console.error('Puzzle save error:', e); }
                }
            } else {
                msg.innerHTML = '<span style="color:#FF6B6B">Henüz tamamlanmadi, tekrar dene!</span>';
                speak('Henüz tamamlanmadi, tekrar dene');
            }
        };

        // ===== HAYVAN SESI TEKRARLAMA - DUZELTILDI =====
        const VOICE_ANIMALS = [
            { name: 'Inek', emoji: '&#128004;', sound: 'Moo', matches: ['mo', 'moo', 'inek', 'möö', 'mö'] },
            { name: 'Kopek', emoji: '&#128021;', sound: 'Hav hav', matches: ['hav', 'havhav', 'hep', 'kopek'] },
            { name: 'Kedi', emoji: '&#128008;', sound: 'Miyav', matches: ['miyav', 'miyau', 'mau', 'miyow', 'kedi'] },
            { name: 'Koyun', emoji: '&#128017;', sound: 'Mee', matches: ['me', 'mee', 'meee', 'koyun'] },
            { name: 'Esek', emoji: '&#129743;', sound: 'Ihaa', matches: ['iha', 'ihaa', 'ihaaa', 'esek'] },
            { name: 'Ordek', emoji: '&#129414;', sound: 'Vak vak', matches: ['vak', 'vakvak', 'vak vak', 'ördek', 'ordek'] },
            { name: 'Horoz', emoji: '&#128019;', sound: 'Uuuru', matches: ['uru', 'uuru', 'kukuriku', 'horoz', 'üürü'] },
            { name: 'Kurbaga', emoji: '&#128056;', sound: 'Vrak', matches: ['vre', 'vrak', 'krek', 'kurbaga', 'krekrek'] },
            { name: 'At', emoji: '&#128014;', sound: 'Ihii', matches: ['ihi', 'ihii', 'at', 'iiiih'] },
            { name: 'Domuz', emoji: '&#128055;', sound: 'Oink', matches: ['oink', 'of', 'domuz', 'öink'] }
        ];
        let voiceGameState = { index: 0, score: 0, results: [], personId: null };

        function renderAnimalVoice(person) {
            voiceGameState = { index: 0, score: 0, results: [], personId: person && person.id ? person.id : null };
            app.innerHTML = getHeader('Hayvan Sesleri', '#/') + `
                <div class="container">
                    <div class="score-board">
                        <span>Soru: <span id="voice-q">1</span>/10</span>
                        <span>Skor: <span id="voice-score">0</span></span>
                    </div>
                    <div class="voice-farm-bg">
                        <div class="voice-animal-area" id="voice-area">
                            <div class="voice-progress" id="voice-progress">${Array(10).fill(0).map(() => '<div class="voice-dot"></div>').join('')}</div>
                            <div class="voice-animal-display run-in-left" id="voice-animal">Inek</div>
                            <div class="voice-animal-name" id="voice-name">Inek</div>
                            <div class="voice-animal-text" id="voice-sound">"Moo"</div>
                            <div>
                                <button class="voice-btn listen" onclick="window.playAnimalSound()">&#128266; Dinle</button>
                                <button class="voice-btn speak" id="voice-speak-btn" onclick="window.startAnimalVoiceRecognition()">&#127908; Sesi Tekrarla</button>
                            </div>
                            <div class="voice-status" id="voice-status"></div>
                            <button class="next-btn" id="voice-next" style="display:none;margin-top:20px" onclick="window.nextVoiceAnimal()">Sonraki</button>
                        </div>
                    </div>
                </div>`;
            showVoiceAnimal(0);
        }
        function showVoiceAnimal(idx) {
            if (idx < 0 || idx >= VOICE_ANIMALS.length) return;
            const animal = VOICE_ANIMALS[idx];
            const animalEl = document.getElementById('voice-animal');
            const nameEl = document.getElementById('voice-name');
            const soundEl = document.getElementById('voice-sound');
            const qEl = document.getElementById('voice-q');
            const statusEl = document.getElementById('voice-status');
            const nextEl = document.getElementById('voice-next');
            const speakBtn = document.getElementById('voice-speak-btn');

            // Hayvanı köşeden koşarak getir - animasyon class'ını yenilemek için önce kaldır sonra ekle
            if (animalEl) {
                animalEl.classList.remove('run-in-left', 'run-in-right');
                void animalEl.offsetWidth; // Reflow tetikle
                const fromRight = Math.random() > 0.5;
                animalEl.classList.add(fromRight ? 'run-in-right' : 'run-in-left');
                animalEl.innerHTML = animal.emoji;
            }
            if (nameEl) nameEl.innerText = animal.name;
            if (soundEl) soundEl.innerText = '"' + animal.sound + '"';
            if (qEl) qEl.innerText = idx + 1;
            if (statusEl) statusEl.innerHTML = '<span style="color:#54A0FF">&#127908; Dinliyorum...</span>';
            if (nextEl) {
                nextEl.style.display = 'inline-block';
                nextEl.innerHTML = 'Pas Geç';
            }
            if (speakBtn) {
                speakBtn.style.display = 'inline-block';
                speakBtn.innerHTML = '&#127908; Dinliyor...';
                speakBtn.classList.add('listening');
                speakBtn.disabled = true;
            }
            // Otomatik çal ve dinlemeye başla
            setTimeout(() => window.playAnimalSound(true), 500);
        }
        window.playAnimalSound = (autoStartMic = false) => {
            const idx = voiceGameState.index;
            if (idx < 0 || idx >= VOICE_ANIMALS.length) return;
            const animal = VOICE_ANIMALS[idx];
            speak(animal.sound + '! ' + animal.name + ' sesi!', 0.85, 1.2, () => {
                if (autoStartMic) {
                    setTimeout(() => window.startAnimalVoiceRecognition(), 500);
                }
            });
        };
        
        // Ses tanıma - Sadece SpeechRecognition (gerçek mikrofon)
        let voiceListenTimer = null;
        // Mikrofon izni kontrolü
        async function checkMicPermission() {
            try {
                const result = await navigator.permissions.query({ name: 'microphone' });
                return result.state;
            } catch(e) {
                // permissions API desteklemeyen tarayıcılar için
                return 'prompt';
            }
        }

        async function requestMicAccess() {
            const status = document.getElementById('voice-status');
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                stream.getTracks().forEach(t => t.stop());
                return true;
            } catch(e) {
                if (status) status.innerHTML = '<span style="color:#FF6B6B">&#127908; Mikrofon izni verilmedi. Lütfen tarayıcı ayarlarından mikrofon iznini açın.</span>';
                return false;
            }
        }

        window.startAnimalVoiceRecognition = async () => {
            const idx = voiceGameState.index;
            if (idx < 0 || idx >= VOICE_ANIMALS.length) return;
            const animal = VOICE_ANIMALS[idx];
            const status = document.getElementById('voice-status');
            const speakBtn = document.getElementById('voice-speak-btn');

            // Mikrofon izni kontrolü
            const permState = await checkMicPermission();
            if (permState === 'denied') {
                if (status) status.innerHTML = '<span style="color:#FF6B6B">&#127908; Mikrofon izni engellenmiş. Lütfen tarayıcı ayarlarından mikrofon iznini açın.</span>';
                return;
            }
            if (permState === 'prompt') {
                const granted = await requestMicAccess();
                if (!granted) return;
            }

            // Butonu dinleme moduna geçir
            if (speakBtn) {
                speakBtn.classList.add('listening');
                speakBtn.innerHTML = '&#127908; Dinliyor...';
                speakBtn.disabled = true;
            }

            const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;

            if (!SpeechRecognition) {
                if (status) status.innerHTML = '<span style="color:#FF6B6B">Tarayiciniz ses tanımayı desteklemiyor. Lütfen Chrome, Edge veya Safari kullanın.</span>';
                if (speakBtn) {
                    speakBtn.classList.remove('listening');
                    speakBtn.innerHTML = '&#127908; Sesi Tekrarla';
                    speakBtn.disabled = false;
                }
                return;
            }

            stopSpeechRecognition();
            speechRecognition = new SpeechRecognition();
            speechRecognition.lang = 'tr-TR';
            speechRecognition.interimResults = true;
            speechRecognition.maxAlternatives = 5;
            speechRecognition.continuous = true;

            if (status) status.innerHTML = '<span style="color:#54A0FF">&#127908; Dinliyorum... Sesini cikar!</span>';

            let heardResults = [];
            let hasResult = false;

            // 10 saniyelik zaman aşımı - kullanıcı daha uzun süre konuşabilsin
            if (voiceListenTimer) clearTimeout(voiceListenTimer);
            voiceListenTimer = setTimeout(() => {
                if (!hasResult) {
                    stopSpeechRecognition();
                    window.handleVoiceResult(false, animal);
                }
            }, 10000);

            speechRecognition.onresult = (event) => {
                for (let i = event.resultIndex; i < event.results.length; i++) {
                    const transcript = event.results[i][0].transcript.toLowerCase().trim();
                    heardResults.push(transcript);

                    if (event.results[i].isFinal) {
                        hasResult = true;
                        if (voiceListenTimer) clearTimeout(voiceListenTimer);
                        let isCorrect = false;
                        for (const heard of heardResults) {
                            if (animal.matches.some(m => heard.includes(m))) {
                                isCorrect = true;
                                break;
                            }
                        }
                        window.handleVoiceResult(isCorrect, animal);
                    }
                }
            };

            speechRecognition.onerror = (e) => {
                console.log('Speech recognition error:', e.error);
                if (!hasResult) {
                    hasResult = true;
                    if (voiceListenTimer) clearTimeout(voiceListenTimer);
                    if (status) status.innerHTML = '<span style="color:#FF9F43">Ses anlayamadım, tekrar dene!</span>';
                    setTimeout(() => {
                        window.handleVoiceResult(false, animal);
                    }, 1000);
                }
            };

            speechRecognition.onend = () => {
                if (!hasResult && heardResults.length > 0) {
                    // interim results var ama final yok - son kontrol
                    hasResult = true;
                    if (voiceListenTimer) clearTimeout(voiceListenTimer);
                    let isCorrect = false;
                    for (const heard of heardResults) {
                        if (animal.matches.some(m => heard.includes(m))) {
                            isCorrect = true;
                            break;
                        }
                    }
                    window.handleVoiceResult(isCorrect, animal);
                }
            };

            try {
                speechRecognition.start();
            } catch(e) {
                console.error('Speech recognition start error:', e);
                if (speakBtn) {
                    speakBtn.classList.remove('listening');
                    speakBtn.innerHTML = '&#127908; Sesi Tekrarla';
                    speakBtn.disabled = false;
                }
            }
        };
        
        window.handleVoiceResult = (isCorrect, animal) => {
            stopSpeechRecognition();
            if (voiceListenTimer) clearTimeout(voiceListenTimer);
            const status = document.getElementById('voice-status');
            const dots = document.querySelectorAll('.voice-dot');
            const idx = voiceGameState.index;
            const speakBtn = document.getElementById('voice-speak-btn');

            if (isCorrect) {
                if (status) status.innerHTML = '<span style="color:#1DD1A1">&#127881; Dogru! ' + animal.name + '!</span>';
                speak('Harika! Dogru!');
                voiceGameState.score++;
                const scoreEl = document.getElementById('voice-score');
                if (scoreEl) scoreEl.innerText = voiceGameState.score;
                if (dots && dots[idx]) dots[idx].classList.add('correct');
                confetti({ particleCount: 50, spread: 50 });
            } else {
                if (status) status.innerHTML = '<span style="color:#FF6B6B">&#10060; Bilemedin! Bu bir ' + animal.name + '.</span>';
                speak('Bilemedin! Bu bir ' + animal.name);
                if (dots && dots[idx]) dots[idx].classList.add('wrong');
            }

            if (speakBtn) {
                speakBtn.style.display = 'none';
                speakBtn.classList.remove('listening');
                speakBtn.disabled = false;
            }
            const nextBtn = document.getElementById('voice-next');
            if (nextBtn) nextBtn.style.display = 'inline-block';
        };
        
        window.nextVoiceAnimal = async () => {
            voiceGameState.index++;
            if (voiceGameState.index >= VOICE_ANIMALS.length) {
                const status = document.getElementById('voice-status');
                if (status) status.innerHTML = '<div style="font-size:1.5rem;color:#1DD1A1">Oyun Bitti!<br>Skorun: ' + voiceGameState.score + '/10</div>';
                speak('Oyun bitti! Skorun ' + voiceGameState.score + '!');
                confetti({ particleCount: 200, spread: 100 });
                const nextBtn = document.getElementById('voice-next');
                if (nextBtn) nextBtn.style.display = 'none';
                if (voiceGameState.personId) {
                    try {
                        const p = await peopleDB.get(voiceGameState.personId);
                        if (p && voiceGameState.score > (p.animalVoiceScore || 0)) {
                            p.animalVoiceScore = voiceGameState.score;
                            await peopleDB.save(p);
                        }
                    } catch(e) { console.error('Voice score save error:', e); }
                }
                return;
            }
            showVoiceAnimal(voiceGameState.index);
        };

        // ===== SILME FONKSIYONLARI =====
        window.deletePerson = async (id) => {
            if(confirm('Bu kisiyi silmek istedigine emin misin?')) { 
                await peopleDB.delete(id); 
                render(); 
            }
        };
        window.deleteCategory = async (pid, cid) => {
            if(confirm('Bu kategoriyi silmek istedigine emin misin?')) {
                const p = await peopleDB.get(pid);
                if (!p) return;
                p.categories = (p.categories || []).filter(c => c.id !== cid);
                await peopleDB.save(p);
                render();
            }
        };
        window.deleteItem = async (pid, cid, iid) => {
            if(confirm('Bu kelimeyi silmek istedigine emin misin?')) {
                const p = await peopleDB.get(pid);
                if (!p || !p.categories) return;
                const c = p.categories.find(cat => cat.id === cid);
                if (!c) return;
                c.items = (c.items || []).filter(i => i.id !== iid);
                await peopleDB.save(p);
                render();
            }
        };
        window.deleteQuiz = async (pid, catId, qid) => {
            if(confirm('Bu soruyu silmek istedigine emin misin?')) {
                const p = await peopleDB.get(pid);
                if (!p || !p.quizCategories) return;
                const c = p.quizCategories.find(cat => cat.id === catId);
                if (!c) return;
                c.quizzes = (c.quizzes || []).filter(q => q.id !== qid);
                await peopleDB.save(p);
                render();
            }
        };
        window.deleteQuizCategory = async (pid, cid) => {
            if(confirm('Bu kategoriyi ve icindeki tum sorulari silmek istedigine emin misin?')) {
                const p = await peopleDB.get(pid);
                if (!p) return;
                p.quizCategories = (p.quizCategories || []).filter(c => c.id !== cid);
                await peopleDB.save(p);
                render();
            }
        };

        window.addEventListener('hashchange', render);
        initDB().then(() => { updateBackground(); render(); }).catch(err => {
            console.error('DB init error:', err);
            app.innerHTML = '<div style="padding:20px;text-align:center"><p>Veritabani baslatilamadi. Lütfen sayfayi yenileyin.</p></div>';
        });
    </script>
</body>
</html>
