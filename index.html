<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#FFD93D">
    <title>Konuşuyorum 🌈</title>

    <!-- PWA Manifest -->
    <link rel="manifest" href="manifest.json">

    <!-- PWA Meta Etiketleri -->
    <meta name="description" content="Çocuklar için sevimli AAC uygulaması.">
    <meta name="application-name" content="Konuşuyorum">
    <meta name="mobile-web-app-capable" content="yes">

    <!-- Apple iOS PWA -->
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="apple-mobile-web-app-title" content="Konuşuyorum">
    <link rel="apple-touch-icon" href="icons/apple-touch-icon.png">

    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;500;600;700&family=Baloo+2:wght@600;700;800&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --primary: #FFD93D; /* Sarı */
            --secondary: #6BCB77; /* Yeşil */
            --accent: #4D96FF; /* Mavi */
            --danger: #FF6B6B; /* Kırmızı/Turuncu */
            --bg: #F9F9F9;
            --text: #2B2B2B;
            --card-shadow: 0 10px 25px rgba(0,0,0,0.08);
            --active-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
            user-select: none;
        }

        body {
            font-family: 'Fredoka', sans-serif;
            background-color: var(--bg);
            background-image: 
                radial-gradient(at 0% 0%, rgba(255, 217, 61, 0.15) 0px, transparent 50%),
                radial-gradient(at 100% 100%, rgba(77, 150, 255, 0.15) 0px, transparent 50%);
            background-attachment: fixed;
            color: var(--text);
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* Arka Plan Animasyonu */
        .bg-elements {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            pointer-events: none;
        }

        .floating-shape {
            position: absolute;
            opacity: 0.1;
            animation: float 20s infinite linear;
        }

        @keyframes float {
            0% { transform: translate(0, 0) rotate(0deg); }
            50% { transform: translate(100px, 50px) rotate(180deg); }
            100% { transform: translate(0, 0) rotate(360deg); }
        }

        /* Header */
        .header {
            background: white;
            padding: 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            position: sticky;
            top: 0;
            z-index: 100;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            border-bottom-left-radius: 30px;
            border-bottom-right-radius: 30px;
        }

        .header h1 {
            font-family: 'Baloo 2', cursive;
            font-size: 1.8rem;
            color: var(--accent);
            text-shadow: 2px 2px 0px rgba(0,0,0,0.05);
        }

        .btn-icon {
            background: #f0f0f0;
            border: none;
            width: 50px;
            height: 50px;
            border-radius: 15px;
            font-size: 1.5rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .btn-icon:active {
            transform: scale(0.85);
            background: #e0e0e0;
        }

        .btn-add {
            background: var(--secondary);
            color: white;
            box-shadow: 0 5px 15px rgba(107, 203, 119, 0.3);
        }

        /* Main Container */
        .container {
            padding: 25px 20px;
            max-width: 1000px;
            margin: 0 auto;
        }

        /* Grid */
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
            gap: 20px;
        }

        /* Cards */
        .card {
            background: white;
            border-radius: 35px;
            padding: 25px 15px;
            text-align: center;
            box-shadow: var(--card-shadow);
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            border: 5px solid transparent;
            position: relative;
            overflow: hidden;
        }

        .card:hover {
            transform: translateY(-10px);
            box-shadow: 0 15px 35px rgba(0,0,0,0.1);
        }

        .card:active {
            transform: scale(0.9);
        }

        .card.person { border-color: var(--primary); }
        .card.category { border-color: var(--accent); }
        .card.item { border-color: var(--secondary); }

        .card-img {
            width: 100px;
            height: 100px;
            margin: 0 auto 15px;
            border-radius: 50%;
            background: #F0F0F0;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 3rem;
            object-fit: cover;
            border: 4px solid white;
            box-shadow: 0 4px 10px rgba(0,0,0,0.05);
        }

        .card-title {
            font-family: 'Baloo 2', cursive;
            font-size: 1.4rem;
            font-weight: 700;
            color: var(--text);
            margin-bottom: 5px;
        }

        .card-badge {
            background: #F0F0F0;
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 0.85rem;
            font-weight: 600;
            color: #777;
        }

        /* Speak Animation */
        @keyframes speak-pulse {
            0% { transform: scale(1); border-color: var(--secondary); }
            50% { transform: scale(1.05); border-color: var(--primary); box-shadow: 0 0 30px rgba(255, 217, 61, 0.5); }
            100% { transform: scale(1); border-color: var(--secondary); }
        }

        .speaking {
            animation: speak-pulse 0.5s ease infinite;
        }

        /* Forms */
        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 10px;
            font-weight: 600;
            font-size: 1.1rem;
        }

        input[type="text"] {
            width: 100%;
            padding: 15px 20px;
            border-radius: 20px;
            border: 3px solid #EEE;
            font-family: inherit;
            font-size: 1.1rem;
            outline: none;
            transition: border-color 0.2s;
        }

        input[type="text"]:focus {
            border-color: var(--accent);
        }

        .btn-full {
            width: 100%;
            padding: 18px;
            border-radius: 25px;
            border: none;
            background: var(--accent);
            color: white;
            font-size: 1.2rem;
            font-weight: 700;
            font-family: inherit;
            cursor: pointer;
            box-shadow: 0 8px 20px rgba(77, 150, 255, 0.3);
            margin-top: 10px;
        }

        .btn-full:active {
            transform: scale(0.95);
        }

        /* Empty State */
        .empty-state {
            text-align: center;
            padding: 60px 20px;
        }

        .empty-icon {
            font-size: 5rem;
            margin-bottom: 20px;
            display: block;
            animation: bounce 2s infinite;
        }

        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-20px); }
        }

        /* Delete Button */
        .btn-delete {
            position: absolute;
            top: 10px;
            right: 10px;
            background: rgba(255, 107, 107, 0.1);
            color: var(--danger);
            border: none;
            width: 35px;
            height: 35px;
            border-radius: 10px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1rem;
            z-index: 10;
        }

        /* Mobile Adjustments */
        @media (max-width: 480px) {
            .grid {
                grid-template-columns: repeat(2, 1fr);
                gap: 15px;
            }
            .card {
                padding: 15px 10px;
            }
            .card-img {
                width: 80px;
                height: 80px;
            }
            .header h1 {
                font-size: 1.4rem;
            }
        }
    </style>
</head>
<body>
    <div class="bg-elements" id="bgElements"></div>
    <div id="app"></div>

    <script>
        // Background shapes
        const bg = document.getElementById('bgElements');
        const emojis = ['🎈', '🌟', '🌈', '☁️', '☀️', '🌸'];
        for (let i = 0; i < 15; i++) {
            const shape = document.createElement('div');
            shape.className = 'floating-shape';
            shape.style.left = Math.random() * 100 + '%';
            shape.style.top = Math.random() * 100 + '%';
            shape.style.fontSize = (Math.random() * 20 + 20) + 'px';
            shape.style.animationDelay = (Math.random() * 10) + 's';
            shape.style.animationDuration = (Math.random() * 10 + 15) + 's';
            shape.innerText = emojis[Math.floor(Math.random() * emojis.length)];
            bg.appendChild(shape);
        }

        // ==================== DATABASE ====================
        let db;
        function initDB() {
            return new Promise((resolve, reject) => {
                const request = indexedDB.open('KonusuyorumDB', 2);
                request.onerror = (e) => reject(e);
                request.onsuccess = (e) => { db = e.target.result; resolve(); };
                request.onupgradeneeded = (e) => {
                    const db = e.target.result;
                    if (!db.objectStoreNames.contains('people')) {
                        db.createObjectStore('people', { keyPath: 'id' });
                    }
                };
            });
        }

        function getAllPeople() {
            return new Promise((resolve) => {
                const tx = db.transaction('people', 'readonly');
                const store = tx.objectStore('people');
                const request = store.getAll();
                request.onsuccess = () => resolve(request.result);
            });
        }

        function getPerson(id) {
            return new Promise((resolve) => {
                const tx = db.transaction('people', 'readonly');
                const store = tx.objectStore('people');
                const request = store.get(id);
                request.onsuccess = () => resolve(request.result);
            });
        }

        function savePerson(person) {
            return new Promise((resolve) => {
                const tx = db.transaction('people', 'readwrite');
                const store = tx.objectStore('people');
                store.put(person);
                tx.oncomplete = () => resolve();
            });
        }

        function deletePersonFromDB(id) {
            return new Promise((resolve) => {
                const tx = db.transaction('people', 'readwrite');
                const store = tx.objectStore('people');
                store.delete(id);
                tx.oncomplete = () => resolve();
            });
        }

        // ==================== UTILS ====================
        const generateId = () => Math.random().toString(36).substr(2, 9);
        const navigate = (hash) => { window.location.hash = hash; };

        function speak(text) {
            if (!window.speechSynthesis) return;
            window.speechSynthesis.cancel();
            const msg = new SpeechSynthesisUtterance(text);
            msg.lang = 'tr-TR';
            msg.rate = 0.9;
            msg.pitch = 1.2; // Biraz daha çocuksu bir ses tonu
            window.speechSynthesis.speak(msg);
        }

        function resizeImage(file, maxWidth, callback) {
            const reader = new FileReader();
            reader.onload = (e) => {
                const img = new Image();
                img.onload = () => {
                    const canvas = document.createElement('canvas');
                    let width = img.width;
                    let height = img.height;
                    if (width > maxWidth) {
                        height = (maxWidth / width) * height;
                        width = maxWidth;
                    }
                    canvas.width = width;
                    canvas.height = height;
                    const ctx = canvas.getContext('2d');
                    ctx.drawImage(img, 0, 0, width, height);
                    callback(canvas.toDataURL('image/jpeg', 0.7));
                };
                img.src = e.target.result;
            };
            reader.readAsDataURL(file);
        }

        // ==================== RENDERER ====================
        const app = document.getElementById('app');

        async function render() {
            const hash = window.location.hash || '#/';
            app.innerHTML = '<div class="loading">Yükleniyor... 🌟</div>';

            if (hash === '#/') {
                const people = await getAllPeople();
                renderHome(people);
            } else if (hash.startsWith('#/person/')) {
                const id = hash.split('/')[2];
                const person = await getPerson(id);
                renderPerson(person);
            } else if (hash.startsWith('#/category/')) {
                const parts = hash.split('/');
                const personId = parts[2];
                const catId = parts[3];
                const person = await getPerson(personId);
                const category = person.categories.find(c => c.id === catId);
                renderCategory(person, category);
            } else if (hash === '#/add-person') {
                renderAddPerson();
            } else if (hash.startsWith('#/add-category/')) {
                const personId = hash.split('/')[2];
                renderAddCategory(personId);
            } else if (hash.startsWith('#/add-item/')) {
                const parts = hash.split('/');
                renderAddItem(parts[2], parts[3]);
            }
        }

        function renderHome(people) {
            app.innerHTML = `
                <div class="header">
                    <button class="btn-icon" onclick="window.installKonusuyorum()">📲</button>
                    <h1>Konuşuyorum</h1>
                    <button class="btn-icon btn-add" onclick="navigate('#/add-person')">＋</button>
                </div>
                <div class="container">
                    ${people.length === 0 ? `
                        <div class="empty-state">
                            <span class="empty-icon">🎈</span>
                            <h2>Merhaba!</h2>
                            <p>Hadi birini ekleyerek başlayalım.</p>
                        </div>
                    ` : `
                        <div class="grid">
                            ${people.map(p => `
                                <div class="card person" onclick="navigate('#/person/${p.id}')">
                                    <button class="btn-delete" onclick="event.stopPropagation(); deletePersonHandler('${p.id}')">✕</button>
                                    <div class="card-img">${p.avatar ? `<img src="${p.avatar}" class="card-img">` : '👤'}</div>
                                    <div class="card-title">${p.name}</div>
                                    <div class="card-badge">${p.categories?.length || 0} Kategori</div>
                                </div>
                            `).join('')}
                        </div>
                    `}
                </div>
            `;
        }

        function renderPerson(person) {
            app.innerHTML = `
                <div class="header">
                    <button class="btn-icon" onclick="navigate('#/')">⬅️</button>
                    <h1>${person.name}</h1>
                    <button class="btn-icon btn-add" onclick="navigate('#/add-category/${person.id}')">＋</button>
                </div>
                <div class="container">
                    <div class="grid">
                        ${(person.categories || []).map(c => `
                            <div class="card category" onclick="navigate('#/category/${person.id}/${c.id}')">
                                <button class="btn-delete" onclick="event.stopPropagation(); deleteCategoryHandler('${person.id}', '${c.id}')">✕</button>
                                <div class="card-img">📁</div>
                                <div class="card-title">${c.name}</div>
                                <div class="card-badge">${c.items?.length || 0} Kelime</div>
                            </div>
                        `).join('')}
                    </div>
                </div>
            `;
        }

        function renderCategory(person, category) {
            app.innerHTML = `
                <div class="header">
                    <button class="btn-icon" onclick="navigate('#/person/${person.id}')">⬅️</button>
                    <h1>${category.name}</h1>
                    <button class="btn-icon btn-add" onclick="navigate('#/add-item/${person.id}/${category.id}')">＋</button>
                </div>
                <div class="container">
                    <div class="grid">
                        ${(category.items || []).map(i => `
                            <div class="card item" onclick="speakItem(this)" data-text="${i.text}">
                                <button class="btn-delete" onclick="event.stopPropagation(); deleteItemHandler('${person.id}', '${category.id}', '${i.id}')">✕</button>
                                <div class="card-img">${i.image ? `<img src="${i.image}" class="card-img">` : '💬'}</div>
                                <div class="card-title">${i.text}</div>
                            </div>
                        `).join('')}
                    </div>
                </div>
            `;
        }

        function renderAddPerson() {
            app.innerHTML = `
                <div class="header">
                    <button class="btn-icon" onclick="navigate('#/')">⬅️</button>
                    <h1>Yeni Kişi</h1>
                    <div style="width:50px"></div>
                </div>
                <div class="container">
                    <form onsubmit="savePersonHandler(event)">
                        <div class="form-group">
                            <label>İsim</label>
                            <input type="text" id="personName" required placeholder="Örn: Ali">
                        </div>
                        <div class="form-group">
                            <label>Fotoğraf</label>
                            <input type="file" id="personImage" accept="image/*">
                        </div>
                        <button type="submit" class="btn-full">Kaydet ✨</button>
                    </form>
                </div>
            `;
        }

        function renderAddCategory(personId) {
            app.innerHTML = `
                <div class="header">
                    <button class="btn-icon" onclick="navigate('#/person/${personId}')">⬅️</button>
                    <h1>Yeni Kategori</h1>
                    <div style="width:50px"></div>
                </div>
                <div class="container">
                    <form onsubmit="saveCategoryHandler(event, '${personId}')">
                        <div class="form-group">
                            <label>Kategori Adı</label>
                            <input type="text" id="categoryName" required placeholder="Örn: Yemekler">
                        </div>
                        <button type="submit" class="btn-full">Kaydet ✨</button>
                    </form>
                </div>
            `;
        }

        function renderAddItem(personId, catId) {
            app.innerHTML = `
                <div class="header">
                    <button class="btn-icon" onclick="navigate('#/category/${personId}/${catId}')">⬅️</button>
                    <h1>Yeni Kelime</h1>
                    <div style="width:50px"></div>
                </div>
                <div class="container">
                    <form onsubmit="saveItemHandler(event, '${personId}', '${catId}')">
                        <div class="form-group">
                            <label>Kelime veya Cümle</label>
                            <input type="text" id="itemText" required placeholder="Örn: Su istiyorum">
                        </div>
                        <div class="form-group">
                            <label>Fotoğraf</label>
                            <input type="file" id="itemImage" accept="image/*">
                        </div>
                        <button type="submit" class="btn-full">Kaydet ✨</button>
                    </form>
                </div>
            `;
        }

        // ==================== HANDLERS ====================
        window.savePersonHandler = async (e) => {
            e.preventDefault();
            const name = document.getElementById('personName').value;
            const file = document.getElementById('personImage').files[0];
            const person = { id: generateId(), name, avatar: null, categories: [] };
            if (file) {
                resizeImage(file, 300, async (base64) => {
                    person.avatar = base64;
                    await savePerson(person);
                    navigate('#/');
                });
            } else {
                await savePerson(person);
                navigate('#/');
            }
        };

        window.saveCategoryHandler = async (e, personId) => {
            e.preventDefault();
            const name = document.getElementById('categoryName').value;
            const person = await getPerson(personId);
            person.categories.push({ id: generateId(), name, items: [] });
            await savePerson(person);
            navigate('#/person/' + personId);
        };

        window.saveItemHandler = async (e, personId, catId) => {
            e.preventDefault();
            const text = document.getElementById('itemText').value;
            const file = document.getElementById('itemImage').files[0];
            const person = await getPerson(personId);
            const cat = person.categories.find(c => c.id === catId);
            const item = { id: generateId(), text, image: null };
            if (file) {
                resizeImage(file, 400, async (base64) => {
                    item.image = base64;
                    cat.items.push(item);
                    await savePerson(person);
                    navigate('#/category/' + personId + '/' + catId);
                });
            } else {
                cat.items.push(item);
                await savePerson(person);
                navigate('#/category/' + personId + '/' + catId);
            }
        };

        window.deletePersonHandler = async (id) => {
            if (confirm('Silmek istediğine emin misin?')) {
                await deletePersonFromDB(id);
                render();
            }
        };

        window.deleteCategoryHandler = async (personId, catId) => {
            if (confirm('Silmek istediğine emin misin?')) {
                const person = await getPerson(personId);
                person.categories = person.categories.filter(c => c.id !== catId);
                await savePerson(person);
                render();
            }
        };

        window.deleteItemHandler = async (personId, catId, itemId) => {
            if (confirm('Silmek istediğine emin misin?')) {
                const person = await getPerson(personId);
                const cat = person.categories.find(c => c.id === catId);
                cat.items = cat.items.filter(i => i.id !== itemId);
                await savePerson(person);
                render();
            }
        };

        window.speakItem = (el) => {
            el.classList.add('speaking');
            setTimeout(() => el.classList.remove('speaking'), 500);
            speak(el.getAttribute('data-text'));
        };

        window.addEventListener('hashchange', render);
        window.addEventListener('load', async () => {
            await initDB();
            render();
        });

        // PWA
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('sw.js');
        }
        let deferredPrompt;
        window.addEventListener('beforeinstallprompt', (e) => {
            e.preventDefault();
            deferredPrompt = e;
        });
        window.installKonusuyorum = async () => {
            if (deferredPrompt) {
                deferredPrompt.prompt();
                deferredPrompt = null;
            }
        };
    </script>
</body>
</html>
