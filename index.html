<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#FFB300">
    <title>Konuşuyorum & Öğreniyorum 🌈</title>

    <link rel="manifest" href="manifest.json">
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;500;600;700&family=Baloo+2:wght@600;700;800&family=Indie+Flower&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

    <style id="theme-styles">
        :root {
            --primary: #FFB300; --secondary: #00D2D3; --accent: #FF6B6B;
            --blue: #54A0FF; --green: #1DD1A1; --bg: #FFF9E6;
            --text: #4834D4; --white: #FFFFFF;
        }

        /* TEMA TEMELLERİ */
        body { min-height: 100vh; overflow-x: hidden; user-select: none; transition: all 0.3s; }
        body.theme-modern { background-color: var(--bg); color: var(--text); }
        body.theme-classic { background-color: #fdf2f8; color: #831843; }
        body.theme-space { background-color: #0f172a; color: #f8fafc; }
        body.theme-notebook { background-color: #fefce8; color: #1e293b; background-image: linear-gradient(#e5e7eb 1px, transparent 1px); background-size: 100% 30px; }

        /* ARKA PLAN ANİMASYONLARI */
        .bg-animations { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; pointer-events: none; overflow: hidden; }
        .anim-item { position: absolute; transition: transform 0.2s; }
        .clickable-item { pointer-events: auto; cursor: pointer; z-index: 50; }
        .clickable-item:active { transform: scale(1.5); }

        /* UZAY - GERÇEKÇİ */
        .theme-space { background: radial-gradient(ellipse at 20% 50%, rgba(30,60,120,0.4) 0%, transparent 50%), radial-gradient(ellipse at 80% 20%, rgba(80,40,120,0.3) 0%, transparent 40%), radial-gradient(ellipse at 50% 80%, rgba(20,80,100,0.2) 0%, transparent 50%), #0a0e1a; }
        .theme-space .rocket { font-size: 4rem; animation: roam 40s infinite ease-in-out; filter: drop-shadow(0 0 8px rgba(255,150,50,0.6)); }
        .theme-space .planet { font-size: 8rem; animation: slowSpin 80s infinite linear; opacity: 0.35; filter: drop-shadow(0 0 15px rgba(100,150,255,0.3)); }
        .theme-space .nebula { position: absolute; border-radius: 50%; filter: blur(60px); opacity: 0.15; animation: nebulaPulse 12s infinite ease-in-out; }
        .theme-space .star { background: white; border-radius: 50%; animation: twinkle var(--twinkle-dur, 3s) infinite ease-in-out; box-shadow: 0 0 3px rgba(255,255,255,0.8); }
        .theme-space .star-bright { background: radial-gradient(circle, #fff 0%, rgba(200,220,255,0.6) 40%, transparent 70%); border-radius: 50%; animation: twinkleBright var(--twinkle-dur, 4s) infinite ease-in-out; }
        .theme-space .shooting-star {
            position: absolute;
            width: 80px; height: 1.5px;
            background: linear-gradient(90deg, rgba(255,255,255,0.95) 0%, rgba(200,220,255,0.6) 30%, transparent 100%);
            border-radius: 1px;
            box-shadow: 0 0 6px 2px rgba(200,220,255,0.4);
            animation: shootStar var(--shoot-dur, 3s) var(--shoot-delay, 0s) infinite cubic-bezier(0.2, 0, 0.8, 1);
            opacity: 0;
        }
        .theme-space .shooting-star::before {
            content: '';
            position: absolute; left: 0; top: -1px;
            width: 4px; height: 4px;
            background: white;
            border-radius: 50%;
            box-shadow: 0 0 8px 3px rgba(255,255,255,0.9), 0 0 15px 5px rgba(150,200,255,0.5);
        }

        /* GÖKKUŞAĞI - GELİŞTİRİLMİŞ */
        .theme-modern { background: radial-gradient(circle at 10% 20%, rgba(255,200,220,0.5) 0%, transparent 40%), radial-gradient(circle at 90% 80%, rgba(180,220,255,0.5) 0%, transparent 40%), radial-gradient(circle at 50% 50%, rgba(255,240,180,0.4) 0%, transparent 50%), linear-gradient(135deg, #fff5e1 0%, #ffe4f1 50%, #e1f0ff 100%); background-attachment: fixed; }
        .theme-modern .cloud { font-size: 5rem; opacity: 0.25; animation: floatCloud 60s infinite linear; filter: drop-shadow(0 3px 6px rgba(0,0,0,0.05)); }
        .theme-modern .cloud-small { font-size: 3rem; opacity: 0.15; animation: floatCloud 80s infinite linear; }
        .theme-modern .balloon { font-size: 3.5rem; opacity: 0.5; animation: balloonFloat 25s infinite ease-in-out; filter: drop-shadow(0 4px 8px rgba(0,0,0,0.1)); }
        .theme-modern .sun { font-size: 9rem; top: 3%; right: 3%; opacity: 0.18; animation: sunPulse 8s infinite ease-in-out; filter: drop-shadow(0 0 30px rgba(255,200,0,0.3)); }
        .theme-modern .rainbow { position: absolute; top: 5%; left: 50%; transform: translateX(-50%); font-size: 7rem; opacity: 0.12; animation: rainbowFade 10s infinite ease-in-out; }

        /* KLASİK - GELİŞTİRİLMİŞ */
        .theme-classic { background: radial-gradient(circle at 30% 70%, rgba(255,182,193,0.3) 0%, transparent 40%), radial-gradient(circle at 70% 30%, rgba(255,218,230,0.3) 0%, transparent 40%), #fdf2f8; background-attachment: fixed; }
        .theme-classic .heart { font-size: 3rem; opacity: 0.2; animation: heartFloat 18s infinite ease-in-out; filter: drop-shadow(0 2px 4px rgba(200,50,80,0.15)); }
        .theme-classic .heart-small { font-size: 1.5rem; opacity: 0.15; animation: heartFloat 25s infinite ease-in-out; }
        .theme-classic .flower { font-size: 4rem; opacity: 0.2; animation: flowerSway 8s infinite ease-in-out; filter: drop-shadow(0 2px 4px rgba(200,100,150,0.1)); }
        .theme-classic .butterfly { font-size: 2.5rem; opacity: 0.35; animation: butterflyFly 20s infinite ease-in-out; }
        .theme-classic .petal { font-size: 2rem; opacity: 0.15; animation: petalFall 15s infinite linear; }

        /* NOT DEFTERİ - GELİŞTİRİLMİŞ */
        .theme-notebook * { font-family: 'Indie Flower', cursive !important; }
        .theme-notebook { background-color: #fffef5; background-image: linear-gradient(rgba(200,200,220,0.3) 1px, transparent 1px), linear-gradient(90deg, rgba(255,100,100,0.15) 1px, transparent 1px); background-size: 100% 28px, 60px 100%; background-position: 0 0, 40px 0; }
        .theme-notebook .pencil { font-size: 4rem; opacity: 0.25; animation: pencilWrite 12s infinite ease-in-out; }
        .theme-notebook .paperclip { font-size: 3.5rem; opacity: 0.2; animation: clipWobble 6s infinite ease-in-out; }
        .theme-notebook .eraser { font-size: 2.5rem; opacity: 0.2; animation: roam 35s infinite ease-in-out; }
        .theme-notebook .doodle { font-size: 2rem; opacity: 0.15; animation: doodlePop 4s infinite ease-in-out; }

        /* OYUN SIRASINDA ARKA PLAN GİZLE */
        .bg-hidden { display: none !important; }

        /* OYUN İÇİN ÖZEL ANİMASYONLAR */
        @keyframes popIn {
            0% { transform: scale(0) translate(0, 0); opacity: 0; }
            20% { opacity: 1; }
            100% { transform: scale(1) translate(var(--tx), var(--ty)); opacity: 0.5; }
        }
        .pop-obj { 
            position: fixed; font-size: 4rem; z-index: 1000; 
            animation: popIn var(--dur) linear forwards; 
            pointer-events: auto; cursor: pointer;
        }

        /* ANİMASYON TANIMLARI */
        @keyframes shootStar {
            0% { transform: translateX(0) rotate(-35deg); opacity: 0; }
            5% { opacity: 1; }
            60% { opacity: 0.6; }
            100% { transform: translateX(calc(100vw + 200px)) rotate(-35deg); opacity: 0; }
        }
        @keyframes nebulaPulse {
            0%, 100% { opacity: 0.12; transform: scale(1); }
            50% { opacity: 0.2; transform: scale(1.1); }
        }
        @keyframes twinkleBright {
            0%, 100% { opacity: 0.3; transform: scale(0.8); }
            50% { opacity: 1; transform: scale(1.2); }
        }
        @keyframes roam {
            0% { transform: translate(-20vw, 120vh) rotate(0deg); }
            33% { transform: translate(50vw, 30vh) rotate(20deg); }
            66% { transform: translate(90vw, 10vh) rotate(-20deg); }
            100% { transform: translate(120vw, 70vh) rotate(15deg); }
        }
        @keyframes slowSpin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
        @keyframes twinkle { 0%, 100% { opacity: 0.15; transform: scale(0.9); } 50% { opacity: 1; transform: scale(1.1); } }
        @keyframes floatHorizontal { from { left: -30%; } to { left: 130%; } }
        @keyframes floatUp { from { bottom: -20%; } to { bottom: 120%; } }
        @keyframes floatCloud {
            0% { transform: translateX(-100%) translateY(0); }
            50% { transform: translateX(50vw) translateY(-8px); }
            100% { transform: translateX(110vw) translateY(0); }
        }
        @keyframes balloonFloat {
            0% { transform: translateY(110vh) rotate(-5deg); }
            50% { transform: translateY(30vh) rotate(5deg); }
            100% { transform: translateY(-20vh) rotate(-3deg); }
        }
        @keyframes sunPulse {
            0%, 100% { transform: scale(1); opacity: 0.18; }
            50% { transform: scale(1.05); opacity: 0.25; }
        }
        @keyframes rainbowFade {
            0%, 100% { opacity: 0.08; }
            50% { opacity: 0.15; }
        }
        @keyframes heartFloat {
            0% { transform: translateY(100vh) rotate(0deg) scale(0.8); opacity: 0; }
            10% { opacity: 0.2; }
            50% { transform: translateY(40vh) rotate(15deg) scale(1); }
            90% { opacity: 0.2; }
            100% { transform: translateY(-20vh) rotate(-10deg) scale(0.9); opacity: 0; }
        }
        @keyframes flowerSway {
            0%, 100% { transform: rotate(-5deg) scale(1); }
            50% { transform: rotate(5deg) scale(1.05); }
        }
        @keyframes butterflyFly {
            0% { transform: translate(-10vw, 80vh) rotate(0deg); }
            25% { transform: translate(30vw, 40vh) rotate(10deg); }
            50% { transform: translate(60vw, 20vh) rotate(-5deg); }
            75% { transform: translate(80vw, 50vh) rotate(8deg); }
            100% { transform: translate(110vw, 30vh) rotate(-3deg); }
        }
        @keyframes petalFall {
            0% { transform: translateY(-10vh) translateX(0) rotate(0deg); opacity: 0; }
            10% { opacity: 0.15; }
            100% { transform: translateY(110vh) translateX(30px) rotate(360deg); opacity: 0; }
        }
        @keyframes pencilWrite {
            0%, 100% { transform: translate(0, 0) rotate(-15deg); }
            25% { transform: translate(20px, 5px) rotate(-10deg); }
            50% { transform: translate(40px, -3px) rotate(-20deg); }
            75% { transform: translate(10px, 8px) rotate(-12deg); }
        }
        @keyframes clipWobble {
            0%, 100% { transform: rotate(0deg); }
            25% { transform: rotate(8deg); }
            75% { transform: rotate(-8deg); }
        }
        @keyframes doodlePop {
            0%, 100% { transform: scale(1); opacity: 0.15; }
            50% { transform: scale(1.15); opacity: 0.25; }
        }

        /* İDEAL BOYUTTA GİRİŞ ALANLARI */
        .form-group input, .form-group select, .form-group textarea {
            font-size: 1.1rem !important;
            padding: 10px 15px !important;
            border-radius: 12px !important;
            border: 2px solid #DDD !important;
            width: 100% !important;
            margin-bottom: 12px !important;
            background: white !important;
            color: #333 !important;
            display: block !important;
        }
        .form-group label {
            font-size: 1rem !important;
            font-weight: 700 !important;
            margin-bottom: 6px !important;
            display: block !important;
            color: inherit;
        }

        /* UZAY TEMASI GİRİŞ ALANI DÜZELTME */
        .theme-space .form-group input, .theme-space .form-group select, .theme-space .form-group textarea {
            background: #1e293b !important;
            color: #f8fafc !important;
            border-color: #38bdf8 !important;
        }
        .theme-space .form-group label { color: #f8fafc !important; }

        /* UZAY TEMASI KART DÜZELTME */
        .theme-space .card { background: #1e293b !important; border-color: #38bdf8 !important; color: #f8fafc !important; }
        .theme-space .card-title { color: #f8fafc !important; }
        .theme-space .card-img { background: #0f172a !important; }

        /* GENEL STİLLER */
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; font-family: 'Fredoka', sans-serif; }
        .header { padding: 15px 20px; display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 100; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .header h1 { font-family: 'Baloo 2', cursive; font-size: 1.4rem; color: white; font-weight: 800; }
        .nav-buttons { display: flex; gap: 8px; }
        .btn-round { border: none; width: 42px; height: 42px; font-size: 1.3rem; cursor: pointer; display: flex; align-items: center; justify-content: center; box-shadow: 0 4px 0 rgba(0,0,0,0.1); border-radius: 12px; }
        .btn-round:active { transform: translateY(4px); box-shadow: none; }
        .container { padding: 15px; max-width: 900px; margin: 0 auto; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 15px; }
        .card { background: white; padding: 15px 10px; text-align: center; cursor: pointer; position: relative; transition: transform 0.2s; border-radius: 25px; border: 5px solid #F0F2F5; }
        .card:active { transform: scale(0.95); }
        .card-img { width: 85px; height: 85px; margin: 0 auto 10px; border-radius: 20px; background: #F8F9FA; display: flex; align-items: center; justify-content: center; font-size: 3rem; object-fit: cover; }
        .card-title { font-weight: 800; font-size: 1.1rem; font-family: 'Baloo 2', cursive; }
        .action-btns { position: absolute; top: 8px; right: 8px; display: flex; flex-direction: column; gap: 5px; }
        .btn-mini { width: 26px; height: 26px; border-radius: 8px; border: none; cursor: pointer; display: flex; align-items: center; justify-content: center; color: white; font-size: 0.8rem; }
        .btn-del { background: #FF6B6B; } .btn-edit { background: #54A0FF; }

        .theme-selector { position: absolute; top: 70px; left: 15px; background: white; border-radius: 20px; padding: 12px; box-shadow: 0 5px 20px rgba(0,0,0,0.2); display: none; z-index: 200; border: 4px solid #FFB300; }
        .theme-option { padding: 10px 15px; cursor: pointer; font-weight: 800; border-radius: 12px; margin-bottom: 6px; display: flex; align-items: center; gap: 12px; color: #4834D4; font-size: 1.1rem; }
        .theme-option:hover { background: #f0f0f0; }

        .score-board { background: rgba(255,255,255,0.9); padding: 10px 20px; border-radius: 20px; margin-bottom: 15px; display: flex; justify-content: space-around; border: 3px solid var(--primary); font-weight: 800; }
        .theme-space .score-board { background: rgba(30, 41, 59, 0.9); color: white; border-color: #38bdf8; }

        /* MEMORY GAME STYLES */
        .memory-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; margin-top: 15px; }
        .memory-card { height: 100px; background: var(--primary); border-radius: 15px; cursor: pointer; position: relative; transform-style: preserve-3d; transition: transform 0.5s; border: 4px solid white; }
        .memory-card.flipped { transform: rotateY(180deg); }
        .memory-card.matched { visibility: hidden; opacity: 0; }
        .card-front, .card-back { position: absolute; width: 100%; height: 100%; backface-visibility: hidden; border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 2rem; }
        .card-back { background: #fff; transform: rotateY(180deg); }
        .card-back img { width: 100%; height: 100%; object-fit: cover; border-radius: 10px; }

        .quiz-container { background: white; border-radius: 35px; padding: 25px; text-align: center; border: 8px solid #FFB300; }
        .quiz-question { font-family: 'Baloo 2', cursive; font-size: 1.8rem; margin-bottom: 20px; font-weight: 800; }
        .quiz-img { width: 100%; max-width: 280px; height: 180px; border-radius: 25px; object-fit: cover; margin-bottom: 20px; }
        .options-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 20px; }
        .option-btn { background: #F8F9FA; border: 4px solid #EEE; padding: 15px; border-radius: 20px; cursor: pointer; display: flex; flex-direction: column; align-items: center; gap: 10px; box-shadow: 0 6px 0 #DDD; }
        .option-text { font-size: 1.2rem; font-weight: 800; }
        .next-btn { background: #54A0FF; color: white; border: none; padding: 15px 40px; border-radius: 20px; font-size: 1.3rem; font-weight: 800; cursor: pointer; box-shadow: 0 6px 0 #2E86DE; }
        .form-card { background: white; padding: 20px; border-radius: 25px; border: 5px solid #54A0FF; }
        .theme-space .form-card { background: #1e293b; border-color: #38bdf8; }
        .btn-save { width: 100%; padding: 15px; border-radius: 20px; border: none; background: #1DD1A1; color: white; font-weight: 800; font-size: 1.2rem; cursor: pointer; margin-top: 10px; box-shadow: 0 6px 0 #10AC84; }

        @media (max-width: 480px) { .grid { grid-template-columns: repeat(2, 1fr); } .options-grid { grid-template-columns: 1fr; } .memory-grid { grid-template-columns: repeat(3, 1fr); } }
    </style>
</head>
<body class="theme-modern">
    <div class="bg-animations" id="bg-elements"></div>

    <div id="theme-menu" class="theme-selector">
        <div class="theme-option" onclick="setTheme('modern')">🌈 Gökkuşağı</div>
        <div class="theme-option" onclick="setTheme('classic')">🌸 Klasik</div>
        <div class="theme-option" onclick="setTheme('space')">🚀 Uzay</div>
        <div class="theme-option" onclick="setTheme('notebook')">📝 Not Defteri</div>
    </div>
    <div id="app"></div>

    <script>
        let db;
        const DB_NAME = 'KonusuyorumFinalDB_V5';
        const DB_VERSION = 1;

        let currentTheme = localStorage.getItem('app-theme') || 'modern';
        document.body.className = 'theme-' + currentTheme;

        function toggleThemeMenu() {
            const menu = document.getElementById('theme-menu');
            menu.style.display = menu.style.display === 'block' ? 'none' : 'block';
        }

        function setTheme(theme) {
            currentTheme = theme;
            document.body.className = 'theme-' + theme;
            localStorage.setItem('app-theme', theme);
            document.getElementById('theme-menu').style.display = 'none';
            updateBackground();
            render();
        }

        let popGameActive = false;
        let popScore = 0;
        let currentPersonId = null;
        let spawnRate = 2000;
        let spawnTimer = null;

        function updateBackground() {
            const container = document.getElementById('bg-elements');
            container.innerHTML = '';
            
            if (currentTheme === 'space') {
                // Nebula efektleri
                container.innerHTML += `<div class="nebula anim-item" style="top:10%;left:15%;width:300px;height:300px;background:radial-gradient(circle,rgba(100,50,200,0.4),transparent);animation-delay:0s"></div>`;
                container.innerHTML += `<div class="nebula anim-item" style="top:60%;right:10%;width:250px;height:250px;background:radial-gradient(circle,rgba(50,100,200,0.3),transparent);animation-delay:6s"></div>`;
                // Yıldızlar - farklı boyut ve parlaklık
                for(let i=0; i<60; i++) {
                    const size = 0.5 + Math.random() * 2.5;
                    const bright = Math.random() > 0.85;
                    const cls = bright ? 'star-bright' : 'star';
                    const dur = 2 + Math.random() * 4;
                    container.innerHTML += `<div class="${cls} anim-item" style="top:${Math.random()*100}%;left:${Math.random()*100}%;width:${size}px;height:${size}px;--twinkle-dur:${dur}s;animation-delay:${Math.random()*5}s"></div>`;
                }
                // Kayan yıldızlar - kuyruklu, gerçekçi
                for(let i=0; i<5; i++) {
                    const dur = 2.5 + Math.random() * 3;
                    const delay = Math.random() * 15 + i * 5;
                    container.innerHTML += `<div class="shooting-star anim-item" style="top:${Math.random()*50}%;left:-80px;--shoot-dur:${dur}s;--shoot-delay:${delay}s"></div>`;
                }
                container.innerHTML += `<div class="rocket anim-item">🚀</div>`;
                container.innerHTML += `<div class="planet anim-item" style="top:12%;right:12%">🌍</div>`;
                container.innerHTML += `<div class="planet anim-item" style="bottom:18%;left:8%;animation-duration:80s">🪐</div>`;
            } else if (currentTheme === 'modern') {
                container.innerHTML += `<div class="rainbow anim-item">🌈</div>`;
                container.innerHTML += `<div class="sun anim-item">☀️</div>`;
                for(let i=0; i<5; i++) container.innerHTML += `<div class="cloud anim-item" style="top:${8+i*18}%;animation-delay:${i*8}s;animation-duration:${50+Math.random()*30}s">☁️</div>`;
                for(let i=0; i<3; i++) container.innerHTML += `<div class="cloud-small anim-item" style="top:${15+i*25}%;animation-delay:${i*12+5}s;animation-duration:${70+Math.random()*20}s">☁️</div>`;
                const balloonEmojis = ['🎈','🎈','🟡','🔴','🟢','🔵','🟣','🎈'];
                for(let i=0; i<10; i++) container.innerHTML += `<div class="balloon anim-item" style="animation-delay:${i*4+Math.random()*3}s;left:${5+Math.random()*85}%;animation-duration:${20+Math.random()*15}s">${balloonEmojis[i%balloonEmojis.length]}</div>`;
            } else if (currentTheme === 'classic') {
                const hearts = ['❤️','💕','💗','🩷'];
                for(let i=0; i<12; i++) container.innerHTML += `<div class="heart anim-item" style="left:${Math.random()*90}%;animation-delay:${i*2.5+Math.random()*2}s;animation-duration:${16+Math.random()*8}s">${hearts[i%hearts.length]}</div>`;
                for(let i=0; i<5; i++) container.innerHTML += `<div class="heart-small anim-item" style="left:${Math.random()*90}%;animation-delay:${i*4}s;animation-duration:${22+Math.random()*8}s">💗</div>`;
                const flowers = ['🌸','🌺','🌷','🌼'];
                for(let i=0; i<6; i++) container.innerHTML += `<div class="flower anim-item" style="top:${Math.random()*80}%;left:${Math.random()*80}%;animation-delay:${i*2}s">${flowers[i%flowers.length]}</div>`;
                for(let i=0; i<3; i++) container.innerHTML += `<div class="butterfly anim-item" style="animation-delay:${i*7}s;animation-duration:${18+i*4}s">🦋</div>`;
                for(let i=0; i<8; i++) container.innerHTML += `<div class="petal anim-item" style="left:${Math.random()*100}%;animation-delay:${i*2.5}s;animation-duration:${12+Math.random()*6}s">🌸</div>`;
            } else if (currentTheme === 'notebook') {

        function initDB() {
            return new Promise((resolve, reject) => {
                const request = indexedDB.open(DB_NAME, DB_VERSION);
                request.onupgradeneeded = (e) => {
                    const db = e.target.result;
                    if (!db.objectStoreNames.contains('people')) db.createObjectStore('people', { keyPath: 'id' });
                };
                request.onsuccess = (e) => { db = e.target.result; resolve(); };
                request.onerror = (e) => reject(e);
            });
        }

        const peopleDB = {
            getAll: () => new Promise(r => {
                const tx = db.transaction('people', 'readonly');
                const req = tx.objectStore('people').getAll();
                req.onsuccess = () => r(req.result || []);
            }),
            get: (id) => new Promise(r => {
                const tx = db.transaction('people', 'readonly');
                const req = tx.objectStore('people').get(id);
                req.onsuccess = () => r(req.result);
            }),
            save: (data) => new Promise(r => {
                const tx = db.transaction('people', 'readwrite');
                tx.objectStore('people').put(data);
                tx.oncomplete = () => r();
            }),
            delete: (id) => new Promise(r => {
                const tx = db.transaction('people', 'readwrite');
                tx.objectStore('people').delete(id);
                tx.oncomplete = () => r();
            })
        };

        const generateId = () => Math.random().toString(36).substr(2, 9);
        const navigate = (hash) => { window.location.hash = hash; };
        
        function speak(text) {
            if (!window.speechSynthesis) return;
            window.speechSynthesis.cancel();
            const msg = new SpeechSynthesisUtterance(text);
            msg.lang = 'tr-TR';
            msg.rate = 0.85;
            msg.pitch = 1.2;
            window.speechSynthesis.speak(msg);
        }

        const app = document.getElementById('app');

                if (hash === '#/') {

                } else if (hash.startsWith('#/person/')) {
                    currentPersonId = hash.split('/')[2];

                    renderPerson(person);
                } else if (hash.startsWith('#/category/')) {
                    const parts = hash.split('/');

                    renderCategory(person, category);
                } else if (hash.startsWith('#/quiz-list/')) {
                    const person = await peopleDB.get(hash.split('/')[2]);
                    renderQuizList(person);
                } else if (hash.startsWith('#/quiz-play/')) {
                    const parts = hash.split('/');
                    const person = await peopleDB.get(parts[2]);
                    const index = person.quizzes.findIndex(q => q.id === parts[3]);
                    renderQuizPlay(person, index);
                } else if (hash === '#/add-person') {
                    renderPersonForm();
                } else if (hash.startsWith('#/edit-person/')) {
                    const person = await peopleDB.get(hash.split('/')[2]);
                    renderPersonForm(person);
                } else if (hash.startsWith('#/add-category/')) {
                    renderCategoryForm(hash.split('/')[2]);
                } else if (hash.startsWith('#/edit-category/')) {
                    const parts = hash.split('/');
                    const person = await peopleDB.get(parts[2]);
                    const cat = person.categories.find(c => c.id === parts[3]);
                    renderCategoryForm(person.id, cat);
                } else if (hash.startsWith('#/add-item/')) {
                    const parts = hash.split('/');
                    renderItemForm(parts[2], parts[3]);

                    const parts = hash.split('/');

                    const cat = person.categories.find(c => c.id === parts[3]);
                    const item = cat.items.find(i => i.id === parts[4]);
                    renderItemForm(person.id, cat.id, item);
                } else if (hash.startsWith('#/add-quiz/')) {
                    renderQuizForm(hash.split('/')[2]);
                } else if (hash.startsWith('#/pop-game/')) {
                    const person = await peopleDB.get(hash.split('/')[2]);
                    renderPopGame(person);
                } else if (hash.startsWith('#/memory-game/')) {

                    renderMemoryGame(person);

        // POP GAME
        function renderPopGame(person) {
            popGameActive = true;
            popScore = 0;
            spawnRate = 2000;
            // Arka plan animasyonlarını gizle
            document.getElementById('bg-elements').classList.add('bg-hidden');
            app.innerHTML = getHeader('Patlatma Oyunu', '#/person/' + person.id) + `
                <div class="container">
                    <div class="score-board" id="pop-score-board">
                        <span>Skor: <span id="current-pop-score">0</span></span>

                </div>

            spawnObject();

        function spawnObject() {
            if (!popGameActive) return;
            
            const area = document.getElementById('game-area');
            if (!area) return;

            const themeObjs = { modern: '🎈', classic: '❤️', space: '🚀', notebook: '✏️' };
            const obj = document.createElement('div');
            obj.className = 'pop-obj';
            obj.innerHTML = themeObjs[currentTheme] || '🎈';
            
            const x = Math.random() * 80 + 10;
            const y = Math.random() * 80 + 10;
            const tx = (Math.random() - 0.5) * 200;
            const ty = (Math.random() - 0.5) * 200;
            const dur = Math.max(1500, 4000 - (popScore * 50));

            obj.style.left = x + '%';
            obj.style.top = y + '%';
            obj.style.setProperty('--tx', tx + 'px');
            obj.style.setProperty('--ty', ty + 'px');
            obj.style.setProperty('--dur', dur + 'ms');

            obj.onclick = (e) => {
                e.stopPropagation();
                popScore++;
                speak("Pat!");
                confetti({ particleCount: 20, spread: 30, origin: { x: e.clientX/window.innerWidth, y: e.clientY/window.innerHeight } });
                obj.remove();
                updatePopScoreUI();
                
                // Hızlanma
                spawnRate = Math.max(400, 2000 - (popScore * 30));
            };

            area.appendChild(obj);
            setTimeout(() => obj.remove(), dur);
            
            spawnTimer = setTimeout(spawnObject, spawnRate);
        }

        function updatePopScoreUI() {
            const scoreEl = document.getElementById('current-pop-score');
            if (scoreEl) scoreEl.innerText = popScore;
            
            peopleDB.get(currentPersonId).then(person => {
                if (popScore > (person.popHighScore || 0)) {
                    person.popHighScore = popScore;
                    peopleDB.save(person);
                    const highEl = document.querySelector('.score-board span:last-child');
                    if (highEl) highEl.innerText = 'En Yüksek: ' + popScore;
                }
            });
        }

        // MEMORY GAME
        let memoryFlipped = [];
        let memoryMatched = 0;

        async function renderMemoryGame(person) {
            if (!person.memoryImages || person.memoryImages.length < 2) {
                renderMemorySetup(person);
                return;
            }
            
            const cards = [...person.memoryImages, ...person.memoryImages]
                .sort(() => Math.random() - 0.5)
                .map((img, idx) => ({ id: idx, img }));

            memoryFlipped = [];
            memoryMatched = 0;

            app.innerHTML = getHeader('Hafıza Oyunu', '#/person/' + person.id, `<button class="btn-round" onclick="navigate('#/memory-setup/${person.id}')">⚙️</button>`) + `
                <div class="container">
                    <div class="memory-grid" id="memory-grid">
                        ${cards.map(c => `
                            <div class="memory-card" onclick="flipMemoryCard(this, '${c.img}')">
                                <div class="card-front">❓</div>
                                <div class="card-back"><img src="${c.img}"></div>
                            </div>
                        `).join('')}
                    </div>
                </div>`;
        }

        window.flipMemoryCard = (card, img) => {
            if (card.classList.contains('flipped') || card.classList.contains('matched') || memoryFlipped.length >= 2) return;
            
            card.classList.add('flipped');
            memoryFlipped.push({ card, img });

            if (memoryFlipped.length === 2) {
                if (memoryFlipped[0].img === memoryFlipped[1].img) {
                    setTimeout(() => {
                        memoryFlipped.forEach(f => f.card.classList.add('matched'));
                        memoryFlipped = [];
                        memoryMatched += 2;
                        speak("Harika!");
                        if (document.querySelectorAll('.memory-card:not(.matched)').length === 0) {
                            confetti({ particleCount: 200, spread: 100 });
                            speak("Tebrikler! Hepsini buldun!");
                        }
                    }, 600);
                } else {
                    setTimeout(() => {
                        memoryFlipped.forEach(f => f.card.classList.remove('flipped'));
                        memoryFlipped = [];
                    }, 1000);
                }
            }
        };

            const person = await peopleDB.get(pid);
            person.memoryImages.splice(idx, 1);

        async function handleSaveQuiz(e, pid) {
            e.preventDefault();
            const person = await peopleDB.get(pid);
            const quiz = { id: generateId(), question: document.getElementById('qText').value, image: null, options: [], correct: parseInt(document.getElementById('correctIdx').value) };
            const readFile = (file) => new Promise(r => { if(!file) r(null); const rd = new FileReader(); rd.onload = (ev) => r(ev.target.result); rd.readAsDataURL(file); });
            quiz.image = await readFile(document.getElementById('qImg').files[0]);
            for(let i=0; i<4; i++) { quiz.options.push({ text: document.getElementById('optT'+i).value, img: await readFile(document.getElementById('optI'+i).files[0]) }); }
            if(!person.quizzes) person.quizzes = [];
            person.quizzes.push(quiz);
            await peopleDB.save(person);
            navigate('#/quiz-list/' + pid);
        }

        window.deletePerson = async (id) => { if(confirm('Bu kişiyi silmek istediğine emin misin?')) { await peopleDB.delete(id); render(); } };
        window.deleteCategory = async (pid, cid) => { if(confirm('Bu kategoriyi silmek istediğine emin misin?')) { const p = await peopleDB.get(pid); p.categories = p.categories.filter(c => c.id !== cid); await peopleDB.save(p); render(); } };
        window.deleteItem = async (pid, cid, iid) => { if(confirm('Bu kelimeyi silmek istediğine emin misin?')) { const p = await peopleDB.get(pid); const c = p.categories.find(cat => cat.id === cid); c.items = c.items.filter(i => i.id !== iid); await peopleDB.save(p); render(); } };
        window.deleteQuiz = async (pid, qid) => { if(confirm('Bu soruyu silmek istediğine emin misin?')) { const p = await peopleDB.get(pid); p.quizzes = p.quizzes.filter(q => q.id !== qid); await peopleDB.save(p); render(); } };

        window.addEventListener('hashchange', render);
        initDB().then(() => { updateBackground(); render(); });
    </script>
</body>
</html>
